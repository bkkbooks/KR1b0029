body:
  text: 書傳輯録纂注卷五元董鼎撰召誥左傳曰武王克商遷九鼎于洛邑史記載武王言我南望三途北望徵鄙顔詹有河粵詹洛伊毋遠天室營周居于洛邑而後去則宅洛者武王之志周公成王成之召公實先經理之洛邑既成成王始政召公因周公之歸作書致告逹之于王其書拳拳於厯年之久近反復乎夏商之廢興究其歸則以諴小民為祈天命之本以疾敬德為諴小民之本一篇之中屢致意焉古之大臣其為國家長遠慮蓋如此以召公之書因以召誥名篇今文古文皆有纂注王氏曰洛者天下之中以天事言止道里均焉見下自叙土中傳非特如此而已懲三監之難毖殷頑民遷以自近洛距妹邦為近則易使之遷作王都焉則易以鎮服也雖然鎬京宗廟社稷官府宮室具在不可遷也故於洛邑會諸侯而已陳氏大猷曰成王實都鎬京特往來朝諸侯祀清廟於洛故鎬京謂之宗周以其為天下所宗也洛邑謂之東都又謂之成周以周道成於此也洛邑天下之至中豐鎬天下之至險成王於洛邑定鼎以朝諸侯所以承天地沖和之氣宅土中以蒞四海其示天下也公於鎬京定都以壯基本所以據天下形勝處上游以制六合其慮天下也逺漢唐竝建兩京蓋亦深識形勢之所在而有得於周公成王之遺意歟林氏曰周自后稷始封於邰在漢右扶風縣公夏后政衰稷之子不窋出奔于戎狄之間至孫劉始立國於豳在栒邑豳鄉十世至太王避狄人遷於岐山之下在姜陽縣岐山文王遷于豐在鄠縣東豐水武王遷於鎬在長安西南昆明池所謂鎬池也岐在邰西北無百里豳又在岐西北四百餘里豐在岐山東南二百餘里鎬在豐東二十五里新安陳氏曰宅洛之事武王志之成王述之上告祖廟迭咨大臣一日而建千萬年宅中圖大之基謹重如此以至于召公因周公之歸而作誥以告王序不及之何也宅中圍大固難保大定功尤難王之在豐召之相宅固見宅中圍大之難關召公拳拳以敬德永命戒王敬不敬之異效凡七言之至謂不敬德則必墜厥命其辭甚危見保大定功之尤難也其愚案書說中冇朱子集解召誥及洛誥之半閒閒出已說文義及分節處與蔡氏多異蓋未定本也蔡已棳取之其餘尚冇當采者今各入輯䤸纂注以備參考惟二月既望越六日乙未王朝步自周則至于豐日月相望謂之望既望十六日也乙未二十一日也周鎬京也去豐二十五里文武廟在焉成王至豐以宅洛之事告廟也輯注豐鎬去洛邑三百里長安所管六百里王畿千里亦有橫長處非若今世畫圖之為方也恐井田之制亦是此類此不可執畫方之圖以定之稍或問周都豐鎬則王畿之內當有西北之戎如此則甸縣都如之何其可為也先生曰周禮一書聖人作為一代之法爾到不可用法處聖人須别有權變之道竝格言纂注王氏曰以朏望明魄紀月以甲子紀日書法也林氏曰漢志曰周公攝政七年二月乙亥朔庚寅既望惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營成王在豐使召公先周公行相視洛邑越若來古語辭言君公於豐迄邐而來也朏孟康曰月出也三日明生之名戊申三月五日也卜宅者用龜卜宅都之地既得吉卜則經營規度其城郭宗廟郊社朝市之位纂注林氏曰漢志曰三月甲辰朔三日丙午元城劉氏曰越若發語聲來三月猶言明三月也息齊余氏曰越若朱子既采劉說見集解中冝從之不必言召公迤邐而來也越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成庶殷殷之衆庶也用庶殷者意是時殷民已遷于洛故就役之也位成者左祖右社前朝後市之位成也纂注唐孔氏曰庚戌三月七日甲寅三月十一日也葉氏曰攻位者闢荆棘平髙下以定所經營之位也庶殷所遷殷民也讎民為役則友民可知林氏曰盤庚之遷亳太王之遷岐衛文之遷楚邱未嘗不卜然君臣既有定議故至洛乃卜洪範所以先乃心卿士庶民而後卜筮也太王聿來胥宇而後爰契我龜衛文望楚與堂而後卜云其吉皆此類也若翼日乙卯周公朝至于洛則達觀于新邑營周公至則遍觀新邑所經營之位纂注唐孔氏曰乙卯十二日也蘇氏曰案後篇是日再卜吕氏曰召公已成位周公方來觀上相之體然也越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事纂注唐孔氏曰丁巳十四日也戊午十五日也孔氏曰郊以后稷配故牛二唐孔氏曰記及公羊皆曰養牲必養二帝牛不吉以為稷牛吕氏曰郊祭天社祭地孔氏曰社稷共牢馬氏曰言社則稷在其中陳氏曰郊不曰新邑者郊在國外社在國內故也社王氏曰於尊以簡為誠於卑以豐為貴故郊特牲而稷太牢先祭告於郊社然後用工天陳氏大猷曰此蓋即洛邑新立之郊社以告作洛於地不告廟者在豐已告也時洛邑宗廟未成故至十二月始蒸祭宗廟也越七日甲子周公乃朝用書命庶殷侯甸男邦伯書役書也春秋傳曰士彌年營成周計丈數揣髙低度厚薄仭溝洫物土方議遠邇量事期計徒庸慮材用書糇糧以令役於諸侯亦此意王氏曰邦伯者候甸男服之邦伯也庶邦冡君咸在而獨命邦伯者公以書命邦伯而邦伯以公命命諸侯也纂注唐孔氏曰甲子二十一日也書賦功屬役之書也候甸男服之邦伯不遍舉五服者文略耳邦伯州收也葉氏曰不及采衛者不以遠役衆也厥既命殷庶庶殷丕作丕作者言皆趨事赴功也殷之頑民若未易役使者然召公率以攻位而位成周公用以書命而丕作殷民之難化者猶且如此則其悅以使民可知也纂注孔氏曰大作言勸事氏陳氏大猷曰獨言庶殷丕作則諸候可知新安胡曰觀此則殷民之遷在未什洛之前必矣至林氏曰召公營洛自戊申至甲寅七日而成周公繼自乙卯距甲子十日而用書庶殷丕作周召之規模其敏如此總而計之自成王至豐距甲子凡一月耳萬年之業成於一月之間此豈後世可及哉新安陳氏曰讀此當參看洛誥洛誥曰豫惟乙卯朝至于洛師我卜河朔黎水云云此云乙卯周公朝至于洛其日同但洛誥言是日再卜此不言者周公之吉卜不殊召公之吉卜也兼洛誥自詳之此可略也乙卯至甲子十日乙卯日卜及逹觀新營丙辰不言事蓋丁巳戊午將行郊社大禮前一日養精神以無為也己未至癸亥五日又不言事乃將用書命丕作竭精神以有為也此五日中必會集臣庶計大數揣高卑等事役書一定然後甲子朝頒布之洛誥脫簡之在廪誥者曰惟三月哉生魄周公初基止乃洪大誥治即是三月十六日己未戊午祭社後一日也曰大誥治即用書命丕作也細而考之吻合無間誰謂殘編斷簡不可見聖人經理之微密哉太保乃以庶邦冢君出取幣乃復入錫周公曰拜首稽首旅王若公誥告庶殷越自乃御事吕氏曰洛邑事畢周公將歸宗周召公因陳戒成王乃取諸候贄見幣物以與周公且言其拜手稽首所以陳王及公之意蓋召公雖與周公言乃欲周公聫諸候之幣與召公之誥併達之王謂洛邑已定欲誥告殷民其根本乃自爾御事不敢指言成王謂之御事猶今稱人為執事也輯録據召誥文只說召公先至洛而周公繼至不說成王亦來也然召公出取幣入錫周公乃曰旅王若公其辭又多是戒成王未知如何先生曰此蓋因周公以告于王耳答潘子善纂注王氏曰庶邦冡君諸候會于洛者洛邑成而獻幣所以為禮且致變也新安陳氏曰作洛之急務在化殷人而化殷之大本在於王身下文遂詳言之此召公納忠之大者幣特恭敬之寓焉耳取幣獨言庶邦而不及庶殷者蓋用書命丕作無間於庶殷而取幣陳王不及庶殷歟嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬此下皆告成王之辭託周公違之王也曷何也其語辭商受嗣天位為元子矣元子不可改而天改之大國未易亡而天亡之皇天上帝其命之不可恃如此今王受命固有無窮之美然亦有無窮之憂於是歎息言王曷其奈何弗敬乎蓋深言不可以弗敬也又案此篇專主敬言敬則誠實無妄視聽言動一循乎理好惡用捨不違乎天與天同德固能受天明命也人君保有天命其有要於此哉伊尹亦言皇天無親克敬惟親敬則天與我一矣尚何踈之有輯録比數句者一篇之大旨也元子者天之元子也書說纂注新安胡氏曰下文以至終篇不過反覆敷演此數句之意耳吕氏曰人君代天作子是為天之長子子真氏曰大明詩云天位殷適使不挾四方亦改厥元大國殷命之意新安陳氏曰此元子字當與下文元子哉對觀元子天之元子即大君者吾父母宗子之意此元子謂殷紂後元子謂成王天命靡常人君所以保天命惟有敬耳昔殷元子嘗受天命矣天竟改其命而王受之固有無窮之美然今日之受安知不為他日之改是亦有無窮之憂也何可以不敬哉此一節始曰嗚呼末又曰嗚呼元老大臣拳拳忠愛嗟歎以深警上心不能自己之至情也天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德後王後民指受也此章語多難解大意謂天既欲遠絶大邦殷之命矣而此殷先哲王其精爽在天冝若可恃者而商紂受命卒致賢智者退藏病民者在位民困虐政保抱攜持其妻子哀號呼天往而逃亡者出見拘執無地自容故天亦哀民而眷命用歸於勉德者天命不常如此今王其可不疾敬德乎纂注孔氏曰殷多先哲王精神在天不能救者以紂不行敬故下漢上朱氏曰人之死各返其根體魄陰也故降而在魂氣陽也故升而在上則無不之矣衆人物欲蔽之故魂散而氣不能升惟聖人清明在躬志義如神故其死也精神在天與天為一葉氏曰智藏瘝在言至紂而愚其智則藏而獨病民之心存也籲和也祈和於天也唐孔氏曰夫猶人也言人人皆然新安胡氏曰當如𫝊所謂故夫致死焉之夫袁氏曰疾敬德者更無等待遲疑只今便下手新安陳氏曰祖宗之不可憑藉如此言外之意蓋謂成王今日安可盡恃太王王季文武也此章言天命不可恃祖宗不可恃惟敬德庶可凝固天命而迓續祖德爾敬德而言疾最有力蓋人心操則存舍則亡必緊著精神汲汲用工則莊敬日强而能敬苟悠悠玩怠則安肆日偷而不能敬矣後又言肆惟王其疾敬德一篇綱領在敬字而敬之工夫又在疾字相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命從子保者從其子而保之謂禹傳之子也面鄉也視古先民有夏天固啓迪之又從其子而保佑之禹亦面考天心敬順無違冝若可為後世慿藉者今時已墜厥命矣今視有殷天固啓迪之又使其格正夏命而保佑之湯亦面考天心敬順無違冝亦可為後世慿藉者今時已墜厥命矣以此知天命誠不可恃以為安也輯録此一節間有不可曉處書說纂注林氏曰格與惟帝降格于夏之格同天啓迪之又降格而保佑之降格謂下臨之也新安陳氏曰從其子而保之即孟子天與子則與子之意開萬世𫝊子之端自禹始故於夏言從子保而於商只言格保蒙上文也兩面稽天若即對越在天之意此一節蓋謂天與祖宗皆不可恃也今沖子嗣則無遺夀耇曰其稽我古人之德矧曰其有能稽謀自天稽考矧況也幼沖之主於老成之臣尤易踈逺故召公言今王以童子嗣位不可遺棄老成言其能稽古人之德是固不可遺也況言其能稽謀自天是尤不可遺也稽古人之德則於事有所證稽謀自天則於理無所遺無遺夀耇蓋君天下者之要務故召公特首言之輯録已陳夏商敬德墜命之所由又戒王也書說嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞召公歎息言王雖幼沖乃天之元子哉謂其年雖小其任則大也其者期之辭也諴和碞險也王其大能諴和小民為今之休美乎小民雖至徴而至為可畏王當不敢緩於敬德用顧畏于民之碞險可也纂注蘇氏曰民猶水也水能載舟亦能覆舟物無險於民者矣新安陳氏曰諴于小民而今休矣猶欲王汲汲於畏民碞者蓋民之碞險可畏常伏于大和盛美之中恃其已和且美而不回顧却慮以畏之則福兮禍所伏矣此所以為險也是以莊生曰人心險於山川王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休洛邑天地之中故謂之土中王來洛邑繼天出治當自服行於土中是時洛邑告成成王始政故召公以自服土中為言又舉周公嘗言作此大邑自是可以對越上天可以饗答神祇自是可以宅中圖治成命者天之成命也成王而能紹上帝服土中則庶幾天有成命治民今即休美矣王氏曰成王欲宅洛邑者以天事言則日東景朝多陽日西景夕多隂日南景短多暑日北景長多寒洛天地之中風雨之所會隂陽之所和也以人事言則四方朝聘貢賦道里均焉故謂之土中輯録言王來居洛邑繼天為治服事也土中洛邑為天下中也林氏以此句王來為王亦至洛邑之驗恐未必然但王命來此定邑耳稱周公言當作太邑而自此以祀上帝以及慎祀上下神祗又自此居中以為冶則是王受天成命以治民矣蓋召公述周公宅洛之意竝書說纂注陳氏大猷曰君前臣名故稱旦曰又舉周公之言以告謂今作大邑其自是而配天使仰無愧於天自是而毖祀上下使幽無愧於鬼神自是而宅中為治使俯無愧於民王其有成命而治民今休可也周公所期如此之重王可不思所以稱之新安陳氏曰作洛之事召公任之而未嘗明言之至此方言服于土中而舉周公之言以見作洛所以配上帝奉祭祀成治功凝天命其重如此蓋下文將自進其敬德祈天之忠言所以先引周公期望之語以開其端也王先服殷御事比介于我有周御事節性惟日其邁言治人當先服乎臣也王先服殷之御事以親近副二我周之御事使其漸染陶成相觀為善以節其驕淫之性則日進於善而不已矣王敬作所不可不敬德言化臣必謹乎身也所處所也猶所其無逸之所王能以敬為所則動靜語默出入起居無往而不居敬矣不可不敬德者甚言德之不可不敬也輯録王敬作所不可不敬德只是一句直夫召誥玩其初說許多言語艱深難曉却緊要處只是惟王不可不敬德而已人傑纂注林氏曰周遷殷頑民于洛蓋與洛之舊民雜居其善惡之習不同非有以和一之不能相安以處故必有以服殷御事使之親比介助於周之御事然後可蓋周御事習於教令無事於服之故以服殷御事為先也然服殷御以事在節其性而已蓋人性無不善殷人特化紂之惡是不義之習遂與性成而忘反耳上之人有以節之使日進於善則與周人亦何異哉然欲節民之性又在王之所化故王又當以敬為其所不可不敬之德以率之非政刑所及也或曰服亦事也猶任也任殷人為御事使之佐我周之御事蓋欲其共事相習以成善且使上下通情易以行化然後有以節其性而日進於善王則惟作所不可不敬德以率之而已陳氏大猷曰既以周臣率之使之相觀而善又以身率之使之下觀而化也新安胡氏曰王敬作所不可不敬德朱子本孔氏只作一句說蔡氏以所字為句作兩句說真氏隱記以蔡說為長然蔡說自吕氏來傷無考耳新安陳氏曰殷人漸於舊染而其性流今欲節之而使其性復亦惟化之以敬德爾敬者一身之主宰性即心所具之理也敬則此心收斂於天理之中而性可節不敬則此心放縱於人欲之僞而性日流日其邁即上達反天理而日進乎髙明之意也然王豈為化商而始勉强於敬哉特自敬為我所不可不敬之德而已謂之不可不敬蓋敬人心所當然而不可不然者非有所勉强而然如飢食渴飲之常無所為而為者也能如是則敬盡於此而人化於彼矣我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命夏商歷年長短所不敢知我所知者惟不敬厥德即墜其命也與上章相古先民之意相為出入但上章主言天眷之不足恃此則直言不敬德則墜厥命爾纂注林氏曰古人於天命不以為必有不以為必無故召公於厯年不其延㫮不敢知者疑之也至於敬德則有厯年不敬德則墜厥命蓋無可疑者今王嗣受厥命我亦惟兹二國命嗣若功王乃初服今王繼受天命我謂亦惟此夏商之命當嗣其有功者謂繼其能敬德而厯年者也況王乃新邑初政服行教化之始乎纂注陳氏大猷曰此章言尤懇切可新安陳氏曰王乃初服者善始以占終法二國之敬德而厯年尤當謹之初服也此句蔡吕以屬上章孔朱真陳以冠下章使與初生初服宅新邑為一套語亦通但此句實結上生下若生子一段議論實因此句而申明之嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命厯年知今我初服歎息言王之初服若生子無不在於初生習為善則善矣自貽其哲命為政之道亦猶是也今天其命王以哲乎命以吉凶乎命以厯年乎皆不可知所可知者今我初服如何爾初服而敬德則亦自貽哲命而吉與厯年矣宅新邑肆惟王其疾敬德王其德之用祈天永命宅新邑所謂初服也王其疾敬德容可緩乎王其德之用而祈天以厯年也輯録王之初服不可不謹其習猶子之初生不可不慎其初所教蓋習於上則智習於下則愚矣故今天命正在初服之時敬德則哲則吉則厯年不敬則愚則凶則短折也敬天無一物之不體已知我初服宅洛矣王其可不疾德哉所以求天永命者只在德而已矣竝書說命王乃初服至命厯年為一節知今我初服至析天永為一節纂注陳氏曰自貽哲命命在我也天其命哲命在天也吕氏曰人自初生而保養乃可以全其善哲命者人心所有之明哲非自外來也者林氏曰天以正性命人初無智愚之别所以有智愚於己取之而已下愚為自暴自棄則上智豈非自貽乎林葉氏曰哲命以哲為天所命也新安胡氏曰案吕皆以哲命為性命之命然哲命之哲不應遽有性命眷命之分當以葉氏之說為正真氏曰天命至公不可以求而得也曰祈者蓋一於用德乃不祈之祈也知吕氏曰祈水命無他術惟敬德為可耳曰祈者欲王天命之未定也則新安陳氏曰明哲之性與生俱生初生之時習於善明可作哲習於惡則靡哲不愚哲則為天所命愚則天不命焉是自貽哲命如所謂自求多福此所謂無不在其初生時自貽哲命者王之初服亦猶是也此一節發明王乃初服之意蓋今日作邑而自服土中乃所謂初服是又中天下定四海之一初也天之命吉凶判於此王之能敬德祈永命與不能亦判於此召公所以欲王乘此一初之機而疾敬德也疾敬德則能用德疾云者欲其乘此機而速勉之有今罔後之謂也肆惟王其疾敬德蓋申前王其疾敬德之語而致重復懇切之意云其惟王勿以小民淫用非彞亦敢殄戮用乂民若有功刑者德之反疾於敬德則當緩於用刑勿以小民過用非法之故亦敢於殄戮用治之也惟順導民則可有功民猶水也水泛濫橫流失其性矣然壅而遏之則害愈甚惟順而導之則可以成功其惟王位在德元小民乃惟刑用于天下越王顯元首也居天下之上必有首天下之德王位在德元則小民皆儀刑用德于下於王之德益以顯矣輯録書說其惟王勿以小民至越王顯為一節纂注蘇氏曰商俗靡靡其過用非常也久矣召公戒王勿以小民過用非常之故亦敢於法外殄戮以治之蓋民之有過罪實在我及其有功則王亦有德何也王之位民德之先倡也如此則法行於天下而王亦顯矣不陳氏大猷曰順夏商之有功者猶上言嗣若功王位在於土地人民惟在德元而已德元亦猶乾元坤元之始生萬物者也損吕氏曰以小民淫用非彞而敢於殄戮忿疾一生則君德矣人君之德止於好生元者善之長君以德元覆冒天下安可以小民淫用遂損君德新安胡氏曰至此則非彞之小民化為用德之小民正所謂若順導之而有功者王奚以尚刑不尚德為哉上下勤恤其曰我受天命丕若有夏厯年式勿替有殷厯年欲王以小民受天永命其亦期之辭也君臣勤勞期曰我受天命大如有夏厯年用勿替有殷厯年欲兼夏殷年之永也召公又繼以欲王以小民受天永命蓋以小民者勤恤之實受天永命者年之實也蘇氏曰君臣一心以勤恤民庶幾王受命厯年如夏商且以民心為天命也輯録以小民如以某師之以書說纂注林氏曰王能敬德于上而小民儀刑于下則天永命之矣所謂用小民以受天永命也吕氏曰召公拳拳言小民者國之根本全在小民其興其亡不在大族不在諸候止在小民之身真氏曰前言王其德之用祈天永命此言欲王以小民受天永命蓋永命之道無他惟修德與愛民而已命在天於小民何與蓋天無心以民為心耳一篇之中言敬者凡七八曰曷其奈何弗敬曰王敬作所曰不可不敬德曰王其疾敬德兩言惟不敬厥德乃早墜厥命曰肆惟王其疾敬德言之諄望之切老臣事少主惓惓之心也異時成王為守文令主而周家卜世卜年過於夏商且過其厯然後知召公之言真人主之藥石國家之蓍龜也哉拜手稽首曰豫小臣敢以王之讎民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命讎民殷之頑民與三監叛者百君子殷之御事庶士也友民周之友順民也保者保而不失受者受而無拒威命明德者德威德明也末終也召公於篇終致敬言豫小臣敢以殷周臣民保受王威命明德王當終有天之成命以顯於後世我非敢以此為勤惟恭奉幣帛用供王能祈天永命而已蓋奉幣之禮臣職之所當恭而祈天之實則在王之所自盡也又案恭奉幣意即上文取幣以錫周公而旅王者蓋當時成王將舉新邑之祀故召公奉以助祭云纂注林氏曰讎民百君子猶頑民而謂之多士也蘇氏曰百君子殷周之賢士大夫與薛氏曰先讎民後友民者作洛以鎮靜商人為先也前言先服殷御事同意有陳氏經曰保受王之威德奉行之此臣之職也王既成命當求所以永命成命在今日永命在子孫保受王之威德者臣下之所能至於祈天永命則非人臣之所能在人君疾敬德以祈天命我非敢勤者召公不敢自以治洛為功勞也至此則責堂於王之身者甚重恐成王專倚恃臣下也我但能恭奉幣以供王慶王之能祈天永命而已則祈天永命在王而不在召公關陳氏大猷曰篇終復總始末之要以告王敢以讎民等保受威命明德者因庶殷候甸和會作洛而言敢以者自任之辭如命候甸庶殷即王之威命宅洛圖治即王之明德和會丕作即保受也王末有成命與上王厥有成命相應王亦顯與上越王顯相應然我非敢自以為功勤慮王以為人心己從天命已定而自足也惟恭奉幣指前取幣旅王而言供王能祈天永命將以致慶而已期望不已之意可謂婉而篤矣記曰頌而無諂諫而無驕召公以之新安陳氏曰所謂能祈天永命不遏上文敬德愛小民之事敬德愛小民即祈天永命之能也上文已盡之故於篇終特以能字該之洛誥洛邑既定周公遣使告卜史氏録之以為洛誥又並記其君臣答問及成王命周公留治洛之事今文古文皆有辭案周公拜手稽首以下周公授使者告卜之也王拜手稽首以下成王授使者復公之辭也王肇稱殷禮以下周公教成王宅洛之事也公明保豫沖子以下成王命公留後治洛之事也王命豫來以下周公許成王留洛君臣各盡其責難之辭也伻來以下成王鍚命毖殷命寧之事也戊辰以下史又記其祭祀冊誥等事及周公居洛嵗月久近以附之以見周公作洛之始終而成王舉祀發政之後即歸于周而未嘗都洛也輯録因讀尚書先生曰其間錯誤解不得處煞多昔吕伯恭解書因問之云尚書還有解不通處答曰無有因舉洛誥問之云據成王只使周公往營洛故伻來獻圖及卜成王未嘗一日居洛後面如何却與周公有許多答對又云王在新邑此如何解伯恭遂無以答後得書云誠有解不得處雉洛誥之文冇不可曉者其後乃言王在新邑而其前已屢有答問之辭矣答潘子善纂注葉氏曰此篇當與召誥參看蓋非一時之言史取周公得卜至遣使告卜相與往來告戒本末序次之以示後世也知王氏曰此誥有不可知者當闕之而釋其可者新安陳氏曰此篇大可疑者惟有公告王宅洛行祀出命之辭而不載王至洛之事與其日月觀十二月在洛祭告命周公留治洛之事尚謹書之則自三月後至十二月前此數月中至洛之大事其當書也必矣又此篇首章九句脫簡在康誥之首則首至洛之事其脫簡又可想矣且孺子其朋及汝惟沖子惟終等處聲牙難通又王曰公功棐迪篤之下無周公答辭而即又繼以王曰豈非此等處有脫簡錯簡邪姑從諸說可也周公拜手稽首曰朕復子明辟此下周公授使者告卜之辭也拜手稽首者史記周公遣使之禮也復如逆復之復成王命周公往營成周周公得卜復命于王也謂成王為子者親之也謂成王為明辟者尊之也周公相成王尊則君親則兄之子也明辟者明君之謂先儒謂成王幼周公代王為辟至是反政成王故曰復子明辟夫有失然後有復武王崩成王立未嘗一日不居君位何復之有哉蔡仲之命言周公位冡宰正百工則周公以冡宰總百工而已豈不彰彰明甚矣乎王莽居攝幾傾漢鼎皆儒者有以啓之是不可以不辨魄蘇氏曰此下有脫簡在康誥自惟三月哉生至洪大誥治四十八字纂注孔氏曰周公言我復還明君之政于子子成王年二十成人故必歸政而退老王氏曰云云朱子采之集解竝見蔡𫝊復程子曰猶言告嗣天子王矣辟葉氏曰復如孟子有于王之復自孔氏以復子明謂周公攝而歸政之辭古今儒者從之不敢易獨王氏以為不然世或未之信焉以豫考之周公踐天子位以治天下初無經見獨明堂位云爾明堂位非出吾夫子也蓋武王崩周公以冡宰攝政此禮之常攝者攝其事非攝其位世見周公在喪之攝不知其非以成王幼而攝故至卜洛猶有歸政之言則王氏之言為有證葵初王氏曰篇末七年之說陳氏引記禮為證固也然踐天子位又不可不闕新安陳氏曰案王莽廢漢孺子嬰為安定公執其手流涕曰昔周公攝位終得復子明辟今豫獨迫皇天威命不得如意蓋因孔氏釋經之誤莽遂借此以文其姦王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟凡有造基之而後成成之而後定基命所以成始也定命所以成終也言成王幼沖退託如不敢及知天之基命定命豫乃繼太保而往大相洛邑其庶幾為王始作民明辟之地也洛邑在鎬京東故曰東土輯録周公不欲斥言王幼不能故言王若不敢及躬天之初命定命則不得不嗣攝政事保佑王而相此洛邑以為王當於此初作民主也書說參用乙記纂注王氏炎曰承天命以作新邑是謂基命都邑既成久安長治是謂定命保葵初王氏曰語録釋𦙍保不若𫝊順正與太先周公相宅合豫惟乙卯朝至于洛師我卜河朔黎水我乃卜㵎水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜乙卯即召誥之乙卯也洛師猶言京師也河朔黎水河北黎水交流之內也澗水東瀍水西王城也朝會之地瀍水東下都也處商民之地王城在澗瀍之閒下都在瀍水之外其地皆近洛水故兩云惟洛食也食者史先定墨而灼龜之兆正食其墨也伻使也圖洛之地圖也獻卜獻其卜之兆辭也纂注蘇氏曰黎水今黎陽也吕氏曰卜都之意主於商民先卜河朔黎水者固其所安也意在近地者商民之心意在地中者周公之心竝列二說以聼於天而已卜黎於先者先人後己之心也黎既不吉改卜洛邑龜乃協從蓋周公之心即天心也無間故無違也澗史氏漸曰世或謂周公三卜而後洛初於黎水再於東瀍西又於瀍東皆不若洛之吉豈知澗瀍之東西即洛之中也澗水之東即洛之偏也同名為洛而王城頑民之居不同非洛自為洛㵎瀍自為㵎瀍洛邑居天下之中伊洛瀍㵎實周流於其間天子南嚮則潤水在洛之右瀍水在洛之左周公於澗瀍之中龜兆告吉遂營王城以建王宫定郊社宗廟是為郊鄏之地今之河南是也又循之左越瀍水之東龜復告吉遂營下都名曰成周又曰東郊以居殷民今之洛陽是也二城相距蓋十有八里王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言此王授使者復公之辭也王拜手稽首者成王尊異周公而重其禮也匹配也公不敢不敬天之休命來相宅為周匹休之地言卜洛以配周命於無窮也視示也示我以卜之休美而常吉者也二人成王周公也貞猶當也十萬曰億言周公宅洛規模宏遠以我萬億年敬天休命故又拜手稽首以謝周公告卜之誨言輯録拜受公言猶禹之拜昌言也書說纂注吕氏曰營洛實配宗周其作我周匹休之地匹者對宗周之辭我與公其共貞固守此基業乎以豫者使之之辭倚之者甚重而望之者甚長也曰或曰王不在洛言來者順公所在而言王氏十朋詩之作豐伊匹與此匹休同意此夏氏曰貞如厥賦貞之貞謂相當也王欲與公共當吉祥葉氏曰凡卜有貞其吉凶者太卜言大遷大師則貞龜二人皆知其吉斷而以示天下也以王氏曰言宅洛之事定矣公當以豫永逺敬天之休承此休常吉之卜也漢新安胡氏曰視與示同古字通用書凡示字例作視周公曰王肇稱殷禮祀于新邑咸秩無文此下周公告成王宅洛之事也殷盛也與五年再殷祭之殷同秩序也無文祀典不載也言王始舉盛禮祀于洛邑皆序其所當祭者雖祀典不載而義當祀者亦序而祭之也吕氏曰定都之初肇舉盛禮大饗羣祀雖祀典不載者咸秩序而祭之有告焉有執焉有祈焉始建新都昭假上下告成事也雨𤾉時若大役以成報神賜也自今以始永奠中土祈鴻休也後世不知祭祀之義鬼神之德觀周公首以祀于新邑為言若濶於事情者抑不知人主臨鎮新都之始齊祓一心對越天地達此精明之德放諸四海無所不準而助祭諸候下逮胞翟之賤亦皆有孚顒若收其放而合其離蓋格君心萃天下之道莫要於此冝周公以為首務也輯録自此以下漸不可曉蓋不知是何時所言𫝊疏以為王與公俱在洛對問之言葉氏以為王得卜而至洛既祭復歸鎬因留周公君守而周公有此言皆不可考然葉氏說後數章貫穿今從之書說纂注復齊董氏曰易曰歸薦之上帝禮有殷祭殷奠皆取殷盛之義新安陳氏曰王氏謂此殷禮疑即篇末十二月戊辰之祭史述其語於前而記其事於後也竊意十二月之祭不過以周公留治洛之事就冬蒸以告文武耳此曰殷禮曰秩無文乃非常盛禮豈十二月之祀足以當之三月後以至十一月王必當親至洛行大祀禮今脫去矣自此下至無逺用戾乃洛邑既成公自洛歸鎬告王以宅洛所當行之事及欲退老之辭也肇稱殷禮以下乃周公至鎬請王往新邑舉祀禮及朝諸候證之召誥公至洛定宅後當還鎬京觀召公取諸侯之幣錫公由公以達王則可見矣孺子其朋以下必冇訛誤脫簡漏却王祀新邑必在此處無疑也豫齊百工伻從王于周豫惟曰庶有事周公言于整齊百官使從成王于周謂將適洛時也豫惟謂之曰庶幾其有所事乎公但微示其意以待成王自教詔之也輯録此本其攝政時言也齊百工謂百官總已以聼也周謂宗周也言我所總百官因使之從王于周而我則未敢歸周恐新邑之冇事也書說纂注夏氏曰王祭于新邑我則整齊百官使從王往新邑惟謂百官言汝從王而往庶幾必冇事於周欲禮樂自天子出也新安陳氏曰周公言我今整齊共營洛之百官使從王于宗周我惟謂之曰王庶幾將適新邑而有事乎國之大事在祀與戎故古人於祭祀皆曰有事公但微示王將行祀事於洛之意於百官以待王之自教詔之也今王即命曰記功宗以功作元祀惟命曰汝受命篤弼功宗功之尊顯者祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之蓋功臣皆祭於大蒸而勳勞之最尊顯者則為之冠故謂之元祀周公教成王即命曰記功之尊顯者以功作元祀矣又惟命之曰汝功臣受此褒賞之命當益厚輔王室蓋作元祀既以慰答功臣而又勉其左右王室益圖久大之業也丕視功載乃汝其悉自教工丕大視示也功載者記功之載籍也大視功載而無不公則百工效之亦皆公也大視功載而或出於私則百工效之亦皆私也其公其私悉自汝教之所謂乃汝其悉自教工也上章告以褒賞功臣故戒其大視功載者如此輯録今王乃命曰我嘗記人之功而尊之又以此功因新邑殷祀而告之神明矣王氏曰記功蓋若紀于太常藏在盟府之類王言成王又命我曰汝周公受先王之命而厚輔我大視功載則可見矣凡我所自教之功方我之朋猶言大史友內史友友郭冢君也功載記功之書也王似欲留百工於洛以聽周公命成王與周公言未嘗汝之此周公述王言故變公稱汝也書說今王即命曰至元祀為一節惟命曰至孺子其朋為一節纂注吕氏曰洛邑既成周業既定論創業之勳不可後也功臣之冠天下觀瞻鎮服羣下實繫此舉論功莫先於宗言宗則凡功臣可得而推矣報功莫重於祀言祀則凡慶賞可得而推矣陳吳氏曰己死者祀之其生者則載以旌賞之新安氏曰公因告王今當即出命曰新邑之祀將記録創業功臣之宗勳勞最顯者以其功列之大祀使與享矣又當專命羣臣曰汝之受命而能厚輔王室者亦將大視其功而紀載之於冊書以功作元祀者所以報功臣於既往丕視功載者所以勵功臣於方來載之今日又當祀之後日也公又謂王言上即命惟命二說乃汝其悉自教詔於百工其機雖自公發之其教當自王出之也孺子其朋孺子其朋其往無若火始焰焰厥攸灼叙弗其絶孺子稚子也朋比也上文百工之視效如此則論功行賞孺子其可少徇比黨之私乎孺子其少徇比黨之私則自是而往有若火然始雖焰焰尚微而其灼爍將次第延爇不可得而撲滅矣言論功行賞徇私之害其初甚徴其終至於不可遏絶所以嚴其辭而禁之於未然也輯録周公言既如此則孺子往矣但汝所朋不可不慎焰火始然尚微而方進之貌灼焚也叙次第也書說一孺子其朋其往起纂注林氏曰如漢之朋黨始於甘陵南北部唐之朋黨始於牛李其終縉紳稔禍海內塗炭是也句新安陳氏曰自此以下必脫誤所當闕疑如二孺子及灼叙語皆不可曉與上下文亦不相貫姑存舊說厥若彞及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭其順常道及撫國事常如我為政之時惟用見在周官勿參以私人往新邑使百工知上意嚮各就有僚明白奮揚而赴功惇厚博大以裕俗則王之休聞亦永有辭于後世矣輯録戒成王歸宗周其所順之常道及撫臨衆事皆當如我所行也在周百工皆我所總齊者習於事當惟用此人慎終之道當如此也一言我今往新邑既使嚮就其有僚矣明作有功之事務為惇大之道以成寬裕之政則汝亦長有寬裕之辭於後世矣言往者如云來相宅順王所在而言趨事赴功常失之急薄故又言惇大成裕以救其失書說節厥若彝至在用工為一節往新邑至汝永有辭為一纂注吕氏曰漢文近於惇大成裕而無所謂明作有功漢宣近於明作有功而無所謂惇大成裕新安陳氏曰厥若彞及撫事如豫伻嚮即有僚亦不可曉惟以在周工往新邑乃是欲王以從王于周之百工往之新邑也此八字却有照應公曰已汝惟沖子惟終周之王業文武始之成王當終之也此上詳於記功教工內治之事此下則統御諸侯教養萬民之道也輯録周公言已矣乎汝成王惟沖子當惟其終猶伊尹言慎厥終也書說汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮此御諸侯之道也百辟諸侯也享朝享也儀禮物幣也諸侯享上有誠有僞惟人君克敬者能議之識其誠於享者亦識其不誠於享者享不在幣而在於禮幣有餘而禮不足亦所謂不享也諸侯惟不用志於享則國人化之亦皆謂上不必享矣舉國無享上之誠則政事安得不至於差爽僭侮隳王度而為叛亂哉人君可不以敬存心辨之於早察之於微乎輯録享朝而以幣享王誠以奉上之辭幣有餘而禮不及者往往有輕上之心以為可以幣交也曰吾幣足矣何以禮為如是者猶不享也云云如是則是成王實啓此亂而遺周公以憂勤不暇也書說詳見蔡傳至不暇為一節纂注蘇氏曰小人賄以悅人必簡於禮公戒王責諸侯以禮不以幣恐其役志乎物而不役志乎禮則諸侯慢而王室輕矣此治亂之本故公特言之春秋𫝊曰晋趙文子為政薄諸侯之幣而重其禮晋穆叔曰自今以往兵其少弭矣夫以列國之卿輕幣重禮猶足以弭兵王而賄其致冦也必矣唐之衰君相皆可以賄取方鎮爭貢羡餘行苞苴而天子始失其政以至於亡周公之戒至矣取新安胡氏曰此因將往新邑朝諸侯而言亦因召公諸侯之幣旅王而言也乃惟孺子頒朕不暇聽朕教汝于棐民彞汝乃是不蘉乃時惟不永哉篤叙乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無遠用戾此教養萬民之道也頒朕不暇未詳或曰成王當頒布我汲汲不暇者聽我教汝所以輔民常性之道汝於是而不勉焉則民彞泯亂而非所以長久之道矣正父武王也猶今稱先正云者篤者篤厚而不忘叙者先後之不紊言篤叙武王之道無不如我則人不敢廢汝之命矣吕氏曰武王沒周公如武王故天下不廢周公之命周公去成王如周公則天下不廢成王之命戾至也王往洛邑其敬之哉我其退休田野惟明農事益公有歸老之志矣彼謂洛邑也王於洛邑和裕其民則民將無逺不至焉輯録周公戒成王使聽我教汝以輔民常性之道若汝不勉則不能永保天命也然則所以輔民常性者惟在乎勉而已一說乃惟孺子頒朕不暇連此假言成王不聽我言是分我以不暇也廢篤叙汝武王之所行無不如豫之所以厚叙者我不汝自教工之命汝往歸宗周汝其敬叙武王之事而我留於此修后稷先公之業明農事以教民亦王業艱難之意也我民裕矣則彼殷民以教民為裕亦無有逺而不至者書說節聼朕至永哉為一節篤叙至用戾為一纂注息齊余氏曰說命先正訓為先世長官之臣此指武王而引先正為比何也或曰武王撥亂反正故稱為正父新安陳氏曰此一節除汝往敬哉兹豫其明農哉二句外皆不可曉皆當闕之味此二句可見公時在鎬欲王往新邑而已將退老也此章之下當必有公從王至新邑舉祀發命之事而今闕矣王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師此下成王答周公及留公也大抵與上章參錯相應明顯明之也保保佑之也稱舉也和者使不乖也恆者使可久也居師者宅其衆也言周公明保成王舉大明德使其上之不忝於文武仰不愧天俯不怍人也輯録居師營洛邑定民居也書說纂注新安胡氏曰此王既至洛舉祀後與公言將留公治洛先叙述公之功德以慰藉之也惇宗將禮稱秩元祀咸秩無文宗功宗之宗也下文宗禮同將大也纂注孔氏曰厚尊大禮舉秩大祀蘇氏曰惇宗厚族也將禮秉禮也言此數事皆賴公之功而成也宗陳氏大猷曰禮者人所宗而尊者故伯夷典禮曰秩春官典禮曰宗伯惇厚人所宗而將秉其禮也下文未定于宗禮亦謂制作未定所以言未定人所宗尊之禮也新安陳氏曰此蓋王述已行之事之辭即答公所謂王肇稱殷禮祀于新邑咸秩無文也惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀旁無方所也因上下四方為言穆穆和敬也迓迎也言周公之德昭著于上下勤施于四方旁作穆穆以迎治平不迷失文武所勤之教于天下公之德教加于時者如此豫沖子夫何為哉惟早夜以謹祭祀而已蓋成王知周公有退休之志故示其所以留之之意也輯録穆穆和敬之貌天子之容旁作謂周公輔成已德以迎迓太平之治而不迷于先王之教書說纂注陳氏大猷曰不曰已太平方且和敬以迓之己治猶未治也使以為既平則無亹亹方進之意盈而不可久矣蘇氏曰祭則我沖子政則周公成王言我歸宗周毖祀而已略唐孔氏曰衛獻公云政由寧氏祭則寡人亦猶是王曰公功棐迪篤罔不若時言周公之功所以輔我啓我者厚矣當常如是未可以言去也輯録公之功輔導我已厚矣無不若是以上所稱也書說王曰公豫小子其退即辟于周命公後此下成王留周公治洛也成王言我退即居于周命公留後治洛蓋洛邑之作周公本欲成王遷都以宅天下之中而成王之意則未欲捨鎬京而廢祖宗之舊故於洛邑舉祀發政之後即欲歸居于周而留周公治洛謂之後者先成王之辭猶後世留守留後之義先儒謂封伯禽以為魯後者非是考之費誓東郊不開乃在周公東征之時則伯禽就國蓋已久矣下文惟告周公其後其字之義益可見其為周公不為伯禽也輯録上文王曰兩假周公無答辭疑有闕文成王言我當歸即政于宗周而命公留於洛猶唐節度留後之意書說先生云史丞相說書亦有好處如命公後衆說亦皆云命伯禽為周公之後史云成王既歸命周公在後看公定豫往已一言便見得是周公旦在後之意卓纂注真氏曰案史記魯世家伯禽即位之後管蔡等反淮夷徐戎亦竝興於是伯禽帥師伐之於盻遂平徐戎據此則蔡說當矣新安陳氏曰成王自謂其退即辟于周味退之一字則王時進在洛邑可知據身在洛邑言故以還歸宗周為退退固王之謙辭亦述往返語勢之當然耳先儒於此皆忽之故不敢質言此章為王至洛後之辭也四方迪亂未定于宗禮亦未克敉公功宗禮即功宗之禮也亂治也四方開治公之功也未定功宗之禮故未能敉公功也敉功者安定其功之謂即下文命寧者也輯録迪順也四方雖已順治猶未定于尊公之禮未有以撫治公之功書說迪將其後監我士師工誕保文武受民亂為四輔將大也周公居洛啓大其後使我士師工有所監視大保文武所受於天之民而治為宗周之四輔也漢三輔蓋本諸此今案先言啓大其後而繼以亂為四輔則命周公留後於洛明矣輯録周公在後監我百官士也師也工也四輔猶四鄰書說纂注新安陳氏曰王制曰設四輔及三公四輔左輔右弼前疑後丞也引王制之四輔解此四輔亦與朱子四鄰之說合王以治為四輔之大臣望公下文公以治為四方之新辟望王君臣交相期望意相照應蔡氏引漢三輔為比豈成周之時亦有四輔郡如漢京兆馮翊扶風之可枚舉者乎王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享定爾雅曰止也成王欲周公止洛而自歸往宗周言周公之功人皆肅而將之欽而悅之冝鎮撫洛邑以慰懌人心母求去以困我也我惟無厭其安民之事公勿替所以監我士師工者四方得以世世享公之德也吳氏曰前漢書兩引公無困哉皆以哉作我當以我為正輯録此王與公決而歸之言也公定居洛豫往歸周已公功敬云云公無困哉言公無以事自因猶漢所謂閔勞公以官職之事也我則當無厭倦於安國安民之事公但勿廢其所以儀刑四方者則四方其世享矣書說纂注張氏曰公之功如此猶肅敬以自將謂不驕矜人皆敬之樂之公真氏曰公功如此而猶以肅自將以敬自樂可以見之盛德王氏炎曰無困猶無倦謂無倦而欲去勿替其所以示儀刑於我者去一說世享世世尊享我周無困勿替皆欲公留而勿之意周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭此下周公許成王留等事也來者來洛邑也承保乃文祖受命民及光烈考武王者答誕保文武受民之言也責難於君謂之恭𢎞朕恭者大其責難之義也輯録此王歸後使人來勞周公公拜受之辭也書說孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中又萬邦咸休惟王有成績典典章也殷獻民殷之賢者也言當大厚其典章及殷之獻民蓋文獻者為治之大要也亂治也言成王於新邑致治為四方新主也作周恭先者人君恭以接下以恭而偈後王也公又言其自是宅中圖治萬邦咸底休美則王其有成績矣此周公以治洛之效望之成王也纂注新安胡氏曰孺子來相宅乃公述王之此行也作周恭先為周家恭敬之王之先以恭而率先後之為王者也曰者公期望於王之辭其自時中乂其即將然之辭也豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德多子者衆卿大夫也唐孔氏曰子者有德之稱大夫皆稱子師衆也周公言我以衆卿大夫及治事之臣篤厚文武成功以答天下之衆也孚信也作周孚先者人臣信以事上以信而倡後人也考成也昭子猶所謂明辟也親之故曰子刑儀刑也單殫也言成我明子儀刑而殫盡文王之德蓋周公與羣臣篤前人成烈者所以成成王之刑乃殫文祖德也此周公以治洛之事自效也纂注吕氏曰於王言恭先於已言孚先考察也察我告子之言乃盡本於文祖之德蓋文德之精微皆在此自加考察可也而新安陳氏曰作周孚先為周家孚信之臣之先以信率先後之為臣者也亂為四方新辟當與亂為四輔對觀作周孚先當與作周恭先對觀益公與王交相期望各盡責任之辭考朕昭子刑即答前公勿替刑之言此云昭示成王之儀刑則勿替刑其為勿替示成王以儀刑可見矣蔡氏以昭子為如所謂明辟恐未當陳氏大猷曰此處上下疑冇闕文伻來毖殷乃命寧豫絶句以秬鬯二卣曰明禋拜手稽首休享此謹毖殷民而命寧周公也秬黑黍也一稃二米和氣所生鬯鬱金香草也卣中尊也明潔禋敬也以事神之禮事公也蘇氏曰以黑黍為酒合以鬱鬯所以祼也宗廟之禮莫盛於祼王使人來戒敕庶殷且以秬鬯二卣綏寧周公曰明禋曰休享者何也事周公如事神明也古者有大賔客以享禮禮之酒清人渴而不飲肉乾人飢而不食也故享有體薦豈非敬之至者則其禮如祭也歟纂注新安陳氏曰自此至萬年其永觀朕子懷德乃王歸鎬後使人來勞周公公因祭文武而全載其祝辭也寧如歸寧父母之寧曰明禋拜手稽首休享者述王命使之辭曰此明潔以禋祀之酒今拜稽而致休美以享公焉敬之至者其禮如祭𫝊曰享有體薦一證也記曰君子敬則用祭器又一證也豫不敢宿則禋于文王武王宿與顧命三宿之宿同禋祭名周公不敢受此禮而祭於文武也纂注息齊余氏曰顧命宿訓為進爵孔氏說也唐孔氏申其義以為進爵於神前今謂豫不敢宿與此同殊不可曉意者與上文𫝊意不相接寧豫之訓既從蘇氏則豫不敢宿之義只合並從蘇氏不宿於家之說方為通不然則既不敢進爵於神前而又曰禋于文武何邪惠篤叙無有遘自疾萬年厭于乃德殷乃引考此祭之祝辭周公為成王禱也惠順也篤叙與篤叙乃正父同順篤叙文武之道身其康强無有遘遇自罹疾害者子孫萬年厭飽乃德殷人亦永夀考也王伻殷乃承叙萬年其永觀朕子懷德承聽受也叙教條次第也王使殷人承叙萬年其永觀法我孺子而懷其德也蓋周公雖許成王留洛然且謂王伻殷者若曰遷洛之民我固任之至於使其承叙萬年則實繫于王也亦責難之意與召誥末用供王能祈天永命語脉相類纂注新安陳氏曰惠篤叙至朕子懷德此祝辭全文蔡氏分為二節似不以末二句為祝辭何也惠篤至乃德此公自致禱祝之辭也殷乃至懷德此公為王禱祝之辭也雖曰祝辭然禱祝之中有規勉之意末二句歸重於王非徒徼福於先王而已之張氏曰觀此書周公不敢當成王秬鬯之禮則天子禮樂公其敢當乎所以春秋於魯之郊禘皆貶其僭則成王之賜伯禽之受其失可見豈周公之所敢安乎戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賔殺禋咸格王入太室祼此下史官記祭祝冊誥等事以附篇末也戊辰十二月之戊辰日也是日成王在洛舉蒸祭之禮曰歲云者嵗舉之祭也周尚赤故用騂宗廟禮太牢此用特牛者命周公留後於洛故舉盛禮也逸史佚也作冊者冊書也逸祝冊者史逸為祝冊以告神也惟告周公其後者祝冊所載更不他及惟告周公留守其後之意重其事也王賔猶虞賔杞宋之屬助祭諸侯也諸侯以王殺牲禋祭祖廟故咸至也太室清廟中央室也祼灌也以圭瓉酌秬鬯灌地以降神也王命周公後作冊逸誥在十有二月逸誥者史逸誥周公治洛留後也在十有二月者明戊辰為十二月日也惟周公誕保文武受命惟七年吳氏曰周公白留洛之後凡七年而薨也成王之留公也言誕保文武受民公之復成王也亦言承保乃文祖受命民越乃光烈考武王故史臣於其終計其年曰惟周公誕保文武受命惟七年蓋終始公之辭云纂注張氏曰公輔成王大保文武所受命至此為七年矣新安陳氏曰此三節史臣記王在洛以留公在後治洛之事祭告文武及命公也戊辰先儒謂七年十二月晦日唐孔氏推之謂此歲三月丙午朏閏九月辛未朔小則十二月三十日戊辰晦周十二月建亥之月也其言良是上言逸祝冊告文武之冊也下云作冊逸誥告命周公之冊也重其事故既廟祭而冊祝先王又因廟祭而冊命周公也前言戊辰而結以在十有二月明戊辰為十二月之戊辰言十二月而繼以惟周公誕保文武受命惟七年明十二月為此七年之十二月也此乃古史記載倒文法也此章次第當在成王至洛舉大祀行大政之後與公别而歸鎬之前今以尾王歸鎬後遣使寧公之後次序倒矣其錯簡顛倒邪抑史追書之也不可考矣又曰惟七年有二說朱蔡本葉吳說同今從張氏者案禮記云七年致政於成王王肅於金縢篇末云武王年九十三冬十一月崩其明年稱元年周公攝政遭流言東征三年而歸制禮作樂出入四年六年而成七年營洛邑歸政成王武王崩時成王年已十三矣至是年二十王肅此說與記合七年始終鑿鑿可考葉吳留洛七年而後公薨之說未見所據何若捨有據之舊說而從此乎古無年號只得表之曰周公誕保文武受命之七年亦如左氏所謂會於沙隨之歲溴梁之明年之類耳兼之康誥脫簡之惟三月哉生魄蔡𫝊既曰周公攝政七年之三月矣此之惟七年乃曰留洛之後七年而薨豈應攝政至是既當第七年留後至薨又恰七年邪由此言之則知蔡𫝊二處自相抵牾康誥得之而洛誥失之也多士商民遷洛者亦有有位之士故周公洛邑初政以王命總呼多士而告之編書者因以名篇亦誥體也今文古文皆有吳氏曰方遷商民於洛之時成周未作其後王與周公患四方之逺鍳三監之叛於是始作洛邑欲徙周而居之其曰昔朕來自奄大降爾四國民命我乃明致天罰移邇遐逖比事臣我宗多遜者述遷民之初也曰今朕作大邑於兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜者言遷民而後作洛也故洛誥一篇終始皆無欲遷商民之意惟周公既諾成王留治于洛之後乃曰伻來毖殷又曰王伻殷乃承叙當時商民已遷于洛故其言如此愚謂武王已有都洛之志故周公黜殷之後以殷民反覆難制即遷于洛至是建成周造廬舍定疆場乃告命與之更始焉爾此多士之所以作也由是而推則召誥攻位之庶殷其已遷洛之民歟不然則受都今衛州也洛邑今西京也相去四百餘里召公安得捨近之友民而役逺之讎民哉書序以為成周既成遷殷頑民者謬矣吾固以為非孔子所作也纂注吕氏曰遷洛之事召誥經營之洛誥考成之多士則慰安之也張氏曰周之頑民乃商之忠臣也王氏曰篇名多士而序以為頑民何也在官者謂之士卿大夫士是也在民者謂之士士農工商是也此書稱士皆在官之殷士也且周公未始以殷民為頑成王命君陳始有無忿疾于頑之語夫殷民不附周謂之頑可也不忘殷謂之頑可乎故頑之一字周公於康誥酒誥多士多方等書未嘗出諸其口也新安陳氏曰諸家過信小序所以於昔朕來自奄全說不通吳蔡當矣惟三月周公初于新邑洛用告商王士此多士之本序也三月成王祀洛次年之三月也周公至洛久矣此言初者成王既不果遷留公治洛至是公始行治洛之事故謂之初也曰商王士者貴之也纂注孔氏曰周公致政明年三月也夏氏曰于往也或曰于於也王氏曰殷民遷于成周從舊長所治故先告之殷士順從則殷民皆然矣新安陳氏曰蔡氏從孔氏以此三月為祀洛次年之三月皆以書之篇次意料之耳何以知其必然邪案召誥洛誥及脫簡在康誥之日月周公正以七年三月至洛此之三月即彼之三月也得卜經營之後便可告商士矣作書者以此專為告商士而作故自録為一篇而次之洛誥之後豈得以在十有二月已結局了却頭年事而此之三月遂必以為次年事邪七年無兩七年三月亦無兩三月如此解經皆拘蔽自抵牾耳陳氏𫝊良曰此二篇皆稱王若曰則是相宅年之三月作之不待辨而知也王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勑殷命終于帝弗弔未詳意其為歎憫之辭當時方言爾也旻天秩天也主肅殺而言歎憫言旻天大降災害而喪殷我周受眷佑之命奉將天之明威致王罰之公勑正殷命而格之以終上帝之事蓋推革命之公以開諭之也纂注息齊余氏曰弗弔大誥引不弔昊天為訓甚明此以為未詳何也吕氏曰以天言之曰明威以人言之曰王罰陳氏大猷曰勑正殷命之終于帝王氏曰終與受終于文祖之終同肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位肆與康誥肆汝小子封同弋取也弋鳥之弋言冇心於取之也呼多士誥之謂以勢而言我小國亦豈敢弋取殷命蓋栽者培之傾者覆之固其治而不固其亂者天之道也惟天不與殷信其不固殷之亂矣惟天不固殷之亂故輔我周之治而天位自有所不容辭者我其敢有求位之心哉纂注蘇氏曰固如推亡固存之固信矣天之固治不固亂也林氏曰告殷士以天命之公使知殷失天命而亡則誰能興之周得天命而興則誰能違之惟帝不畀惟我下民秉為惟天明畏秉持也言天命之所不與即民心之所秉為民心之所秉為即天威之所明畏者也反覆天民相因之理以見天之果不外乎民民之果不外乎天也詩言秉彞此言秉為者彞以理言為以用言也纂注孔氏曰惟天不與紂惟我下民秉心為我皆是天明可畏之效陳氏經曰紂之惡至於失人心則天命之所去周之德至於下民秉為即天命之所與新安陳氏曰蔡本吕說然孔注為優既曰惟天不畀又曰惟帝不畀既曰將天明威又曰惟天明畏反覆以天命之去留曉殷士而潛消其覬覦猜疑之私耳息齊余氏曰明畏只如臯謨篇所訓為明我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰引導逸安也降格與吕刑降格同吕氏曰上帝引逸者非有形聲之接也人心得其安則亹亹而不能已斯則上帝引之也是理坦然亦何聞於桀第桀喪其良心自不適於安耳帝實引之桀實避之帝猶未遽絶也乃降格災異以示意嚮於桀桀猶不知警懼不能敬用帝命乃大肆淫逸雖有矯誣之辭而天罔念閒之仲虺所謂帝用不臧是也廢其大命降致其罰而夏祚終矣纂注陳氏大猷曰天於人君常欲導之於安逸之地如為善最樂作德日休即帝之引逸也桀乃不適於逸自趨於危也吕氏曰天人之際惟極乃通治極則通格于皇天是亂極亦通惟帝降格是也桀惡升聞故帝降格譴告災異以示所嚮於是覆邦董子曰天心仁愛人君必出災異以警戒之即降格之謂也自絶於天天亦絶之國之元命猶人之元氣有則生無則死者也乃命爾先祖成湯革夏俊民甸四方甸治也伊尹稱湯旁求俊彥孟子稱湯立賢無方蓋明揚俊民分布逺邇甸治區畫成湯立政之大經也周公反復以夏商為言者蓋夏之亡即殷之亡湯之興即武王之興也商民觀是亦可以自反矣纂注新安胡氏曰甸如奄甸萬姓之甸自成湯至于帝乙罔不明德恤祀明德者所以修其身恤祀者所以敬乎神也亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤亦惟天大建立保治有殷殷之先王亦皆操存此心無敢失帝之則無不配天以澤民也纂注薛氏曰無所不浹天之澤也王者宅天下無彼疆此界之殊配天其澤也蔡新安陳氏曰罔敢失帝能體承上天不敢失其心也氏以帝則言求之太深此之罔不明德與下文惟天不畀不明厥德當對觀恤祀與罔失帝配天澤皆自克明德中來也商先王以明德而得天命也如此在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祗後嗣王紂也紂大不明於天道况曰能聼念商先王之勤勞於邦家者乎大肆淫泆無復顧念天之顯道民之敬畏者也惟時上帝不保降若兹大喪大喪者國亡而身戮也惟天不畀不明厥德商先王以明德而天丕建則商後王不明德而天不畀矣凡四方小大邦喪罔非有辭于罰凡四方小大邦國喪亡其致罰皆有可言者况商罪貫盈而周奉辭以伐之者乎纂注吕氏曰天也祖宗也民也自古帝王所共畏也紂不聼念先王罔顧天顯民祗三畏皆亡無所不至矣新安陳氏曰紂之衆惡皆自不明德中來其以不明德而失天命也如此王若曰爾殷多士今惟我周王丕靈承帝事靈善也大善承天之所為也武成言祗承上帝以遏亂略是也有命曰割殷告勑于帝帝有命曰割殷則不得不戡定剪除告其勑正之事于帝也武成言告于皇天后土將冇大正于商者是也惟我事不二適惟爾王家我適上帝臨汝母二爾心惟我事不二適之謂上帝既命候于周服惟爾王家我適之謂言割殷之事非有私心一於從帝而無二適則爾殷王家自不容不我適矣周不二於帝殷其能二於周乎蓋示以確然不可動搖之意而潛消頑民反側之情爾然聖賢事不二適日用飲食莫不皆然蓋所以事天也豈特割殷之事而已哉豫其曰惟爾洪無度我不爾動自乃邑三監倡亂豫其曰乃汝大為非法非我爾動變自爾邑猶伊訓所謂造攻自鳴條也豫亦念天即于殷大戾肆不正豫亦念天就殷邦屢降太戾紂既死武庚又死故邪慝不正言當遷徙也纂注蘇氏曰二適再往也我之有事四方曷嘗有再舉而後定者乎復齊董氏曰肆當作肆赦之肆下文有率肆矜爾則此當言赦其罪而不正治其餘黨類也王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨時是也指上文殷大戾而言謂惟是之故所以遷居西爾非我一人樂如是之遷徙震動也是惟天命如此汝毋違越我不敢有後命謂有他罰爾無我怨也惟爾知惟殷先人有冊有典殷革夏命即其舊聞以開諭之也殷之先世有冊書典籍載殷改夏命之事正如是耳爾何獨疑於今乎今爾又曰夏迪簡在王庭有服在百僚豫一人惟聼用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命周公既舉商革夏事以諭頑民頑民復以商革夏事責周謂商革夏命之初凡夏之士皆啓迪簡拔在商王之庭有服列于百僚之間今周於商士未聞有所簡拔也周公舉其言以大義折之言爾頑民雖有是言然豫一人所聼用者惟以德而已故豫敢求爾於天邑商而遷之於洛者以冀率德改行焉豫惟循商故事矜恤於爾而已其不爾用者非我之罪也是惟天命如此蓋章德者天之命今頑民滅德而欲求用得乎纂注唐孔氏曰從殷適洛南行而西向故為西陳氏曰奉德猶秉德林氏曰故朕不敢有後而稽留爾無以遷居為出於我而怨我也我惟率循湯故事肆赦爾罪而矜憐爾愚遷于王都以式化厥訓此非我之罪也亦惟天命而已陳氏大猷曰迪簡王庭職之大者冇服百僚職之小者聼用德聼察其有德者而用之吕氏曰故我敢以德而求爾于天邑商爾其修德以應我之求不可援前此而必我之爵也商猶謂之天邑者蓋言其地舊為天子之都理當富於賢德敢求亦敬賢之意重其事而敬其辭栽之者固甚正待之者亦甚厚矣孔氏曰故我敢求爾于天邑商將任用之惟我循商故事憐愍汝故徙教汝王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜降猶今法降等云者言昔我來自商奄之時汝四國之民罪皆應死我大降爾命不忍誅戮乃止明致天罰移爾逺居于洛以親比臣我宗周有多遜之美其罰蓋亦甚輕其恩固已甚厚今乃猶有所怨望乎詳此章則商民之遷固已久矣輯録奄東方之國孟注纂注陳氏大猷曰此奄與淮夷三監同助武庚以叛周公東征一舉而誅四國獨言來自奄者伐奄在後誅奄即來也四國殷管蔡霍也以親我事我臣我宗法成周濟濟多遜之盛林氏曰移徙爾自遐逖之地使協比臣事於我家以多為遜順我宗猶言我家自洛而視殷之故地則殷為逺故以遷之於洛謂移爾遐逖也孔氏曰比近臣我宗周多為順道王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜以自奄之命為初命則此命為申命也言我惟不忍爾殺故申明此命且我所以營洛者以四方諸侯無所賔禮之地亦惟爾等服事奔走臣我多遜而無所處故也詳此章則遷民在營洛之先矣吳氏曰來自奄稱昔者逺日之辭也作大邑稱今者近日之辭也移爾遐逖比事臣我宗多遜者期之之辭也攸服奔走臣我多遜者果能之辭也以此又知遷民在前而作洛在後也爾乃尚有爾土爾乃尚寧幹止幹事止居也爾乃庶幾有爾田業庶幾安爾所事安爾所居也詳此章所言皆仍舊有土田居止之辭信商民之遷舊矣孔氏不得其說而以得反所生釋之於文義似矣而事則非也爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬敬則言動無不循理天之所福吉祥所集也不敬則言動莫不違悖天之所禍刑戮所加也豈特竄徙不有爾土而已哉身亦有所不能保矣今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷邑四井為邑之邑繼者承續安居之謂有營為有夀考皆于兹洛焉爾之子孫乃興自爾遷始也夫自亡國之末裔為起家之始祖頑民雖愚亦知所擇矣纂注馬氏曰幹如言根本可恃也新安陳氏曰蔡𫝊多用吕說盡之矣惟釋不啻不有爾土加竄徙二字尤善王曰又曰時豫乃或言爾攸居王曰之下當冇闕文以多方篇末王曰又曰推之可見時我或有所言皆以爾之所居止為念也申結上文爾居之意纂注王氏炎曰王曰下必有脫簡又曰下必有脫文不可強解愚謂多士一書中言興喪則由於天言天命則繫於德言德則本於敬終之以爾土爾邑有恆産者有恆心而非誘之以利也無逸逸者人君之大戒自古有國家者未有不以勤而興以逸而廢也益戒舜曰罔游于逸罔淫于樂舜大聖也益猶以是戒之則時君世主其可忽哉成王初政周公懼其知逸而不知無逸也故作是書以訓之言則古昔必稱商王者時之近也必稱先王者王之親也舉三宗者繼世之君也詳文祖者耳目之所逮也上自天命精微下至畎畝艱難閭里怨詛無不具載豈獨成王之所當知哉實天下萬世人主之龜鑑也是篇凡七更端周公皆以嗚呼發之深嗟永歎其意深逺矣亦訓體也今文古文皆有纂注張氏曰周召之於成王所陳在敬所戒在逸蓋敬則不逸逸則不敬敬逸之分而歷年之延否享國之夀夭判焉召公以敬陳於前周公以無逸戒於後不如是不足以為周召此吕氏曰逸者禍亂之源三年東征以定外亂特治其末流耳無逸者治源之書也無逸作於作洛之後成王即政之初陳氏大猷曰逸者萬惡之根無逸者萬善之本無逸一書所以為百代元龜周公曰嗚呼君子所其無逸所猶處所也君子以無逸為所動靜食息無不在是焉作輟則非所謂所矣輯録萍鄉柳兄言吕東萊解無逸一篇極好先生扣之曰伯恭如何解君子所其無逸桞兄曰吕東萊解所字為居字先生曰若某則不敢如此說諸友請曰先生將如何說先生曰恐有脫字則不可知若說不行而必强立一說雖若可觀只恐道理不如此蓋卿纂注孔氏曰君子之道所在其無逸豫能吕氏曰凡人乍勤乍怠亦有無逸之時然能暫而不居非所其無逸者也惟君子以無逸為所如魚之於水鳥之於林有不可得而離者焉謂陳氏大猷曰所若北辰居其所之所蓋居而不移之李氏杞曰所安也猶止其所之所所其無逸安於無逸也子新安陳氏曰所其無逸與王敬作所不可不敬德朱皆不欲以處所安居之意釋之懼其巧鑿非古人之本意也然吕說為可喜外此則孔注所在之說林氏亦本之此外則無說矣所以吕說朱子非之而蔡氏仍本之真氏記無逸內却全不取吕蔡之說大學衍義中則又全采吕說云先知稼穡之艱難乃逸則知小人之依先知稼穡之艱難乃逸者以勤居逸也依者指稼穡而言小民所恃以為生者也農之依田猶魚之依水木之依土魚無水則死木無土則枯民非稼穡則無以生也故舜自耕稼以至為帝禹稷躬稼以有天下文武之基起於后稷四民之事莫勞於稼穡生民之功莫盛於稼穡周公發無逸之訓而首及乎此冇以哉纂注林氏曰惟知稼穡之艱難為念面不留意於逸者乃所以能逸蓋好逸者未必能逸無逸者乃能逸也吕氏曰此非始於憂勤終於逸樂之論也蓋言先備嘗稼穡之艱難乃處於安逸則深知小人之所依未嘗知稼穡之艱難而遽處安逸興一宫室起一力役視若易然而民有不得其死者矣成王生於深宫遽處人上公深為之懼故以此章警之若以始勤終逸釋之是乾健之體有時而息矣後世漸不克終之患未必非此論啓之南軒張氏曰周自后稷以農事開國厯世相傳相與咨嗟歎息服習乎艱艱而詠歌其勞苦此實王業之根本也周公之告成王詩有七月皆言農桑之候書冇無逸欲其知稼穡知小人之依帝王所𫝊心法之要端在於此夫治常生於敬畏而亂常起於驕逸使為國者每念稼穡之艱難而心不存焉者寡矣是心常存則驕矜逸豫何自而生豈非治之所由興歟後陳氏大猷曰所其無逸知小人之依此一篇之綱領章言三宗文王及怨詈之事皆反覆推明乎此也相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知不知稼穡之艱難乃逸者以逸為逸也俚語曰諺言視小民其父母勤勞稼穡其子乃生於豢養不知稼穡之艱難乃縱逸自恣乃習里巷鄙語既又誕妄無所不至不然則又訕侮其父母曰古老之人無聞無知徒自勞苦而不如所以自逸也昔劉裕奮農畝而取江左一再𫝊後子孫見其服用反笑曰田舍翁得此亦過矣此正所謂昔之人無聞知也使成王非周公之訓安知其不以公劉后稷為田舍翁乎纂注蘇氏曰農夫之子生而飽暖且不知艱難而况於王乎玉南史宋髙祖劉裕孫孝武帝駿壞髙祖所居隂室為燭殷牀頭有土障壁上掛葛燈籠麻蠅拂袁顗因盛稱髙祖儉德上曰田舍翁得此已為過矣周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年中宗太戊也嚴則莊重恭則謙抑寅則欽肅畏則戒懼天命即天理也中宗嚴恭寅畏以天理而自檢律其身至於治民之際亦祗敬恐懼而不敢怠荒安寧中宗無逸之實如此故能有享國永年之效也案書序太戊有原命咸又等篇意述其當時敬天治民之事今無所考矣纂注孔氏曰以敬畏之故得夀考之福下文言逸樂之損夀吕氏曰上既論無逸之理此復舉無逸之君以示之法此中宗無逸之實嚴恭寅畏合而言之敬也因桑穀而修省亦其畏天命之一端天人一理既畏天命必不敢輕下民祗懼不敢荒寧皆敬也惟敬故夀也主靜則悠逺博厚自强則堅實精明操存則血氣循軌而不亂收斂則精神內固而不浮至於儉約克治去戕賊之纍又不待言凡此皆敬之方夀之理也自此至文王其夀莫非此理李氏杞曰無逸必寡欲寡欲而不夀者鮮矣逸樂必多欲多欲而能全生者亦鮮矣既以無逸致夀者為之勸又以逸樂損壽者為之戒使前有所慕後有所警有所慕則知無逸之可法有所警則知逸樂之不可縱其在髙宗時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆髙宗之享國五十有九年髙宗武丁也未即位之時其父小乙使久居民間與小民出入同事故於小民稼穡艱難備嘗知之也雍和也發言和順當於理也嘉美靖安也嘉靖者禮樂教化蔚然於安居樂業之中也漢文帝與民休息謂之靖則可謂之嘉則不可小大無時或怨者萬民咸和也乃雍者和之發於身嘉靖者和之達於政無怨者和之著於民也餘見說命髙宗無逸之實如此故亦有享國永年之效也纂注吕氏曰三年不言聖賢之君未必盡然故謂之乃或是或一道也小大無怨民氣大和導迎和氣是亦夀考之理又發此意以申勸成王下章論文王咸和萬民亦是意也篇末二章之論違怨詛祝怨詈實申此意而盡發之張氏曰不敢荒寧則志氣凝定精神純一此長年之基民心大和導迎善氣又所以致長年也蓋神氣耗散則根本不固厲氣外襲則天和日消有一于此皆足致夭其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年史記髙宗崩子祖庚立祖庚崩弟祖甲立則祖甲髙宗之子祖庚之弟也鄭𤣥曰髙宗欲廢祖庚立祖甲以為不義逃於民間故云不義惟王案漢孔氏以祖甲為太甲蓋以國語稱帝甲亂之七世而殞孔氏見此等記載意為帝甲必非周公所稱者又以不義惟王與太甲兹乃不義文似遂以此稱祖甲者為太甲然詳此章舊為小人作其即位與上章是暨小人作其即位文勢正類所為小人者皆指微賤而言非謂憸小之人也作其即位亦不見太甲復政思庸之意又案邵子經世書髙宗五十九年祖庚七年祖甲三十三年世次厯年皆與書合亦不以太甲為祖甲況殷世二十有九以甲名者五帝以太以小以沃以陽以祖别之不應二人俱稱祖甲國語𫝊訛承謬旁記曲說不足盡信要以周公之言為正又下文周公言自殷王中宗及髙宗及祖甲及我周文王及云者因其先後次第而枚舉之辭也則祖甲之為祖甲而非太甲明矣纂注真氏曰祖甲或以為太甲或以為帝甲今考之經世書二君享國皆三十三年其曰不義惟王舊為小人其為太甲明矣蘇氏以享國多寡為次此說得之吕氏曰商去周未逺故公以王耳目所接者言之安林氏曰不言湯而言三宗繼世之君與成王同也新陳氏曰太甲帝甲二君皆有證據而太甲較分明經世書與三及字皆不足援以為辨太甲為商賢君萬萬不可磨何苦極力挽從來無人齒及之帝甲以排太甲乎否則兩說姑竝存之自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克夀或十年或七八年或五六年或四三年過樂謂之耽泛言自三宗之後即君位者生則逸豫不知稼穡之艱難不聞小人之勞惟耽樂之從伐性喪生故自三宗之後亦無能夀考逺者不過十年七八年近不者五六年三四年爾耽樂愈甚則享年愈促也凡人莫欲壽而惡夭此篇專以享年永不永為言所以開其所欲而禁其所當戒也纂注蘇氏曰人莫不好逸欲而其所甚好者生也以其所甚好禁其所好庶幾必信然猶有不信者以逸豫為未必害生也漢武帝唐明皇豈無欲者哉而夀如此夫多欲不享國者皆是也武帝明皇千一而已豈可專望乎此哉吕氏曰憂勤者必夀逸豫者必夭此周公格言大訓非特以戒成王實萬世人主之龜鑑也蓋人之一心苟有所操存則精神思慮日由乎天理之中其夀固可必孔子所謂仁者夀詩人所謂樂只君子萬壽無期亦即其理而推之耳後世之君憚憂勤而恣逸樂伐性傷生靡所不至乃欲慕神仙之術以求長年何其愚之甚也歟葵初王氏曰蘇氏之說於經有助使好逸者無以漢武明皇藉口吕氏求神仙延壽之說三代前未有也然亦可備經筵進讀之一義周公曰嗚呼厥亦惟我周太王王季克自抑畏商猶異世也故又即我周先王告之言太王王季能自謙抑謹畏者蓋將論文王之無逸故先述其源流之深長也大扺抑畏者無逸之本縱肆怠荒皆矜誇無忌憚者之為故下文言文王曰柔曰恭曰不敢皆原太王王季抑畏之心發之耳纂注陳氏大猷曰克自者真能自用其力而人不與也抑者所以下之也如制忿欲去奢侈皆是也畏敬畏也人所以肆行無畏不能自抑故也抑其私欲惟義是從則必畏天命畏祖宗畏小民矣文王卑服即康功田功卑服猶禹所謂惡衣服也康功安民之功田功養民之功言文王於衣服之奉所性不存而專意於安養斯民也卑服蓋舉一端而言宫室飲食自奉之薄皆可類推纂注孔氏曰就田功以知稼穡之艱難徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民徽懿皆美也昃日映也柔謂之徽則非柔懦之柔恭謂之懿則非足恭之恭文王有柔恭之德而極其微懿之盛和易近民於小民則懷保之於鰥寡則惠鮮之惠鮮云者鰥寡之人垂首喪氣賚豫賙給之使之有生意也自朝至于日之中自中至于日之昃一食之頃有不遑暇欲咸和萬民使無一不得其所也文王心在乎民自不知其勤勞如此豈秦始皇衡石程書隋文帝衛士𫝊餐代有司之任者之為哉立政言罔攸兼于庶言庶獄庶慎則文王又若無所事事者不讀無逸則無以知文王之勤不讀立攻則無以知文王之逸合二書觀之則文王之所從事可知矣輯録舜功問徽柔懿恭是一字是二字先生曰二字上輕下重柔者須徽恭者須懿柔而不徽則姑息恭而不懿則非由中出可學又曰柔易於暗弱徽有發揚之意恭形於外懿則有蘊藏之意文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年遊田國有常制文王不敢盤遊無度上不濫費故下無過取而能以庶邦惟正之供於常貢正數之外無橫斂也言庶邦則民可知文王為西伯所統庶邦皆有常供春秋貢於霸主者班班可見至唐猶有送使之制則諸候之供方伯舊矣受命言為諸候也中身者漢孔氏曰文王九十七而終即位時年四十七言中身舉全數也上文崇素儉恤孤獨勤政事戒遊佚皆文王無逸之實故其享國有歷年之永纂注吕氏曰凡有血氣患於上陵必學問以下之抑損祇畏以自下則用力於無逸深矣力不分於奉己故功全歸於恤民惠澤之使鮮鮮有生意盤遊田曰不敢翼翼之小心也此章言文王家法凡無逸之條目如崇儉素重農畝恤窮困勤政事戒遊田損橫斂大略皆備其稱文王之夀即前章之意以此為防後世猶為文王憂勤損夀之說以啓人主之好逸如鄭𤣥者周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供則法也其指文王而言淫過也言自今日以往嗣王其法文王無過于觀逸遊田以萬民惟正賦之供上文言遊田而不言觀逸以大而包小也言庶邦而不言萬民以逺而見近也無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉無與毋通皇與遑通訓法若順則法也毋自寬假曰今日姑為是耽樂也一日耽樂固若未害然下非民之所法上非天之所順時人大法其過逸之行猶商人化受而崇飲之類故繼之曰毋若商王受之迷亂酗于酒德哉酗酒謂之德者德有凶有吉韓子所謂道與德為虗位是也纂注吕氏曰雖戒成王實欲後嗣共守此訓故以繼自今嗣王言觀覽以舒其目安逸以休其身遊豫以省風俗田獵以習武備人君不能無也不可過爾過則人欲肆而入於亂亡矣故公使之無淫過于此必絶之使無則迫蹙拘制矣觀逸遊田橫斂之源四者既省用有常經自應以萬民惟正之供始耽樂者毋自恕曰今日耽樂爾是心一流將一日二日浸浸終身不返矣苟不戒一日之耽樂必至為紂之徒無皇曰今日耽樂蓋原淫樂之始使之深絶其微無若殷王受蓋要淫荒之終使知必至此極始終備矣林氏曰隱公觀魚莊公觀社觀也唐敬宗日晏坐朝逸也周穆所至有車轍馬跡遊也太康畋洛表田也皆淫於此者真氏曰前舉三宗後舉文王俾王知所法又舉紂俾王知所戒紂之惡無不有酗酒其最也人無智愚皆知憂勤必享國逸欲必戕生惟沈湎于酒心志昏亂則雖死亡在前亦不知畏故欲無逸則不可酗酒酗酒則必不能無逸公所以專以此申戒也薛氏曰今日耽樂與詩所謂一醉日富同義周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻胥相訓誡惠順譸誑張誕也變名易實以眩觀者曰幻歎息言古人德業已盛其臣猶且相與誡告之相與保惠之相與教誨之保惠者保養而將順之非特誡告而已也教誨則有規正成就之意又非特保惠而已也惟其若是是以視聼思慮無所蔽塞好惡取子明而不悖故當時之民無或敢誑誕為幻也纂注吕氏曰訓告教誨皆見於言語保惠則調護於日用功用相表裏也新安胡氏曰訓誨忠言也譸張邪說也忠言交進則邪說莫行此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝正刑正法也言成王於上文古人胥訓告保惠教誨之事而不聼信則人乃法則之君臣上下師師非度必變亂先王之正法無小無大莫不盡取而紛更之蓋先王之法甚便於民甚不便於縱侈之君如省刑罰以重民命民之所便也而君之殘酷者則必變亂之如薄賦斂以厚民生民之所便也而君之貪侈者則必變亂之厥心違怨者怨之蓄于中也厥口詛祝者怨之形於外也為人上而使民心口交怨其國不危者未之有也此蓋治亂存亡之機故周公懇懇言之纂注陳氏大猷曰承上章無怨咸和之意遂及於違怨詛祝唐孔氏曰請神加殃謂之詛以言告神謂之祝真氏曰篇中有兩至于小大恐當作一義上言至于小大無時或怨下言至于小大民否則厥心違怨蓋皆為民而言周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人迪哲迪蹈哲智也孟子以知而弗去為智之實迪云者所謂弗去是也人主知小人之依而或忿戾之者是不能蹈其知者也惟中宗髙宗祖甲文王允蹈其知故周公以迪哲稱之厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒詈罵言也其或有告之曰小人怨汝詈汝汝則皇自敬德反諸其身不尤其人其所誣毁之愆安而受之曰是我之愆允若時者誠實若是非止隱忍不敢藏怒也蓋三宗文王於小民之依心誠知之故不暇責小人之過言且因以察吾身之未至怨詈之語乃所樂聞是豈特止於隱忍含怒不發而已哉纂注唐孔氏曰皇大大自敬德針朱氏方大曰聞謗而自反以敬德則凡怨詈之來皆砭之益吾方資之以自反何止不敢含怒於心而已苟非發於中心之誠惟不敢含怒而止則是僅能恕人之言而未盡反己之功也陳氏大猷曰君至明故能如此凡聞謗而責人皆不明所致也此厥不聼人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身綽大叢聚也言成王於上文三宗文王迪哲之事不肯聼信則小人乃或誑誕變置虛實曰小民怨汝詈汝汝則聼信之則如是不能永念其為君之道不能寬大其心以誑誕無實之言羅織疑似亂罰無罪殺戮無辜天下之人受禍不同而同於怨皆叢於人君之一身亦何便於此哉大扺無逸之書以知小人之依為一篇綱領而此章則申言既知小人之依則當蹈其知也三宗文王能蹈其知故其胸次寬平人之怨詈不足以芥蒂其心如天地之於萬物一於長育而已其悍疾憤戾天豈私怒於其問哉天地以萬物為心人君以萬民為心故君人者要當以民之怨詈為己責不當以民之怨詈為己怒以為己責則民安而君亦安以為己怒則民危而君亦危矣吁可不戒哉纂注林氏曰以譸張之說妄殺如幽厲之監謗秦立誹謗法之類夏氏曰向之怨詈猶冇限也至此普天同怨是怨叢於一身矣民氣如此欲享國長久得乎此意蓋在言外也范氏曰明君惟聽正直故讒慝之言不入於耳暗君好聽讒侫故欺誑之言日至於前人君當修德以弭怨不可以刑殺止怨以刑殺止怨怨之愈甚大決所潰不可收拾矣壞吕氏曰無逸始以逸豫為戒終則以棄忠言惑邪說法度冶誹謗結之惟無逸然後能去是病而所以保無逸者亦不過戒是數者也新安陳氏曰末章承上章以論處怨詈之道然召民和而使自無時或怨上也因怨言而自反次也以殺罰止怨而怨業無次矣周公以怨詈等事寬廣君心而伸舒民氣其為邦本國脉計豈淺淺哉周公曰嗚呼嗣王其監于兹兹者指上文而言也無逸一篇七章章首皆先致其咨嗟詠嘆之意然後及其所言之事至此章則於嗟歎之外更無他語惟以嗣王其監於兹結之所謂言有盡而意則無窮成王得無深警於此哉纂注愚謂此篇挈所其無逸以為之網而分先知稼穡艱難與不知艱難以為之目此一書之大㫖也商三君先知艱難者也後王生則逸不知艱難者也周三王先知艱難者也戒嗣王之觀逸逰田懼其不知艱難也逺引古人恐不盡信故尤欲其師文王懲商紂以耳日所及者為言焉真萬世之龜鑑哉君奭召公告老而去周公留之史氏録其告語為篇亦誥體也以周公首呼君奭因以君奭名篇篇中語多未詳今文古文皆冇唐案此篇之作史記謂召公疑周公當國踐祚孔氏謂召公以周公嘗攝王政今復在臣位葛氏謂召公未免常人之情以爵位先後介意故周公作是篇以諭之陋哉斯言要皆為序文所誤獨蘇氏謂召公之意欲周公告老而歸為近之然詳本篇㫖意乃召公自以盛滿難居欲避權位退老厥邑周公反覆告諭以留之爾熟復而詳味之其義固可見也輯録顯道問召公不悅之意先生曰召公不悅只是小序恁地說襄面却無此意這只是召公要去後周公去留他說道朝廷不可無老臣又問先生曰此等語不可曉先生曰這箇只是大綱綽挣箇意脉了便恁地說了不要逐箇字去討便無理會處這箇物事難理會義剛召公不悅這意思曉不得若論事了儘未在看來是見成王己臨政便也小定了許多事周公自可了得所以求去庚召公不悅蓋以為周公歸政之後不當復留而已亦老而當去故周公言二人不可不留之意曰嗚呼君己曰時我我亦不敢寧於上帝命弗逺念天威越我民罔尤違又厯道古今聖賢倚賴老成以固其國家之事又曰豫不惠若兹多誥豫惟用憫於天越民只此便見周公之心至此末嘗不喟然太息也試於此等處虛心求之如何答徐元聘纂注吕氏曰召公不疑周公前輩辨之悉矣以盛滿而欲去周公反覆留之後世權位相軋之際排之使去者有之挽之使留者鮮矣大臣之秉心公則深恐無助私則惟恐不專也又曰成功不可居洛邑成而周公告歸召公亦同此心也已而成王留周公公幡然改矣召公猶守欲退之心也周公遂力留之及其既喻非非暫留於一時終相成王且相康王身任託孤之責而不辭惟不苟於隨所以篤於信也陳氏大猷曰或謂周公去朝廷居洛邑而召公獨執政柄所以亦有去志今以洛誥君陳諸書考之周公固居洛以化殷民以無逸蔡仲諸書考之則周公未嘗不在朝以輔成王意其往來鎬洛之間也方是時洛邑雖成而殷民尚未孚四方雖定而天命人心猶未固周公所以諄諄於留召公歟周公若曰君奭君者尊之之稱奭召公名也古人尚質相與語多名之弗弔天降喪於殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出於不祥不祥者休之反也天既下喪亡於殷殷既失天命我有周既受之矣我不敢知曰其基業長信於休美乎如天果輔我之誠耶我亦不敢知曰其終果出於不祥乎不案此篇周公留召公而作此其言天命吉凶雖曰我敢知然其懇惻危懼之意天命吉凶之决實主於召公留不留如何也纂注吕氏曰自後世之私觀之殷之禍周之福也述殷之喪亡亦曰弗弔聖賢公天下之心也人之於天或恃而不自修或歡而不自强謂永孚於休恃而不自修也意天必福己也謂終出不祥懼而不自强也意天必禍己也皆非也嗚呼君己曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知尤怨違背也周公歎息言召公己嘗曰是在我而已周公謂我亦不敢苟安天命而不永逺念天之威於我民無尤怨背違之時也天命民心去就無常實惟在人而已今召公乃忘前日之言翻然求去使在我後嗣子孫大不能敬天敬民驕慢肆侈遏絶佚墜文武光顯可得謂在家而不知乎輯注諸誥多是長句如君奭弗永逺念天威越我民罔尤違只是一句越只是及罔尤違是總說上天與民之意漢藝文志注謂誥是曉論民若不速曉則約束不行便是誥辭如此只是欲民易曉天命不易天難諶乃其墜命弗克經厯嗣前人恭明德天命不易猶詩曰命不易哉命不易保天難諶信乃其墜失天命者以不能經厯繼嗣前人之恭明德也吳氏曰弗克恭故不能嗣前人之恭德遏佚前人光故不能嗣前人之明德在今豫小子旦非克有正迪惟前人光施于我冲子吳氏曰小子自謙之辭也非克有正亦自謙之辭也言在今我小子旦非能有所正也凡所開導惟以前人光大之德使益焜耀而付於冲子而已以前言後嗣子孫遏佚前人光而言也又曰天不可信我道惟寧王德延天不庸釋于文王受命又曰者以承文言天命不易天難諶此又申言天不可信故曰又曰天固不可信然在我之道惟以延長武王之德使天不容捨文王所受之命也纂注新安胡氏曰此章大意謂今日天命人心未為固成王之經厯未為深吾等當留而不當去也公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸又王家在祖乙時則有若巫賢在武丁時則有若甘盤時則有若者言當其時有如此人也保衡既伊尹也見說命太戊太甲之孫伊陟伊尹之子臣扈與湯時臣扈二人而同名者也巫氏咸名祖乙太戊之孫巫賢巫咸之子也武丁髙宗也草盤見說命吕氏曰此章序商六臣之烈蓋勉召公匹休於前人也伊尹佐湯以聖輔聖其治化與天無間伊陟臣扈之佐太戊以賢輔賢其治化克厭天心自其遍覆言之謂之天自其主宰言之謂之帝書或稱天或稱帝各隨所指非有輕重至此章對言之則聖賢之分而深淺見矣巫咸止言其乂王家者咸之為治功在王室精微之蘊猶有愧於二臣也亡書有咸乂四篇其乂王家之實歟巫賢甘盤而無指言者意必又次於巫咸也配蘇氏曰殷有聖賢之君七此獨言五下文云殷禮陟天豈配祀於天者止此五王而其臣偕配食於廟乎在武丁時不言𫝊說豈𫝊說不配食於配天之王乎其詳不得而聞矣纂注陳氏曰湯初勝夏已有臣扈湯至太戊百三十年必二臣而名同也詩有家父春秋又有家父亦此類傅復齊董氏曰言甘盤者高宗舊學之臣不吕說即氏曰捨說言甘盤盤源也說委也息齊余氏曰言下文不言尚父之意率惟兹有陳保乂有殷故殷禮陟配天多厯年所陟升遐也言六臣循推此道有陳列之功以保乂有殷故殷先王終以德配天而享國長久也纂注葉氏曰以其祭上陟而配天猶言郊祀后稷以配天宗祀文王於明堂以配上帝唐孔氏曰多厯年之次所天惟純祐命則商實百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故一人有事于四方若卜筮罔不是孚佑助也實虛實之實國有人則實孟子言不信仁賢則國空虛是也稱舉也亦秉持之義事征代會同之類承上章六臣輔君格天致治遂言天祐命有商純一而不雜故商國有人而實內之百官著姓與夫王臣之微者無不秉持其德明致其憂外之小臣與夫藩屏侯甸矧皆奔走服役惟此之故惟德是舉用乂其君故君有事於四方如龜之卜如蓍之筮天下無不敬信之也纂注孔氏曰天大佑助其王命使商家百姓豐實自湯至武丁其王人無不持德吕氏曰明恤猶易之顯比顯然以至公撫恤天下在內則逮於卑賤之小人在外則均屏藩之侯甸思浹內外公平周溥斯乃所秉之君德也後之君嬖昵左右如幽王之私趣馬偏愛一國如平王之二於虢非不恤之可謂之明恤乎用乂者規諫針誨以治之也新安胡氏曰百姓句王人謂王者明恤屬下句從孔吕為優王氏炎曰商大臣事業至於有為而罔不孚今四國多方諄諄告命猶懼不信召公豈可求去公曰君奭天夀平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦吕氏曰坦然無私之謂平格者通徹三極而無間者也天無私夀惟至平通格於天者則夀之伊尹而下六臣能盡平格之實故能保乂有殷多厯年所至於殷紂亦嗣天位乃驟罹滅亡之威天曽不私夀之也固命者不墜之天命也今召公勉為周家久永之念則有天之固命其治效亦赫然明著於我新造之邦而身與國俱顯矣纂注孔氏曰言天夀有平至之君故安治有殷殷嗣子紂不能平至天滅亡加之有威今汝長念平至者安治反是者滅亡以為法鑒則有堅固王命其治理足以明我新成國矣新安陳氏曰有殷嗣天滅威等語聱牙艱澀本不可解不如闕之蔡𫝊亦未為的保乂有殷强拈六臣經有是意乎公曰君奭在昔上帝割申勸寧王之德其集大命于厥躬申重勸勉也在昔上帝降割於殷申勸武王之德而集大命於其身使有天下也纂注夏氏曰天初勸文王又勸武王故曰申勸如詩序言故天復命武王也真氏曰文王羑里之難乃天之降割其降割也乃所以申勸文王之德也文王生知者本不待勸而天乃降割以勉之故曰申勸新安陳氏曰割中勸寧王之德禮記緇衣作周田觀文王之德記固訛矣書果是乎寧王孔注以為文王蔡𫝊以為武王果武王也則下接惟文王尚克修和我有夏必有闕文矣惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括虢叔文王弟閎散泰南宫皆氏夭宜生顛括皆名言文王庶幾能修治燮和我所有諸夏者亦惟有虢叔等五臣為之輔也康誥言一二邦以修無逸言用咸和萬民即文王修和之實也又曰無能往來兹迪彛教文王蔑德降于國人蔑無也夏氏曰周公前既言文王之興本此五臣故又反前意而言曰若此五臣者不能為文王往來奔走於此導迪其常教則文王亦無德降及於國人矣周公反覆以明其意故以又曰更端發之亦惟純祐秉德迪知天威乃惟時昭文王迪見冒聞于上帝惟時受有殷命哉言文王有此五臣者故亦如殷為天純佑命百姓王人罔不秉德也上既反言文王若無此五臣為迪彛教則亦無德下及國人故此又正言亦惟天乃純佑文王蓋以如是秉德之臣蹈履至到實知天威以是昭明文王啓迪其德使著見於上覆冒於下而升聞於上帝惟是之故遂能受有殷之天命也纂注息齊余氏曰孔云文王秉德蓋天佑秉德之君也武王惟兹四人尚迪有祿後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱德虢叔先死故曰四人劉殺也單盡也武王惟此四人庶幾迪有天祿其後暨武王盡殺其敵惟此四人能昭武王遂覆冒天下天下大盡稱武王之德謂其逹聲教於四海也文王冒西土而已丕單稱德惟武王為然於文王言命於武王言祿者文王但受天命至武王方富有天下也吕氏曰師尚父之事文武烈莫盛焉不與五臣之列蓋一時議論或詳或略隨意而言主於留召公而非欲為人物評也纂注吕氏曰此四人尚蹈有祿位言故老猶存也林氏曰死者稱不祿四人猶及武王之世故曰尚迪有祿今在豫小子旦若游大川豫往暨汝奭其濟小子同未在位誕無我責收罔朂不及耉造德不降我則鳴鳥不聞矧曰其有能格小子旦自謙之稱也浮水曰游周公言承文武之業懼不克濟若浮大川罔知津涯豈能獨濟哉豫往與汝召公其共濟可也小子成王也成王幼冲雖已即位與未即位同誕大也大無我責上疑有闕文牧罔勗不及未詳耉造德不降言召公去則耉老成人之德不下於民在郊之鳯將不復得聞其鳴矣况敢言進此而有感格乎是時周方隆盛鳴鳯在郊卷阿鳴於髙岡者乃詠其實故周公云爾也纂注夏氏曰大無盡責於我一人息齊余氏曰古注其濟小子句通收罔勗不及吕云召公若收斂退藏罔勗勉成王之所不逮亦通張子曰耉造德降則民諴和而鳯可致故鳴鳥聞所以為和氣之應也王氏炎曰文王之興鳯鳴岐山為周受命之符召公苟去固不能如五臣輔文王以聞鳴鳯之祥况能如伊陟臣扈之格天格帝乎公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷肆大猷謀也兹指上文所言周公歎息欲召公大監視上文所陳也我文武受命固有無疆之美矣然迹其積纍締造蓋亦艱難之大者不可不相與竭力保守之也告君謀所以寬裕之道勿狹隘欲去我不欲後人迷惑而失道也吕氏曰大臣之位百責所萃震撼擊撞欲其鎮定辛甘燥濕欲其調齊盤錯棼結欲其解紓黯暗汚濁欲其茹納自非曠度洪量與夫患失乾沒者未嘗無翩然捨去之意况召公親遭大變破斧缺斨之時屈折調護心勞力瘁又非平時大臣之比顧以成王未親政不敢乞身耳一旦政柄有歸浩然去志固人情之所必至然思文武王業之艱難念成王守成之無助則召公義未可去也今乃汲汲然求去之不暇其迫切已甚矣蓋謀所以寬裕之道圖功攸終展布四體為久大規模使君德開明未可捨去而聼後人之迷惑也纂注鄭氏曰召公不恱似隘急故令謀於寬裕所吕氏曰周公自言我終不獨善而使後人迷惑自言以不去者以勉召公也至陳氏曰不以後人迷謂欲使後人嗣前人恭明德不于遏佚前人光也新安陳氏曰不以後人迷如以其君霸以其君顯之以留而明保啓迪成王是不以後人迷也去而聽其迷惑是以後人迷也公曰前人敷乃心乃悉命汝作汝民極曰汝明勗偶王在亶乘兹大命惟文王德丕承無疆之恤偶配也蘇氏曰周公與召公同受武王顧命輔成王故周公言前人敷乃心腹以命汝召公位三公以為民極且曰汝當明勉輔孺子如耕之有偶也在於相信如車之有馭也并力心以載天命念文考之舊德以丕承無疆之憂武王之言如此而可以去乎纂注孔氏曰文武布其乃心乃悉以命汝矣為汝民立中正矣汝明勉配王在於誠信行此大命而已惟文王聖德為之子孫無忝厥祖大承無疆之憂張氏曰臣者君之偶如婦者夫之偶陳氏曰乘載也猶負荷也則吕氏曰命作民極置之具瞻以為民極也其命之辭曰汝明明勉勵以偶配輔佐後王命之大如此在今當亶誠以乘載此大命不可失墜今而遽去是墜此命非乘此命矣又欲其追念文王眷遇之德為我周大受無窮之憂責洛誥周公之復留實以文武之故今召公欲去周公復舉文武以感動之新安陳氏曰以命汝為武王顧命則兹大命竟指為武王之命為安然蘇以汝明至之恤純為武王之言故以大命為天命也不若吕只以汝明勗偶王一句為武王之言為優然此等偶王亶乘語實艱澀不可解略認大意可也公曰君告汝朕允保奭其汝克敬以豫監于殷喪大否肆念我天威大否大亂也告汝以我之誠呼其官而名之言汝能敬以我所言監視殷之喪亡大亂可不大念我天威之可畏乎豫不允惟若兹誥豫曰曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬德明我俊民在讓後人于丕時戡勝也戡堪古通用周公言我不信於人而若此告語乎豫惟曰王業之成在我與汝而已汝聞我言而有合哉亦曰在是二人但天休滋至惟是我二人將不堪勝汝若以盈滿為懼則當能自敬德益加寅畏明揚俊民布列庶位以盡大臣之職業以答滋至之天休毋徒惴惴而欲去為也他日在汝推遜後人于大盛之時超然肥遁誰復汝禁今豈汝辭位之時乎輯録襄我二人周公自謂己與召公經說纂注王氏曰大臣之善在乎讓讓則必推賢揚善而無妨功害能此所以能明俊民去陳氏經曰今時未至盛大未有賢俊可讓召公未可也大臣進退常以得人為慮有賢者可以讓則身可以退蕭何且死必引曹參管仲不能薦賢所以不免于議也新安陳氏曰讓字貫俊民字謂明俊民而讓之較優嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾周公復歎息言篤于輔君者是我二人我用能至于今日休盛然我欲與召公共成文王功業於不怠大覆冒斯民使海隅日出之地無不臣服然後可也周都西土去東為逺故以日出言吳氏曰周公未嘗有其功以其留召公故言之蓋叙其所已然而勉其所未至亦人所說而從者也纂注陳氏大猷曰伐淮夷踐奄在此書後可見當時未能罔不率俾也右二章以文武留召公也公曰君豫不惠若兹多誥豫惟用閔于天越民周公言我不順于理而若兹諄復之多誥邪豫惟用憂天命之不終及斯民之無賴也韓子言畏天命而悲人窮亦此意前言若兹誥故此言若兹多誥周公之告召公其言語之際亦可悲矣纂注夏氏曰天命難諶民心難保大臣去留繫天命之從違民心之向背今召公欲去實周公之憂也所陳氏大猷曰召公去則天命將替民生失此周公所閔也公曰嗚呼君惟乃知民德亦罔不能厥初惟其終祗若兹往敬用治上章言天命民心而民心又天命之本也故卒章専言民德以終之周公歎息謂召公踐厯諳練之久惟汝知民之德民德謂民心之嚮順亦罔不能其初今日固罔尤違矣當思其終則民之難保者尤可畏也其祗順此誥往敬用治不可忽也此召公已留周公飭遣就職之辭厥後召公既相成王又相康王再世猶未釋其政有味于周公之言也夫纂注陳氏經曰借民情以為喻也民情每勤始怠終此乃召公所熟知安可以此自處當惟其終可也語曰行百里者半九十言晚節末路之難也張氏曰召公初輔成王有始矣而求去不能終也可愚謂一書之中首言憂國之心非人所知次言天民畏惟人是賴又次言殷先王與我文武得人之助然文王時五人至武王時四人今又惟我二人而已君若求去豈我一人所能戡哉憂之深是以留之切留之􅋀是以言之詳召公同功一體之人均有忠君愛國之心者也安得不油然而感幡然而留哉蔡仲之命蔡國名仲字蔡叔之子也叔沒周公以仲賢命諸成王復封之蔡此其誥命之辭也今文無古文有案此篇次序當在洛誥之前惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡周公位冢宰正百工武王崩時也郭鄰孔曰曰中國之外地名蘇氏曰郭虢也周禮六遂五家為鄰管霍國名武王崩成王幼周公居冢宰百官總已以聽者古今之通道也當是時三叔以主少國疑秉商人之不靖謂可惑以非義遂相與流言倡亂以搖之是豈周公之身之利害乃欲傾覆社稷塗炭生靈天討所加非周公所得已也故致辟管叔于商致辟云者誅戮之也囚蔡叔于郭鄰以車七乘囚云者制其出入而猶從以七乘之車也降霍叔于庶人三年不齒三年之後方齒録以復其國也三叔刑罰之輕重因其罪之大小而已仲叔之子克常敬德周公以為卿士叔卒乃命之成王而封之蔡也周公留佐成王食邑于圻內圻內諸侯孟仲二卿故周公用仲為卿非魯之卿也蔡左傳在淮汝之間仲不别封而命邦之蔡者所以不絶叔于蔡也封仲以他國則絶叔於蔡矣吕氏曰象欲殺舜舜在側微其害止于一身故舜得遂其友愛之心周公之位則繫於天下國家雖欲遂友愛于三叔不可得也舜與周公易地皆然史臣先書惟周公位冢宰正百工而繼以羣叔流言所以結正三叔之罪也後言蔡仲克庸祗德周公以為卿士叔卒即命之王以為諸侯以見周公蹙然于三叔之刑幸仲克庸祗德則亟擢用分封之也吳氏曰此所謂冢宰正百工與詩所謂攝政皆在成王諒閽之時非以幼沖而攝而其攝也不過位冢宰之位而已亦非荀卿所謂攝天子位之事也三年之喪二十五月而畢方其畢時周公固未嘗攝亦非有七年而後還政之事也百官總已以聽冢宰未知其所從始如殷之髙宗已然不惟周公行之此皆論周公者所當先知也輯録安卿問周公誅管蔡自公義言之其心固正大直截自私恩言之其情終有不自滿處所以孟子謂周公之過不亦宜乎先生曰是但他豈得已哉莫到恁地較好看周公當初做這一事也大段疏脫他也看那兄弟不過本是怕武庚叛故遣管蔡霍叔去監他為其至親可恃不知他反去與武庚同作一黨不知如何紂出得箇兒子也恁地狡猾想見他當時日夜去炒那管叔說云周公是你的弟今却欲篡為天子汝是兄今却只恁地管叔被他炒得心熱他性又急所以便發出這件事來李堯卿問是時可調護莫殺否曰他已叛只得殺如何調護得蔡叔霍叔性較慢罪較輕所以只囚于郭鄰降于庶人想見當時被管叔做出這事來騷動許多百姓想見也怕人鴟梟鴟梟既取我子無毁我室當時也是被他害得猛如常棣一詩却是後來制禮作樂時作這是先被他害所以當天下平定後更作此詩故其辭哀􅋀不似諸詩和平義剛曰周公也豈不知管叔狡猾但當時于義不得不封他曰看來不是狡猾只是呆子書說周公使三叔監殷他却與武庚叛此是一段大疏脫事若當時不便平息得模樣做出西晉初年時事想見武庚日夜去說誘三叔以為周公弟也却在周作宰相管叔兄也却去監商故管叔生起不肖之心如此庚纂注史記武王同母兄弟十人長伯邑考次武王次管叔鮮次周公次蔡叔度次霍叔處孔氏曰蔡仲能用敬德稱其賢也明王之法誅父用子言至公也叔之所封圻內之蔡仲之所封淮汝之間圻內之蔡名已滅故取其名以名新國欲其戒之唐孔氏曰管在滎陽京縣東北不立管叔之後者罪重或無子或有而不賢也杜預曰武王封叔度于汝南上蔡胡徙新蔡昭侯徙九江下蔡圻內蔡地不知所在不齒不得與兄弟年齒相次閔元年晉滅霍故知復其舊封夏氏曰古一里之地出車一乘謂以出車七乘地所出之賦以奉之蓋既囚之又不可無以養之張氏震曰象得罪于舜安得不貸之以恩管叔得罪于周安得不斷之以義霍叔不絶其身蔡叔不絶其子而管叔獨不免誅絶恩與義並行而不悖也林氏曰蔡叔有罪則囚之不以弟而私蔡仲賢而封之不以父而棄葉氏曰舜殛鯀而興禹周公囚蔡叔而命仲一也魏氏曰左傳定公四年云蔡仲改行帥德周公舉之以為己卿士己字極好玩味可見周公大聖人蔡叔有罪而囚之有子仲祗德則以為己卿士真與天地同其大也自東萊發此義蘇氏曰蔡叔未卒仲無君國之理蒯瞶在而輒立衛所以亂所以封仲必在叔卒之後息齊余氏曰案召誥傳中謂洛邑告成成王始政故召公以自服土中為言多方內辨臣我監五祀曰成周既成而成王即政云云與此所引吳氏之說皆所不合王若曰小子胡惟爾率德改行克慎厥猷肆豫命爾侯于東土往即乃封敬哉胡仲名言仲循祖文王之德改父蔡叔之行能謹其道故我命汝為侯于東土往就汝所封之國其敬之哉吕氏曰敬哉者欲其無失此心也命書之辭雖稱成王實周公之意爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彛訓無若爾考之違王命蔡叔之罪在于不忠不孝故仲能掩前人之愆者惟在於忠孝而已叔違王命仲無所因故曰邁迹自身克勤無怠所謂自身也垂憲乃後所謂邁迹也率乃祖文王之彝訓無若爾考之違王命上文所謂率德改行也纂注呂氏曰子之新善著則父之舊愆庶乎可掩蔡叔之惡既無以貽子孫仲乃一國始封之祖創業垂統之責繫焉蓋追其祖武自我作古克勤無怠以垂法于後斯須之怠則流弊或至于數百年後不可不謹其源也張氏曰邁迹自身謂生于羣叔之間而能脫身自立為善及陳氏傅良曰舜命禹未嘗戒以鯀周公命微子未嘗武庚今命仲而尤其父者於越人疏之于其兄戚之也父子兄弟之間猶有諱而不敢盡言是愈疏矣成王於仲親親之道也有禹則鯀得以郊張湯杜周烈矣以其有後得不列于酷吏蔡仲在人其謂叔曰幸哉有子如此歟故曰蓋前人之愆新安陳氏曰子能改父之惡而為善則孝矣為子而孝斯為臣而忠古人云求忠臣于孝子之門是惟忠本于惟孝也克勤無怠以垂憲乃後即所謂邁迹自身此一語不必分也皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉此章與伊尹申誥太甲之言相類而有淺深不同者太甲蔡仲之有間也善固不一端而無不可行之善惡亦不一端而無可為之惡爾其可不戒之哉纂注新安陳氏曰此與伊尹告太甲之言語意正同蔡氏謂有深淺不同以太甲蔡仲之有間不曉所謂慎厥初惟厥終終以不困不惟厥終終以困窮惟思也窮困之極也思其終者所以謹其始也纂注吕氏曰建國之始必審其始而思其終終始具舉然後可久可大而不至于困徒謹初而不思其終則終必困窮雖葸然憂懼無益也語以謹始而即援以慮終竭兩端之教也陳氏大猷曰仲率德改行能謹初矣尤當克勤無怠是在于惟厥終也而張氏曰感激者多鋭于初怠于終懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民勉汝所立之功親汝四鄰之國蕃屏王家和協同姓康濟小民五者諸侯之之所當盡也率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則豫一人汝嘉率循也毋無同詳審也中者心之理而無過不及之差者也舊章者先王之成法厥度者吾身之法度皆中之所從出者作聰明則喜怒好惡皆出于私而非中矣其能不亂先王之舊章乎戒其本於已者然也側言一偏之言也視聽不審惑于一偏之說則非中矣其能不改吾身之法度乎戒其狥于人者然也仲能戒是則我一人汝嘉矣吕氏曰作聰明者非天之聰明特沾沾小智耳作與不作而天人判焉纂注陳氏經曰舊章法度皆中之所寓度即舊章也舊章則已然之法度則當然之制無非中也周公慮仲懲創乃父之愆用意過當反以生事為竒故有此戒曰夏氏曰率皆也自從也謂凡事皆從中道也尤吕氏舊章往往不與新進喜事者合故作聰明者欲亂之聽覽不貴于速而貴于詳迎刃立決見事風生宜若可喜然忽略疏快動皆愆尤讒說姦言每乘其忽遽而入之惟詳其視聽安徐審訂表裏畢陳側媚之言將不得售故詳者乃聽覽之大法也規矩準度未至於樂循理者則常若為其縶維側言乃解其縶維而縱之放逸之場者故從之也輕仲以英妙之年任國事周公老成深慮故戒之如此私陳氏大猷曰內不變于己之私智外不變于人之言則中道合而侯職盡矣王曰嗚呼小子胡汝往哉無荒棄朕命飭往就國戒其毋廢棄我命汝所言也纂注愚謂此篇大體與微子之命相似而微子之辭溫厚蔡仲之辭嚴厲蓋微子先代之後周賔而不臣又本賢人也蔡仲父為不道忠孝兩虧已無足法所望仲能率祖德改父行邁迹自身以垂憲乃後耳蓋以拳拳圗終之說且戒之以無亂舊章無改法度無同歸于亂嗚呼仁哉多方成王即政奄與淮夷又叛成王滅奄歸作此篇按費誓言徂兹淮夷徐戎並興即其事也疑當時扇亂不特殷人如徐戎淮夷四方容或有之故及多方亦誥體也今文古文皆有多蘇氏曰大誥康誥酒誥梓材召誥洛誥多士方八篇雖所誥不一然大略以殷人心不服周而作也豫讀泰誓武成常怪周取殷之易及讀此八篇又怪周安殷之難也多方所告不止殷人乃及四方之士是紛紛焉不心服者非獨殷人也豫乃今知湯已下七王之德深矣方殷之虐人如在膏火中歸周如流不暇念先王之德及天下粗定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也夫以西漢道德比之殷猶碔砆之與美玉然王莽公孫術隗囂之流終不能使人忘漢光武成功若建瓴然使周無周公則亦殆矣此周公之所以畏而不敢去也纂注林氏曰奄即淮夷之一種總言則謂之淮夷如春秋赤狄之有潞氏甲氏也周公攝政時奄嘗與三監同叛多士曰昔朕來自奄已嘗征之今成王即政奄又叛成王滅之而歸鎬京諸侯來朝周公又稱王命以告之故作此篇唐孔氏曰雖普告多方意在殷之舊國勞吕氏曰自大誥至多方所以處殷民者何其也武王崩以喜亂之徒因思舊之情乘內難之隙三者參合其禍至此是固周之不造實則天之大扶持保祐有周者也人之稚齒百疾先見則必過加調護凡伐性傷生者一切不敢萌所以培固真源克登上壽者少年多疾之力也成周八百年之基業可於此占之多士多方辭㫖相出入多士既遷殷民而獨告新民也故視多方為略多方既踐奄而遍告庶邦也故視多士為詳惟五月丁亥王來自奄至于宗周成王即政之明年商奄又叛成王征滅之杜預云奄不知所在宗周鎬京也吕氏曰王者定都天下之所宗也東遷之後定都于洛則洛亦謂之宗周衛孔悝之鼎銘曰隨難于漢陽即宫于宗周是時鎬已封秦宗周蓋指洛也然則宗周初無定名隨王者所都而名耳纂注孔氏曰周公歸政之明年淮夷奄又叛魯征淮夷作費誓王征奄滅之五月還鎬京新安陳氏曰洛誥戊辰王在新邑孔注十二月戊辰晦此七年之十二月即成王即政之年也多士作于是年二月曰昔朕來自奄是述東征時事乃自武王誅紂伐奄後第二畨叛也多方作于即政之明年五月成王政序曰成王遂踐奄多方序曰王歸自奄書曰王來自奄乃奄之第三畨叛王墮其地遷其君又因以告多方也以去年十二月戊辰晦算之則次年正月朔己巳五月朔非丁卯則戊辰丁亥非二十日即二十一日也多士與多方之作先後蓋一年有三月云周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知吕氏曰先曰周公曰而復曰王若曰何也明周公𫝊王命而非周公之命也周公之命誥終于此篇故發例於此以見大誥諸篇凡稱王曰者無非周公𫝊成王之命也成王滅奄之後告諭四國殷民而因以曉天下也所主殷民故又専提殷侯之正民者告之言殷民罪應誅戮我大降宥爾命爾宜無不知也洪惟圗天之命弗永寅念于祀圗謀也言商奄大惟私意圗謀天命自底滅亡不深長敬念以保其祭祀吕氏曰天命可受而不可圗圗則人謀之私而非天命之公矣此蓋深示以天命不可妄干乃多方一篇之綱領也下文引夏商所以失天命受天命者以明示之纂注吕氏曰遍告四方者何也殷奄屢叛驅扇者廣今雖平殄譬餘邪遺疾猶或在肺腑間恐或有時而發也故渙發大號厯叙天命之公前代之事征誅安集之本末俾四方咸與聞之大破羣疑深絶亂根蓋本于是兵寢刑措者四十餘年其亦訓誥之助歟惟帝降格于夏有夏誕厥逸不肯戚言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞言帝降災異以譴告桀桀不知戒懼乃大肆逸豫憂民之言尚不肯出諸口况望其有憂民之實乎勸勉也迪啓迪也視聽動息日用之間洋洋乎皆上帝所以啓迪開導斯人者桀乃大肆淫昏終日之間不能少勉于是天理或幾乎息矣况望有惠迪而不違乎此乃爾之所聞欲其因桀而知紂也厥逸與多士引逸不同者猶亂之為亂為治耳逸豫以民言淫昏以帝言各以其義也此章上疑有闕文纂注王氏曰惟帝降格于夏與惟帝降格嚮于時夏同意此息齊余氏曰真氏乙記云降格者言帝本降格也如則不必言有闕文矣厥圗帝之命不克開于民之麗乃大降罰崇亂有夏因甲于內亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑此章文多未詳麗猶日月麗乎天之麗謂民之所依以生者也依于土依于衣食之類甲始也言桀矯誣上天圗度帝命不能開民衣食之原於民依恃以生者一皆抑塞遏絶之猶乃大降威虐于民以增亂其國其所因則始于內嬖蠱其心敗其家不能善承其衆不能大進于恭而大寬裕其民亦惟夏邑之民貪叨忿懫者則日欽崇而尊用之以戕害于其國也纂注孔氏曰麗音栗施也不能開于民之所施政蘇氏曰麗著也奠民之居王政之本民不土著雖堯舜不能使之不亂桀不開衣食之源以定民居也葉氏曰麗附于罪法也古者治獄以附罪為麗故秋官稱各麗其法以議獄訟開明也不克開于民之附法者而大降之罰新安陳氏曰開于民之麗其說不一葉氏較優既與乃大降罰相入又與下文慎厥麗乃勸厥民刑用勸皆相應吕氏曰原其所因蓋始于內亂妹喜之嬖是也天惟時求民主乃大降顯休命于成湯刑殄有夏言天惟是為民求主耳桀既不能為民之主天乃大降休顯命于成湯使為民主而伐夏殄滅之也渙吕氏曰曰求曰降豈真有求之降之者哉天下無統散漫流勢不得不歸其所聚而湯之一德乃所謂顯休命之實一衆離而聚之者也民不得不聚于湯湯不不得不受斯民之聚是豈人為之私哉故曰天求之天降之也惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開純大也義民賢者也言天不與桀者大乃以爾多方賢者不克永于多享以至于亡也言桀于義民不能用其所敬之多士率皆不義之民上文所謂叨懫日欽者同惡相濟大不能明保享于民乃相與播虐于民民無所措其手足凡百所為無一能達上文所謂不克開于民之麗者政暴民窮所以速其亡也此雖指桀多上爾殷侯尹民嘗逮事紂者寧不惕然內愧乎纂注葉氏曰天佑之則曰純佑命不畀之則曰不畀純所林氏曰此篇陳桀紂之亡商周之興皆出于天天之奪非人力所能支天之所豫非人力所能移而其所以為豫奪者以其德與不德耳爾多方當知天命不可有他志也孔氏曰桀之所謂恭人衆士言亂主所任任同己者曰林氏曰保享于民安民而以之享國長久也吕氏義民知義之民也桀之時三宅無義民義民在下雖多何補以爾多方之義民不能永受衆多之服享如負米而飢載泉而渴蓋哀之也百為大不克開欲耕害其耕欲賈害其賈四向皆窮無一能達民窮如此也乃惟成湯克以爾多方簡代夏作民主簡擇也民擇湯而歸之纂注葉氏曰簡如簡在帝心之簡慎厥麗乃勸厥民刑用勸湯深謹其所依以勸勉其民故民皆儀刑而用勸勉也人君之於天下仁而已矣仁者君之所依也君仁則莫不仁矣以至于帝乙罔不明德慎罰亦克用勸明德則民愛慕之謹罰則民畏服之自成湯至于帝乙雖厯世不同而皆知明其德謹其罰故亦能用以勸勉其民也明德謹罰所以謹厥麗也明德仁之本也謹罰仁之政也要囚殄戮多罪亦克用勸開釋無辜亦克用勸德明之而已罰有辟焉有宥焉故再言辟而當罪亦能用以勸勉宥而赦過亦能用以勸勉言辟與宥皆足以使人勉于善也纂注吕氏曰赦而民勸猶可也刑而民亦勸則有默行于刑赦之間者矣每語結之以勸者天下非可驅以智力束以法制惟勸化其民使常有欣欣不自己之意乃維持長久之道也陳氏經曰商家法在明德慎罰明德化民用德其本心慎罰不濫及民用刑不得已也本原既正則或刑或宥皆足以勸民于善刑一也先王用之而使民勸後世用之而為民毒何也先王之刑皆仁之寓後世之刑不仁之具也夫子未嘗不釣弋也而仁見于不綱不射宿之際文王非不搜田也而仁見于一發不再舉之時也今至于爾辟弗克以爾多方享天之命吕氏曰爾辟謂紂也商先哲王世𫝊家法積纍維持如此今一旦至于汝君乃以爾全盛之多方不克坐享天命而亡之是誠可閔也天命至公操則存舍則亡以商先王之多基圗之大紂曽不得席其餘䕃其亡忽焉危微操舍之幾周公所以示天下深矣豈徒曰慰解之而已哉纂注陳氏曰多方一也湯以之而作民主紂不能以之而享天下在所以何如耳王氏曰此言殷之興甚詳言其亡甚略蓋對殷遺民不忍痛言其失也嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷先言嗚呼而後言王若曰者唐孔氏曰周公先自歎息而後稱王命以誥之也庸用也有心之謂釋去之也上文言夏殷之亡因言非天有心于去夏亦非天有心于去殷下文遂言乃惟桀紂自取亡滅也周吕氏曰周公先自歎息而始宣布成王之誥告以見公未嘗稱王也人此篇之始周公曰王若曰復語相承書無此體也至于此章先嗚呼而後王若曰書亦無此體也周公居聖人之變史官豫憂來世𫝊疑襲誤蓋有竊之為口實者故于周公誥命終篇發新例二著周公實未嘗稱王所以别嫌明微而謹萬世之防也纂注夏氏曰誥告以誥辭告之也乃惟爾辟以爾多方大淫圗天之命屑有辭紂以多方之富大肆淫佚圗度天命瑣屑有辭與多士言桀大淫佚有辭義同殷之亡非自取乎以下二章推之此章之上當有闕文纂注孔氏曰惡事盡有辭說布在天下道吕氏曰惡之播于人口者謂之辭惡之未熟大者𫝊瑣屑者未盡舉至惡已熟瑣屑之惡極口厯數一一有辭乃惟有夏圗厥政不集于享天降時喪有邦間之集萃也享享有之享桀圗其政不集于享而集于亡故天降是喪亂而俾有殷代之夏之亡非自取乎纂注唐孔氏曰湯是夏之諸侯故曰有邦乃惟爾商後王逸厥逸圗厥政不蠲蒸天惟降時喪蠲潔蒸進也紂以逸居逸淫湎無度故其為政不蠲潔而穢惡不蒸進而怠惰天以是降喪亡于殷殷之亡非自取乎此上三節皆應上文非天庸釋之語纂注陳氏曰上逸過逸也下逸安逸也謂過逸其安逸猶言安其危林氏曰逸厥逸甚言其逸也猶言醇乎醇進孔氏曰不潔進于善言吕氏曰其不蠲潔日張氏曰蒸升也猶穢德升聞惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽聖通明之稱言聖而罔念則為狂矣愚而能念則為聖矣紂雖昏愚亦有可改過遷善之理故天又未忍遽絶之猶五年之久須待暇寬于紂覬其克念大為民主而紂無可念可聽者五年必有指實而言孔氏牽合嵗月者非是或曰狂而克念果可為聖乎曰聖固未易為也狂而克念則作聖之功知所向方太甲其庶幾矣聖而罔念果至于狂乎曰聖固無所謂罔念也禹戒舜曰無若丹朱傲惟慢遊是好一念之差雖未至于狂而狂之理亦在是矣此人心惟危聖人拳拳告戒豈無意哉輯録艾軒云文字只看易曉處如尚書惟聖罔念作狂惟狂克念作聖不與上下文相似下文便不可曉只看這兩句節或謂性相近習相逺惟上智與下愚不移書中謂惟聖罔念作狂惟狂克念作聖若如此只又有移得者如何文公曰上智下愚不移如狂作聖則有之既是聖人決不到作狂此只是甚言不可不學經說纂注王氏曰操則存舍則亡其心之謂歟思曰睿睿作聖操其心以思所謂念也罔念雖聖可以作狂故克念則狂亦可以作聖林氏曰念不念之間聖狂之所以分也苟其質之聖矣自恃其聖而不之思日復二日天命之性益就雕喪其作狂也何有苟其質之狂矣自恥其狂而思之日復一日天命之性忽然而復其作聖也何有陳氏經曰子曰惟上智與下愚不移書乃曰聖可作狂狂可作聖則可移歟曰孔子之言聖狂之成也其習既成則不移矣書之言聖狂之分也聖狂之分生于一念之頃堯舜而忘兢業豈不趨于狂桀紂而能改過遷善豈不趨于聖孔子雖曰不移實有可移之理但恐下愚自暴自棄不肯移耳肯移之是狂之克念也公言此者明紂之為惡倘一旦改悔天不終棄之也君李氏曰紂惡甚矣天猶待之如此見天心仁愛人自非大無道天皆欲扶持而全安之惟終無悛心所以禍不可遏也皓林氏曰晉武帝以孫皓淫暴有問罪之志王濬曰孫荒淫宜速征伐若一旦皓死更立賢主則强敵也晉武之心惟恐吳之有賢主武王之心惟恐紂之不能改過觀于晉武尤知武王之為德誤新安陳氏曰天惟至子孫必脫之字難通天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之紂既罔可念聽天于是求民主於爾多方大警動以祲祥譴告之威以開發其能受眷顧之命者而爾多方之衆皆不足以堪眷顧之命也惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方典主式用也克堪者能勝之謂也德輶如毛民鮮克舉之言德舉者莫能勝也文武善承其衆克堪用德是誠可以為神天之主矣故天式教文武用以休美簡擇畀付殷命以正爾多方也吕氏曰式教用休者如之何而教之也文武既得乎天天德日新左右逢原其思也若或啓之其行也若或翼之乃天之所以教而用以昌大休明者也非諄諄然而教之也此章深論天下向者天命未定眷求民主之時能者則得之孰有遏汝者乃無一能當天之眷今天既命我周而定于一矣爾猶洶洶不靖欲何為邪明指天命而讋服四海姦雄之心者莫切于是纂注吕氏曰前論夏之亡本于不克靈承于旅此論周之興亦曰靈承于旅文武于德能勝而用之其力過孟賁遠矣漢唐賢主豈無欲布德于天下者惟力薄而奪于私欲故駁而不純是知德非真力則莫能勝莫能用也新安陳氏曰克堪二字下得極有力非有仁以為己任之𢎞兼死而後已之毅不能堪而用之也克堪用之必有非力之力如真積力久之力而後可陳氏大猷曰可為神與天之主山川宗社之得其安三光寒暑之得其序皆人君有以主之今我曷敢多誥我惟大降爾四國民命言今我何敢如此多誥我惟大降宥爾四國民命舉其宥過之恩而責其遷善之實也爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熙天之命夾夾輔之夾介賔介之介爾何不誠信寬裕于爾之多方乎爾何不夾輔介助我周王享天之命乎爾之叛亂據法定罪則瀦其宅收其田可也今爾猶得居爾宅耕爾田爾何不順我王室各守爾典以廣天命乎此三節責其何不如此也纂注吕氏曰教以誠信寬裕惟詐故迫惟誠故裕用陳氏大猷曰乂我周王如乂厥辟之乂謂治其君之事爾乃迪屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圗忱于正爾乃屢蹈不靜自取亡滅爾心其未知所以自愛邪爾乃大宅安天命邪爾乃輕棄天命邪爾乃自為不法欲圗見信于正者以為當然邪此四節責其不可如此也纂注王氏曰我以道迪汝屢矣而猶不靜正陳氏大猷曰自作不典亂綱常之事苟欲人信以為蓋四國從殷以求興復自以為正義也我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜我惟是教告而誨諭之我惟是戒懼而要囚之今至于再至于三矣爾不用我降宥爾命而猶狃于叛亂反覆我乃其大罰殛殺之非我有周持德不安靜乃惟爾自為凶逆以速其罪耳纂注孔氏曰教告之謂訊之以文誥戰要囚謂誅其禍亂執其朋黨再謂三監淮夷叛三謂即政又叛言迪屢不靜之事武唐孔氏曰昭十三年說戰法云告之以文辭董之以師告以文辭數其罪也戰要囚謂戰敗其師執取其人受其要辭而囚之至于再三明此指伐紂也陳氏大猷曰教告如大誥多士之訓戰要囚如東征踐奄之師王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀監監洛邑之遷民者也猶諸侯之分民有君道焉所以謂之臣我監也言商士遷洛奔走臣服我監于今五年矣不曰年而曰祀者因商俗而言也又案成周既成而成王即政成王即政而商奄繼叛事皆相因才一二年耳今言五祀則商民之遷固在作洛之前矣尤為明驗越惟有胥伯小大多正爾罔不克臬臬事也周官多以胥以伯以正為名胥伯小大衆多之正蓋殷多士授職于洛共長治遷民者也其奔走臣我監亦久矣宜相體悉竭力其職無或反側偷惰而不能事也纂注息齊余氏曰臬不當與康誥異訓孔云汝無不能用法自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事心不安靜則身不和順矣身不安靜則家不和順矣言爾惟和哉者所以勸勉之也和其身睦其家而後能協于其邑歡然有恩以相愛粲然有文以相接爾邑克明始為不負其職而可謂克勤乃事矣前既戒以罔不克臬故以克勤乃事期之也爾尚不忌于凶德亦則以穆穆在乃位克閲于乃邑謀介忌畏也穆穆和敬貌頑民誠可畏矣然如上文所言爾多士庶幾不至畏忌頑民凶德亦則以穆穆和敬端處爾位以潛消其悍逆悖戾之氣又能簡閲爾邑之賢者以謀其助則民之頑者且革而化矣尚何可畏之有哉成王誘掖商士之善以化服商民之惡其轉移感動之機微矣哉爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚爾乃自時洛邑庶幾可以保有其業力畋爾田天亦將畀豫矜憐于爾我有周亦將大介助賚錫于爾啓迪簡拔置之王朝矣其庶幾勉爾之事有服在大僚不難至也多士篇商民嘗以夏迪簡在王庭有服在百僚為言故此因以勸勵之也纂注新安陳氏曰自王曰嗚呼猷告爾有方多士至此一章專提起胥伯正告之介如佑賢輔德賚如錫之山川土田蓋遷殷民時就技其豪俊為胥伯正以共長治之乃用其素所服習者此安集新民之要道故今特勸勵之使表率殷士殷民而躋泰和也裁吕氏曰多士序商民之怨周曰夏迪云云則以大義之此乃以迪簡云云為勸何也爵位上之所命非下之可干自其怨望而許之姑息之政也示以好惡而勸之磨礪之具也此周公御商士之開闔大用也王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土誥告將終乃歎息言爾多士如不能相勸信我之誥命爾亦則惟不能享上凡爾之民亦惟曰上不必享矣爾乃放逸頗僻大違我命則惟爾多士自取天威我亦致天之罰播流蕩析俾爾離逺爾土矣爾雖欲宅爾宅畋爾田尚可得哉多方疑當作多士上章既勸之以休此章則董之以威商民不惟有所慕而不敢違越且有所畏而不敢違越矣纂注王氏曰上告以承之庸之此告以威之也王曰我不惟多誥我惟祗告爾命我豈若是多言哉我惟敬告爾以上文勸勉之命而已纂注陳氏曰我豈欲多言以告惟敬告爾以天命而已不知天命乃商民之病根故此篇言天命尤詳張氏曰稱天者無慮二十稱帝者三又曰時惟爾初不克敬于和則惟我怨與之更始故曰時惟爾初也爾民至此苟又不能敬于和猶復乖亂則自底誅戮毋我怨尤矣開其為善禁其為惡周家忠厚之意于是篇尤為可見畢吕氏曰又曰二字所以形容周公顧之惓惓斯民㑹已而猶有餘情誥已終而猶冇餘語盻之光猶曄然溢于簡冊也纂注吕氏曰是又爾更端為善之一初也蓋殷民與紂同惡武王克紂是維新之一初也不能而從三監之叛則既失此初矣遷洛又一初也復不能而屢迪不靜則又失此初矣今歸自踐奄而又為多方之誥丁寧反覆諭以時惟爾初初之過一皆洗滌今之善當相與維新豈非又一初乎若又失此初不能敬以納民于和則永無可望矣但曰則無我怨而自取誅戮之意隱然于不言之表周家忠厚何其至哉立政吳氏曰此書戒成王以任用賢才之道而其意㫖則又上戒成王専擇百官有司之長如所謂常伯常任準人等云者蓋古者外之諸侯一卿已命于君內之卿大夫則亦自擇其屬如周公以蔡仲為卿士伯冏謹簡乃僚之類其長既賢則其所舉用無不賢者矣葛氏曰誥體也今文古文皆有纂注吕氏曰無逸立政二篇相為經緯以無逸之心明立政之體君道備矣自立政而後周公不復有書納忠于王此其絶筆也為治體統固臻其極至于反覆申重之意忠愛惇篤之誠深長逺大之慮學者當于言外體之周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉此篇周公所作而記之者周史也故稱若曰言周公帥羣臣進戒于王贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒曰王左右之臣有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰準人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公于是歎息言曰美矣此官然知憂恤者鮮矣言五等官職之美而知憂其得人者少也吳氏曰綴衣虎賁近臣之長也葛氏曰綴衣周禮司服之類虎賁周禮之虎賁氏也纂注唐孔氏曰周公既拜手稽首而後發言還自言拜手稽首者示已重其事欲君受其言如召誥言拜手稽首旅王若公亦是召公自言與此同也陳氏大猷曰嗣天子今臨政天下矣此王初即政時前此幼冲皆倚成于公故警之如此用悉意以告王林氏曰下文宅乃牧即常伯此以為伯下以為牧以伯為牧民之長也而曰左右者以牧伯兼公卿也三宅固不可不得人然進見有時虎賁綴衣之類則朝夕與王處最親且密苟非其人則主德內蔽大臣雖賢何所施其力哉吕氏曰常伯等即三宅三代之書他無所見意者公卿輔相之别名歟官有别名如相曰阿衡保衡三卿曰圻父農父宏父此亦三代輔政大臣别名耳綴衣虎賁特于侍御僕從中錯舉二者以見其餘耳職重者有安危之寄職親者有習染之移其繫天下之本一也能休嘉此數職知憂恤審擇之者鮮矣先言休兹而繼以知恤必知建官之美意然後深以為恤也三宅左右大臣綴衣虎賁左右小臣職有小大而經綸康濟熏陶涵養知其美而加之憂庶不以非人處之矣即新安陳氏曰常伯等孔氏蘇氏分三公六卿有司𫝊此說宜以分配三宅皆為大臣若謂三公論道他事不當及之若謂六卿則準人豈非司寇又豈六卿外他有平法之準人乎要之三宅不過王左右大臣之别名吕說得之宅事常任所職必廣凡任事之大臣也宅牧常伯主牧養之大臣也宅準準人主平法之大臣也何公卿上官有司之分哉又案虞有十二牧夏周有九牧皆在邦國意必有大臣在朝者以統之如虞四嶽統十二牧周六卿倡九牧立政所謂常伯宅牧必掌牧養而在朝以統牧伯者歟又案咸戒蔡氏謂公帥羣臣羣臣用皆進戒終篇不見羣臣進戒之意以後章咸告孺子王矣證之咸不過訓皆謂公皆以告戒王耳咸戒咸告義只一同古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣謀靣用丕訓德則乃宅人兹乃三宅無義民古之人有行此道者惟有夏之君當王室大强之時而求賢以為事天之實也迪知者蹈知而非苟知也忱恂者誠信而非輕信也言夏之臣蹈知誠信于九德之行乃敢告教其君曰拜手稽首后矣云者致敬以尊其為君之名也曰宅乃事宅乃牧宅乃準兹惟后矣云者致告以叙其為君之實也兹者此也言如此而後可以為君也即臯陶與禹言九德之事謀靣者謀人之靣貌也言非迪知忱恂于九德之行而徒謀之靣貌用以為大順于德乃宅而任之如此則三宅之人豈復有賢者乎蘇氏曰事則向所謂常任也牧則向所謂常伯也準則向所謂準人也一篇之中所論宅俊者參差不齊然大要不出是三者其餘則皆小臣百執事也吳氏曰古者凡以善言語人皆謂之教不必自上教下而後謂之教也桀德惟乃弗作往任是惟暴德罔後夏桀惡德弗作往昔先王任用三宅而所任者乃惟暴德之人故桀以喪亡無後輯録兹乃三宅無義民據此三宅即上文宅事宅牧宅準之宅今孔氏蘇氏以為居無義之民猶舜典五宅三居之意吕氏以三宅無義民一句接下句桀德惟乃弗作往任謂當桀之時居三宅者曽無義民未知二說孰長先生曰吕說是答潘子善纂注林氏曰惟禹以籲俊為心故其臣亦以薦揚為務吕王氏曰籲俊之道在乎迪知忱恂于九德之行氏曰統名之則曰俊而所以為俊者則有九德之别苟不能實知篤信于有德之行雖號召賢俊猶無益也自臯陶以九德告禹夏后蓋世守以為知人之法焉夏之臣既以宅三宅告其君于是謀以博詢之靣以親驗之用其大順于德者必如是乃可謂能宅人蓋大任不可輕付大德不可小知必參人已然後盡也方夏之盛任三宅者如此之詳及其衰也並至于曽無義民言皆不義之人無一君子也兹乃云者此乃三宅之位非他位也猶無義民則他可知矣然非人才果異往日也桀之惡德弗作往日之任用而已往惟俊德是任效見于有室大競桀惟昏德是任效見于絶世無後信乎存亡在所任也陳氏大猷曰宅者居而安之之謂或才德不稱或委任不篤皆非宅也家新安陳氏曰無競維人人中之俊乃天生之以遺國者俊非徒才俊必有德如所謂以克俊有德臯陶亦曰九德咸事俊乂在官未嘗岐俊德而二之宅乃事用大臣以宅君之事也下放此亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德亦越者繼前之辭也耿光也湯自七十里升為天子典禮命討昭著于天下所謂陟丕釐上帝之光命也三宅謂居常伯常任準人之位者三俊謂有常伯常任準人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名也三俊說者謂他日次補三宅者詳宅以位言俊以德言意其儲養待用或如說者所云也惟思式法也湯于三宅三俊嚴思而丕法之故能盡其宅俊之用而宅者得以效其職俊者得以著其才賢智奮庸登于至治其在商邑用協于厥邑近者察之詳其情未易齊畿甸之協則純之至也其在四方用丕式見德逺者及之難其德未易遍觀法之同則大之至也至純至大治道無餘藴矣曰邑曰四方者各極其逺近而言耳纂注陳氏大猷曰事事物物之理莫非天命之流行典禮刑賞則其大者湯升天位大理治上帝之明命謂大治天下使事物昭然各當于理即丕釐上帝之耿命也於息齊余氏曰陟句為是吕氏曰漢高儲參陵平勃身後迤定再世之亂孔明儲琬褘允維于身後亦維持數十年况三代為天下長慮固宜儲三俊以繼三宅也嚴維丕式嚴思賢者惟大則效之然後能用宅俊所謂學于伊尹而後臣之其一證也未用宅俊之前知之者惟湯既用之後則夫人而信之丕新安陳氏曰上文嚴惟丕式君大法乎賢也此之用式下之人亦因之而大法乎腎也湯用三宅而且儲三俊以供無窮之用上廣夏后之所未及而下為文武之所取法焉嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓羞刑進任刑戮者也庶習備諸衆醜者也言紂德强暴又所與共國者惟羞刑暴德之諸侯所與共政者惟庶習逸德之臣下上帝敬致其罰乃使我其周有此諸夏用商所受之命而奄甸萬姓焉甸者井牧地什伍其民也纂注王氏曰羞進也有崇尚之意桀紂所用非人皆本于身有惡德故曰桀德受德者推本言之也失吕氏曰論夏商之興亡不出于任用得之間立政之體統端在此矣亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯三宅三俊文武克知灼見皆曰心者即所謂迪知忱恂而非謀靣也三宅已授之位故曰克知三俊未任以事故曰灼見以是敬事上帝則天職修而上有所承以是立民長伯則體統立而下有所寄人君位天人之兩間而俯仰無怍者以是也夏之尊帝商之丕釐周之敬事其義一也長如王制所謂五國以為屬屬有長伯如王制所謂二百十一國以為州州有伯是也纂注吕氏曰論成湯文武皆以亦越發語蓋與上文相參也桀之時若不可為矣亦于成湯而遽如是焉紂之時若不可為矣亦于文武而遽如是焉治亂同機而異發聖狂同心而異念賢才同世而異用人君盍于此深省乎三宅共政者也知其心者猶未盡則不能無間惟文武真能知其心也三俊待用者也未與事遇則底藴不外見惟文武灼然見其心也知宅俊皆曰心者君臣相與萬化之原苟貌親口惠相期于肝膽之外則無其本矣新安陳氏曰立民長伯當時宅俊或有出而封為長伯者歟諸侯入為王官王官出為諸侯古常有之立政任人準夫牧作三事言文武立政三宅之官也任人常任也凖夫準人也牧常伯也以職言故曰事虎賁綴衣趣馬小尹左右攜僕百司庶府此侍御之官也趣馬掌馬之官小尹小官之長攜僕攜持僕御之人百司若司裘司服庶府若內府大府之屬也大都小伯藝人表臣百司太史尹伯庶常吉士此都邑之官也吕氏曰大都小伯者謂大都之伯小都之伯也大都言都不言伯小伯言伯不言都互見之也藝人者卜祝巫匠執技以事上者表臣百司表外也表對裏之辭上文百司蓋內百司若內府內司服之屬所謂裏臣也此百司蓋外百司若外府外司服之屬所謂表臣也太史者史官也尹伯者有司之長如庖人內饔膳夫則是數尹之伯也鐘師尹鐘磬師尹磬大師司樂則是數尹之伯也凡所謂官吏莫不在內外百司之中至于特見其名者則皆有意焉虎賁綴衣趣馬小尹左右攜僕以扈衛親近而見庶府以冗賤人所易忽而見藝人恐其或興淫巧機詐以蕩上心而見太史以奉諱惡公天下後世之是非而見尹伯以大小相維體統所繫而見若大都小伯則分治郊畿不預百司之數者既條陳厯數文武之衆職而總結之曰庶常吉士庶衆也言在文武之廷無非常德吉士也纂注復齊董氏曰周官注大都公之采邑小都卿之采地是也古人立言之法有互文見意者如詩鉦人伐鼓之類是也司徒司馬司空亞旅此諸侯之官也司徒主邦教司馬主邦政司空主邦土餘見牧誓言諸侯之官莫不得人也諸侯之官獨舉此者以其名位通于天子歟輯録司徒司馬司空亞旅不知何故敘于太史尹伯庶常吉士之下吕氏以為諸侯之官未知是否先生曰謂三官之副與其屬耳亞謂小司徒之屬旅即下士也見周禮序官答潘子善纂注陳氏曰尹伯舉其長言之亞旅舉其屬言之互相備也夷微盧蒸三亳阪尹此王官之監于諸侯四夷者也微盧見經亳見史三亳䝉為北亳穀熟為南亳偃師為西亳蒸或以為衆或以為夷名阪未詳古者險危之地封疆之守或不以封而使王官治之參錯于五服之間是之謂尹地志載王官所治非一此特舉其重者耳自諸侯三卿以降惟列官名而無他語承上庶常吉士之文以內見外也夫上自王朝內而都邑外而諸侯逺而夷狄莫不皆得人以為官使何其盛歟纂注王氏曰此篇屢言三宅而先後之序不同也者官使之際皆當致謹初無一定之先後文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王惟能其三宅之心能者能之也知之至信之篤之謂故能立此常任常伯用能俊有德也不言準人者因上章言文王用人而申克知三有宅心之說故略之也輯録文王惟克厥宅心人皆以宅心為處心非也即前靣所說三有宅心爾若處心則云克宅厥心方子纂注孔氏曰文王惟其能居心詳吕氏曰前章敷敘文武衆職已復恐成王覽其目而不議其綱也故極本原以示之心者萬事之綱也君心既宅安厥攸居則經世事業皆此心之建立也舉世人才皆此心之感應也文王之官繁矣曷嘗求之外哉惟能宅心而已真氏曰不曰克宅厥心而曰克厥宅心猶臯謨不曰慎修厥身而曰慎厥身修也新安陳氏曰以宅心為三宅之心與上文克知三有宅心合為一說免添出文王自宅心一腳豈不甚好然如蔡氏所謂能其三宅之心于文理缺順否則克字下或脫一知字或厥字本知字之誤乃可耳文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶言號令也庶獄庶訟也庶慎國之禁戒儲備也有司有職主者牧夫牧人也文王不敢下侵庶職惟于有司牧夫訓敕用命及違命者而已漢孔氏曰勞于求才逸于任賢纂注吕氏曰庶言謂凡奏請訴訟庶獄謂凡刑辟訊鞠庶慎謂凡事繫利害而當謹戒者庶獄庶慎文王罔敢知于兹上言罔攸兼則猶知之特不兼其事耳至此罔敢知則若未嘗知有其事蓋信任之益専也上言庶言此不及者號令出于君有不容不知者故也吕氏曰不言罔知于兹而曰罔敢知于兹者徒言罔知則是莊老之無為也惟言罔敢知然後見文王敬畏思不出位之意豪釐之辨學者冝精察之纂注吕氏曰罔敢知不及庶言者事未施行則謂之言既施行則獄與慎可包之矣王氏曰君道以擇人為職上必無為而用天下下必有為而為天下用此君臣之分也新安陳氏曰上文雖及常事司牧人而不及準人庶獄即準人之事也此篇論三宅有全言之者有舉其二者有舉其一者參錯及之耳亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基率循也敉功安天下之功義德義德之人容德容德之人蓋義德者有撥亂反正之才容德者有休休樂善之量皆成德之人也周公上文言武王率循文王之功而不敢替其所用義德之人率循文王之謀而不敢違其容德之士意如虢叔閎夭散宜生泰顛南宫括之徒所以輔成王業者文用之于前武任之于後故周公于君奭言五臣克昭文王受有殷命武王惟兹四人尚迪有祿正猶此敘文武用人而言並受此丕丕基也纂注孔氏曰亦于武王循惟文王撫安天下之功不敢廢其義德又循惟文王寬裕之德怒吕氏曰文王一怒而安天下之民安民所謂敉功一所謂義德也武王亦一怒而安天下之民所以率惟不敢替者也肆不殄厥慍亦不隕厥問文王之容德也不泄邇不忘逺逺邇并包所以率惟謀從之者也容德聖人所尚故率惟謀從義德非聖人所専任則迫于不得已而不敢替焉葵初王氏曰紂用暴德逸德之人正與此相反之新安陳氏曰蔡氏承上文之用三宅而言蓋不改父臣之意此說出于夏氏真氏取之以其切于立政用人故也然深繹文意曰不耳敢替厥曰率惟謀從恐孔吕之說為得本來語意之實嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之我者指王而言若順也周公既述文武基業之大歎息而言曰孺子今既為王矣繼此以往王其于立政立事準人牧夫之任當能明知其所順順者其心之安也孔子曰察其所安人焉廋哉察其所順者知人之要也夫既明知其所順果正而不他然後推心而大委任之使展布四體以為治相助左右所受之民和調均齊獄慎之事而又成其勿以小人間之使得終始其治此任人之要也民而謂之受者言民者乃受之于天受之于祖宗非成王之所自有也纂注吕氏曰一篇之間所謂王矣者蓋屢言而屢歎之深恐成王平日委重視成今猶不自知身當職分之大故警之不一而足也陳氏大猷曰我者我其君君臣一體也簡張氏曰王繼文武以立政可謂難矣而難之中自有易之道亦曰立事準人牧夫我其克灼知厥若而已知三宅之心即所以立政皆復齊董氏曰孔氏以立政為大臣立事為小臣諸家以立政立事為一意而于準人牧夫則以為舉其二而包其一理所未安竊意從張氏之說則立政乃作書之本意立事乃任人之官庶于經意為兩得立葵初王氏曰提起立政二字最是下文商人周文王政國則罔有立政用憸人在今後嗣王立政皆是提起作書之本意立政之要在于事牧準人新安陳氏曰立政下列三宅則並有立事字立政下不列三宅則無立事字尤是顯明證蔡氏于後一節似悟此意惜于此缺自一話一言我則末惟成德之彥以乂我受民末終維思也自一話一言之間我則終思成德之美士以治我所受之民而不敢斯須忘也纂注王氏曰一話言一事之始終也一言一句而已新安陳氏曰相受民牧之責也和庶獄準之責也和庶所當慎之事事之責也三宅備矣話言樞機之發也委任三宅欲勿以小人間之苟或一話言間微不終于専主君子則小人乘間而入之矣此公戒王以委任三宅専一周密之法也嗚呼豫旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之前所言禹湯文武任人之事無非至美之言我聞之于人者已皆告孺子王矣文子文孫者成王武王之文子文王之文孫也成王之時法度彰禮樂著守成尚文故曰文誤失也有所兼有所知不付之有司而以己誤之也正猶康誥所謂正人與宫正酒正之正指當職者為言不以己誤庶獄庶慎惟當職之人是治之下文言其勿誤庶獄惟有司之牧夫即此意纂注孔氏曰惟以正是之道治衆獄衆慎求蘇氏曰心有邪正事有是非正心而理之是未有不得也揆吕氏曰簡畀正人付之獄慎使之以正法斷刑以正理事所謂正道也苟不知正道雖惴惴欲其勿誤能勿誤乎自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂自古及商人及我周文王于立政所以用三宅之道則克宅之者能得賢者以居其職也克由繹之者能紬繹用之而盡其才也既能宅其才以安其職又能繹其才以盡其用兹其所以能俾乂也歟纂注陳氏曰繹如繹絲謂窮其端緒克宅任之當矣又紬繹之詳其所行考其所就猶堯之詢事考言舜之明試考績也吕氏曰由繹由其外而繹其中也由其言而繹其心由其才而繹其德由其發舒于一時而繹其持久于嵗晏者繹之蓋不一端而足也克宅之則人與位相稱克由繹之則表與裏相符其審如是然後俾之為治既俾之為治則一委之其人矣國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家自右為國未有立政用憸利小人者小人而謂之憸者形容其茫茫便捷之狀也憸利小人不順于德是無能光顯以在厥世王當繼今以往立政勿用憸利小人其惟用有常吉士使勉力以輔相我國家也吕氏曰君子陽類用則升其國于昌明小人隂類用則降其國于暗昧隂陽升降亦各從其類也纂注孔氏曰憸利之人不順于德是使其君無顯名在其世傾蘇氏曰見細德之顯微是謂憸人悅張氏曰憸人者巧辨給之人詐足飾非言足拒諌其心則譽桀紂為堯舜失其意則誣伯夷為盜跖丕陳氏大猷曰憸人矯飾以為德然非其心之所順與訓厥若正相反必吕氏曰人主惟以别白君子小人為職國之興亡常由之此篇反覆于君子小人之際有㫖哉文武有庶常吉士公復以其惟吉士望王召公之歌詩王多吉士亦至于再穆王命伯冏吉士猶在口也是則周家父祖所𫝊師保所訓子孫所守惟在吉士一代治體可識矣憸人者吉士之反周之家法所嚴惡斥絶者也今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫始言和我庶獄庶慎時則勿有間之繼言勿誤于庶獄庶慎惟正是乂之至是獨曰其勿誤于庶獄惟有司之牧夫蓋刑者天下之重事潔其重而獨舉之使成王尤也知獄刑之可畏必専有司牧夫之任而不可以已誤之纂注吕氏曰獄曷為獨重也民命所繫亦國命所繫也導迎善氣祈天永命者獄也並告無辜無世在下者亦獄也宜周公獨言而獨戒之及蔡氏元度曰以庶慎獄庶慎對庶言則獄慎尤重故不庶言以庶獄對庶則庶獄尤重故不及庶慎人唐孔氏曰言庶獄欲其重刑言有司牧夫欲其謹官王氏曰獄者政之終牧者官之長政舉其終官舉其長則無不舉矣其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈詰治也治爾戎服兵器也陟升也禹迹禹服舊迹也方四方也海表四裔也言德威所及無不服也覲見也耿光德也大烈業也于文王稱德于言武王稱業各于其盛者稱之吕氏曰兵刑之大也故既庶獄而繼以治兵之戒焉或曰周公之訓稽其所弊得無啓後世好大喜功之患乎曰周公詰兵之訓繼勿誤庶獄之後犴獄之間尚恐一刑之誤况六師萬衆之命其敢不審而誤舉乎推勿誤庶獄之心而奉克詰戎兵之戒必非得己不已而輕用民命者也纂注林氏曰呼文子文孫言守成以文終以詰爾戎兵則武不可弛謙吕氏曰公非教王用兵恐其宴安而使之自强如易卦言利用侵伐亦是于謙抑之中有自强之意也是役也蓋奮張其氣而不使墮偷操握其衆而不使扞格摧壓其姦而不使覬覦保治之良圗也古人治兵乃所以弭兵後世銷兵乃所以召兵于新安胡氏曰一說方方方如此一說嚴正方整以行天下陳氏大猷曰耿亦光也耿光光之著也嗚呼繼自今後王立政其惟克用常人并周家後王而戒之也常人常德之人也臯陶曰彰厥有常吉哉常人與吉士同實而異名者也纂注吕氏曰常人之于國也蓋食之穀粟衣之布帛雖無異味異文而有生者常用而不可一日易也然每多重遲木訥不能與小慧新進者爭長于頰舌之間故世主惑于取舍而治亂分焉此周公所以慨歎而深致意于卒章歟理陳氏大猷曰理之常行而不可易者為常道行此常而不易者為常人常言其體之不易吉言其用之休祥也言常人于兵刑之後以常人尤宜任此而謹之歟周公若曰太史司寇蘇公式敬爾由獄以長我王國兹式有慎以列用中罰此周公因言慎罰而以蘇公敬獄之事告之太史使其并書以為後世司獄之式也蘇國名也左𫝊蘇忿生以溫為司寇周公告太史以蘇忿生為司寇用能敬其所由之獄培植基本以長我王國令于此取法而有謹焉則能以輕重條列用其中罰而無過差之患矣纂注孔氏曰忿生為武王司寇封蘇國能用法敬汝所用之獄言主獄當求蘇公之比此法有所慎行必以其官列用中罰不輕不重蘇公所行太史掌六典有廢置人之制故告之公陳氏大猷曰周公舉太史所記蘇公之事以告王蘇能以法式而敬其所用之獄重民命以延國命治獄者當以為法式而有謹焉列者前後相比猶今言例也以舊事為比而用其輕重之中者也立政以用人為本而兵刑乃政之大者故以此終焉公新安陳氏曰蘇公所以為司寇在乎敬後人之法蘇在乎慎能慎則能敬矣固為後之司獄者慮尤為後之君用人以司獄者慮能如蘇公者則用否則斥蓋以此終立政用人之意歟兩式字同訓法為優政葉氏曰自詰爾戎兵至此疑有脫簡愚謂周公復成王而作立政以王政莫大于用人用人莫先于三宅三宅得人則百官皆得人而王政立矣公前日攝政猶可無言今歸政留洛心在王室豈容默乎此立政所以作也一篇之中宅事牧準其綱領也休兹知恤其血脉也自迪惟有夏至暴德罔後言夏先后知恤乎此乃室大競休何如哉桀不知恤也故罔有後而成湯陟焉自亦越成湯至奄甸萬姓言商先王知恤乎此故用協用見德休何如哉紂不知恤也故帝罰之而我周式商受命焉自亦越文王武王至並受丕丕基言文武亦猶夏商先王之知恤也是以並受丕基式克至今日休也自孺子王矣至終篇拳拳以去憸人用常吉詰戎兵謹刑獄為王言蓋欲王以先王之知恤為法以夏商後王之不知恤為鑒忠愛之至至今可挹也書傳輯録纂注卷五
