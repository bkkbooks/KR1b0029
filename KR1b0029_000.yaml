  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0029_WYG_000-1a, image: WYG0061/WYG0061-0531a.png}
body:
  text: 書傳輯録纂注書類提要臣等謹案書傳輯録纂注六卷元董鼎撰鼎字季亨鄱陽人朱子之學授於黃幹鼎族兄夢程嘗從幹遊鼎又從夢程聞緒論故自序謂得朱子之再傳是編雖以蔡沈集傳為宗而集傳之後續以朱子語録及他書所載朱子語謂之輯録又采諸説之相發明者附列於末謂之纂注自序稱集傳既為朱子所訂定則與自著無異又稱薈稡成朱子之一經則仍以朱子為主也考蔡沈書集傳序惟稱二典三謨嘗經先生點定故陳櫟作書集傳纂疏惟虞書首標朱子而夏書以下則不然其凡例曰首卷有朱子訂定四字不忘本也自二卷起去四字紀實也吳澄作是書序亦稱朱子訂定蔡傳僅至百官若帝之初而止此書大禹謨正月朔旦條下鼎併附注其説是鼎於此書源委本自分明其稱集傳為朱子所訂定未免假借然澄序又稱集傳自周書洪範以後寖覺疏脫師説甚明而不用者有焉疑其著述未竟而人為增補或草稿初成而未及修改所舉金縢召誥洛誥諸條皆顯相舛異又稱鼎作是書有同有異俱有所禆如解西伯戡黎則從吳棫解多士則從陳櫟解金縢則兼存鄭孔二義不以蔡傳之從鄭為然云云然則鼎於集傳蓋不免有所未愜恐人以源出朱子為疑故特引朱子之説補其闕失其舉集傳歸之朱子猶曰以朱翼朱則不以異蔡為嫌耳非其考之不審也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書傳輯録纂注序慶元己未冬先生文公令沈作書集傳明年先生殁又十年始克成編總若千萬言嗚呼書豈易言哉二帝三王治天下之大經大法皆載此書而淺見薄識豈足以盡發藴奧且生於數千載之下而欲講明於數千載之前亦已難矣然二帝三王之治本於道二帝三王之道本於心得其心則道與治固可得而言矣何者精一執中堯舜禹相授之心法也建中建極商湯周武相傳之心法也曰德曰仁曰敬曰誠言雖殊而理則一無非所以明此心之妙也至於言天則嚴其心之所自出言民則謹其心之所由施禮樂教化心之發也典章文物心之著也家齊國治而天下平心之推也心之德其盛矣乎二帝三王存此心者也夏桀商受亡此心者也太甲成王困而存此心者也存則治亡則亂治亂之分顧其心之存不存如何耳後世人主有志於二帝三王之治不可不求其道有志於二帝三王之道不可不求其心求心之要舍是書何以哉沈自受讀以來沈潛其義參考衆説融會貫通乃敢折衷微辭奧旨多述舊聞二典三謨先生蓋嘗是正手澤尚新嗚呼惜哉先生改本已附文集中其間亦有經承先生口授指畫而未及盡改者今悉更定見本篇集傳本先生所命故凡引用師説不復識别四代之書分為六卷文以時異治以道同聖人之心見於書猶化工之妙著於物非精深不能識也是傳也於堯舜禹湯文武周公之心雖未必能造其微於堯舜禹湯文武周公之書因是訓詁亦可得其指意之大略矣嘉定己巳三月既望武夷蔡沈序書傳輯録纂注序生民之類必帝王而後治帝王之道必聖賢而後行考之古可見已黃虞逺矣蒼姬訖矣三代以降有帝王而民不治者聖賢未遇也孔孟繼作有聖賢而道不行者帝王不用也噫虞夏殷周之盛非適然也人事之所致也堯舜禹湯文武之聖非獨善也人心之所同也髙風遐躅豈遂不可追而及之哉孟子言必稱堯舜孔子知百世可繼周言豈苛乎哉事豈虛乎哉蓋於百篇之書的然有見而云爾也然則是書也惟聖賢能盡之惟帝王能行之顧其學聖賢之學而事帝王之事者何如耳焚滅之而秦亡表章之而漢興往者可鑒矣惜夫安國之傳不無可疑而頴達之疏惟詳制度二帝三王羣聖人之用心獨決於一夫之見管窺天而蠡測海豈足以得其蘊奧哉至宋諸儒數十家而後其説漸備又得文公朱子有以折其衷而悉合於古雖集傳之功未竟而委之門人九峯蔡氏既嘗親訂定之則猶其自著也鼎生也晚於道未聞賴族兄介軒夢程親受學於勉齋黃氏槃澗董氏故再傳而鼎獲私淑焉釋經緒論多出朱子乃取訂定集傳為之宗而搜輯語録於其次又增纂諸家之注有相發明者并間綴鄙見於其末庶幾會粹以成朱子之一經可無參稽互考之勞而有統宗會元之要則亦不無小補矣第顧翻閲傳注盈溢充斥衆寶眩瞀遺珠棄玉或所不能免也惟於君心王政人才民生之所係諸儒之論可堪警䇿者托抉不遺闕者補之以備臨政願治之觀覽固不徒為經生學士設也噫人皆可為堯舜塗人可以為禹而况聰明首出受天之命奄有四海有能致之資居得致之勢而又有可致之權可以千古聖賢自期可以四代帝王自許而顧乃謙讓未遑也哉是書若遇雖書之幸實天下萬世生民之大幸也至大戊申十二月己未鄱陽董鼎序書傳輯録纂注綱領朱子説書古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀理或更歲月或歷數年其間豈無異事蓋必已具於編年之史而今不復見矣通鑑紀事本末後序聖人千言萬語只是説箇當然之理恐人不曉又筆之於書自書契以來二典三謨伊尹武王箕子周公孔孟都只如此可謂盡矣只就文字間求之句句皆是做得一分便是一分工夫非茫然不可測也但恐人自不子細求索之耳須是量聖人之言是説箇什麼要將何用若只讀過便休何必讀書説尚書初讀甚難似見於己不相干後來熟讀見堯舜禹湯文武之事皆切於己書説某嘗患尚書難讀後來先將文義分曉者讀之聱牙者且未讀如二典三謨等篇義理明白句句是實理堯之所以為君舜之所以為臣臯陶稷契伊傅輩所言所行最好綢繆玩味體貼向自家身上求其味自别謨先生問可學近讀何書曰讀尚書先生曰尚書如何看曰須要考歷代之變先生曰世變難看唐虞三代事浩大闊逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓湯曰豫畏上帝不敢不正熟讀豈不見湯之心大抵尚書有不必解者有須著意解者有略須解者有不可解者如仲虺之誥大甲諸篇只是熟讀義理分明何俟於解如洪範則須著意解如典謨諸篇稍雅奧亦須略解若如盤誥諸篇已難解而康誥之屬則已不可解矣可學問尚書難讀蓋無許大心胸他書亦須大心胸方讀得如何程子只説尚書曰他書却有次第且如大學自格物致知以至平天下有多少節次尚書只合下便大如堯典自克明俊德以親九族至黎民於變時雍展開是大小大分命四時成嵗便見心中包一箇三百六十五度四分度之一底天方見得恁地若不得一箇大底心胸如何了得僴學者須是有業次且如讀堯舜典厯象日月星辰律度量衡五樂五禮之類禹貢山川洪範九疇須一一理會令透今人只做得西漢以下工夫無人就堯舜三代源頭處理會來又曰且如做舉業亦須苦心理會文字方可決科若不苦心去求不成業次終不濟事格言二典三謨其言奧雅學者未遽曉會後面盤誥等篇又難看且如商書中伊尹告太甲五篇説得極切伊訓太甲三篇咸有一德其所以治心修身處雖為人主言然初無貴賤之别冝取細讀極好時舉尚書前五篇大槩易曉後如甘誓胤征伊訓太甲咸有一德説命此皆易曉亦好此是孔氏壁中所藏之書又曰看尚書漸漸覺得曉不得便是有長進若從頭尾解得便是亂道髙宗肜日是最不可曉者西伯戡黎是稍稍不可曉者太甲大故亂道故伊尹之言緊切髙宗稍稍聰明故説命之言細膩又曰讀尚書有一箇法半截曉得半截曉不得曉得底看曉不得底且闕之不可強通強通則穿鑿語德粹云尚書亦有難看者昨日嘗語子上滕請問先生復言大略如昨日之説又云如微子洛誥等篇讀至此且認微子與父師少師哀商之淪喪已將如何其他皆然若其文義知他當時言語如何自有不能曉矣可學問書當如何看先生曰且看易曉處其他不可曉者不要強説縱説得出恐未必是當時本意近時解書者甚衆往往皆是穿鑿如吕伯恭亦未免此也時舉尚書中盤庚五誥之類實是難曉若要添減字硬説將去儘得然只是穿鑿終恐無益耳謨問某讀書至盤庚及五誥諸篇其疑不可數舉若以諸家之説勉強解去亦説得行但恐當時指意未必如此耳如此等處只得姑存之如何先生曰漳州所刻四經書序有通説答潘子善中通説散見孔序以待段能者下傳及今案漢儒云云一周公不知其人如何其言聱牙難考如書中周公之言便難讀如立政君奭之篇是也最好者惟無逸一書中間用字亦有譸張為幻之語至若周官蔡仲等篇却是官樣文字必出於當時有司潤色之文非純周公語也卓陳安卿問書何緣無宣王書先生曰是當時偶然不曾載得義剛尚書只是虛心平氣闕其所疑隨力量看教浹洽便自有得力處不須預為計較必求赫赫之功也近亦整頓諸家説倣伯恭詩説作一書但鄙性褊狹不能兼容曲徇恐又不免少紛紜耳答潘文叔道夫請先生點尚書以幸後學先生曰某今無工夫道夫曰先生於書既無解若更不點則句讀不分後人承舛聽訛卒不足以見帝王之淵懿曰公豈可如此説焉知後來無人道夫再三請之先生曰書亦難點如大誥語句甚長今人却都碎讀了所以曉不得某嘗欲作書説竟不曾成如制度之屬祇以疏文為本若其他未穩處更與挑剔令分明便得道夫諸經皆以注疏為主書則兼取劉敞王安石蘇軾程頤楊時朝説之葉夢得吳棫薛季宣吕祖謙學校貢舉私議尚書頃嘗讀之苦其難而不能竟也注疏程張之外蘇氏説亦有可觀但終是不純粹林少頴説召誥以前亦詳備聞新安有吳才老禆傳頗有發明却未曾見試并考之諸家雖或淺近要亦不無小補但在詳擇之耳不可以篇帙浩汗而遽憚其煩也答或人書林書儘有好處但自洛誥以後非他所解祖道因論書解必大曰舊聞一士人説注疏外當看蘇氏陳氏解先生曰介甫解亦不可不看書中不可曉處先儒既如此解且只得從他説但一段訓詁説得通至别段便説不通不知如何必大荆公不解洛誥但云其間煞有不可強通處今姑擇其可曉者釋之今人多説荆公穿鑿他却有此處後來人解書則又却須要盡解廣元祐説命無逸講義及朝以道葛子平程泰之吳仁傑數書先附去可便參訂序次當以注疏為先疏節其要者以後只以時世為先後可也西山間有發明經旨處固當附本文之下其統論即附篇末也記得其數條理會點句及正多方多士兩篇可併考之答李時可必大問尚書欲裒諸家説觀之如何先生厯舉王蘇程陳林少穎李叔易十餘家解訖却云便將衆説看未得且讀正文見箇意思了方可如此將衆説看書中易曉處直易曉其不可曉處且闕之如盤庚之類非特不可曉便曉了亦要何用如周誥諸篇周公不過説周所以合代商之意是他當時説話其間多有不可解者亦且觀其大意所在而已必大或問諸家書解誰者最好莫是東坡書為上否曰然又問但若失之簡曰亦有只消如此解者廣東坡書解却好他看得文勢好學蒙向在鵝湖見伯恭欲解書云且自後面解起今解至洛誥有印本是也其文甚閙熱某嘗問伯恭書有難通處否伯恭初云亦無甚難通處數日問却云果有難通處今只是強解將去耳道夫後數年再會於衢伯恭始謂余曰書之文誠有不可解者甚悔前日之不能闕所疑也豫惟伯恭所以告豫者雖其徒亦未必知因具論之使讀者知求伯恭晚所欲闕者而闕之庶幾得其所以書矣書東萊書説後先生嘗觀書説語門人曰伯恭直是説得書好但周誥中有解説不通處只須闕疑某亦不敢強解伯恭却一向解去故微有尖巧之病也是伯恭天資髙處却是太髙所以不肯闕疑葉紹翁四朝聞見録李文稟白書解且乞放緩願早成禮書以幸萬世先生曰書解甚易只等蔡仲默來便了禮書大段未也淳書説未有分付處因思向日喻及尚書文義貫通猶是第二義直須見得二帝三王之心而通其所可通母強通其所難通即此數語便已參到七八分千萬便撥置此來議定綱領早與下手為佳諸説此間亦有之但蘇氏傷於簡林氏傷於繁王氏傷於鑿吕氏傷於巧然其門儘有好處如制度之屬祗以疏文為本若其間有未穩處更與挑剔令分明耳與蔡仲默帖書傳輯録纂注凡例一案久軒蔡氏抗淳祐經進本録朱子與蔡仲默帖及語録數段在前今各類入綱領輯録內以便觀覽一是書以朱子為主故凡語録諸書應有與書經相關者靡不搜輯倣輯略例名曰輯録附蔡傳之次或有與蔡傳不合及先後説自相同異處亦不敢遺庶幾可備參考其甚異者則略之一朱子語録諸書有總論一經及雜舉諸篇難以分附各處者别為綱領一卷置之帙首亦讀是書者所宜先知一增纂諸家傳注或推蔡氏所本或發其所未盡或補其所不及大約以經文為序訓詁居先釋經義者次之疏傳義及釋音又次之已説處末名曰纂注以附於輯録之後一增纂諸家之説或節取其要語其有文勢未融貫處與夫辭旨未條暢處倣集注例頗加櫽括并用其意足之一輯録纂注中多折衷歸一者其或同異並存與姑備一説處善讀者詳擇焉一經文音釋大槩如陸氏釋文其有與古注異處讀蔡傳可知亦有間見蔡傳及輯録纂注中今只於傳內除文理旁音不可求者案諸家字書反切附注焉一諸本蔡傳脫誤字句今依二程氏本補正凡五十餘處書傳輯録引用諸書語類文集四書集注章句或問詩集傳通書解楚辭集注周氏僴録師説楊氏與立集語略黃氏士毅集書説湯氏巾集書説葉氏士龍集紫陽格言黃氏大昌王氏迂集武夷經説董氏夢程理纂大爾雅通釋董氏琮尚書無義陳氏大猷尚書集傳真氏德秀讀書記葉氏紹翁四朝聞見録名儒傳道精語輯録所載朱子門人姓氏李氏方子正叔果齋昭武陳氏淳卿安北溪臨漳廖氏德明子晦槎溪延平董氏銖重叔槃澗番昜王氏過觀幼拙齋番昜范氏念德伯崇楊氏道夫仲思童氏伯羽蜚卿吳氏雉仲和劉氏砥之用並建安李氏閎祖守約何氏鎬京叔並昭武林氏學蒙正卿林氏夔孫子武並三山黃氏士毅子洪鄭氏可學子上方氏士繇伯謨並莆田楊氏至之至溫陵鄭氏南升文振潮陽葉氏賀孫味道沈氏澗仲莊周氏僴莊伯徐氏宇父居並永嘉潘氏時舉子善天台潘氏履孫坦翁金華輔氏廣卿漢嘉興竇氏從周文卿林氏礪之用湯氏泳叔敬並鎮江郭氏友仁德元淮安余氏大雅公晦陳氏文蔚才卿並廣信滕氏璘粹德新安孫氏自修敬夫宣城包氏揚道顯盱江黃氏義剛毅然甘氏節父吉吳氏琮方仲並臨川黃氏􅓌耕子豫章張氏洽德元吳氏必大伯豐並臨江楊氏長孺伯子廬陵胡氏泳量伯吕氏燾昭德周氏謨弼舜並南康萬氏人傑正淳興國李氏儒用仲秉嶽陽龔氏蓋卿夢錫衡陽蔡氏㦛父行林氏賜一聞黃氏卓之先符氏敘功舜曾氏祖道李氏處謙陳氏仲蔚胡氏叔器李氏庚朱氏任道纂注引用諸書爾雅周禮家語老子春秋左氏傳國語公羊傳榖梁傳詩疏禮記史記漢書南史地志説文釋文玉篇廣韻纂注引用諸家姓氏孔氏安國子國古注孔氏穎逹仲逹注疏伏生勝五行傳賈氏誼劉氏向政子夏侯氏勝公長孔氏光夏子揚氏雄雲子法言馬氏融長季訓解鄭氏玄成康訓解髙堂氏隆平升賈氏逵道梁王氏弼嗣輔易解王氏肅雍元訓解皇甫氏謐安士顧氏顔氏師古籀史注李氏白白太文集柳氏宗元子厚文集劉氏禹錫夢得文集胡氏旦解説顧氏臨敦子歐陽氏修叔永泰誓論劉氏敞父原經説陸氏佃師農范氏純仁堯夫雜著王氏安石介甫全解蘇氏洵允明老泉洪範論蘇氏軾瞻子全解蘇氏轍由子經論沈氏括中存文集筆談孫氏覺老莘全解家氏復禮經説葉氏少藴石林全解陳氏鵬飛少南全解王氏日休龍舒全解蔡氏元度全解張氏九成子韶橫浦全解張氏綱政彥全解宋氏遠孫仲山靜吉語録王氏十朋龜齡梅溪全解林氏之竒少頴全解陳氏傳良君舉止齋書抄夏氏僎肅元柯山全解薛氏肇明全解張氏庭堅才叔經義胡氏伸解義上官氏公裕解説張氏沂經説張氏景叔晦書説李氏李氏樗仲迂詩解潘氏衡書説髙氏閌經説彭氏汝礪器資劉氏一止行簡苕溪經説馮氏時可當可易説唐氏聖任全解張氏震父真小傳薑氏如晦彌明月溪小傳程氏大昌禹貢論史氏仲午正父書説劉氏􅡃有子橫舟講業史氏漸漸鴻書説鄒氏補之書説李氏子材子謙齋眉山全解陳氏經三山全解陳氏梅叟永嘉書説鄭氏景望永嘉鄭氏永嘉陳氏賓經説張氏文蔚經説袁氏默正思全解侯氏甫經説葛氏興仁成氏申之眉山集四百家解吳氏棫老才新安禆傳馬氏子嚴古洲建安陳氏大猷更齋集傳吳氏泳鶴林蕭氏滋任氏淵朱氏方大施氏徐氏楊氏孫氏曾氏周子惇頤茂成濂溪通書程子頤叔正伊川經説遺書張子載厚子橫渠正蒙理窟邵氏雍夫堯康節經世書語録司馬氏光實君凍水文集楊氏時立中龜山朱氏震發子漢上易解范氏祖禹淳父太史講義解説吕氏大臨與叔藝閣經解語録張氏行成文饒觀物經説劉氏安世器之元城大名語録胡氏安國康侯文定公建安春秋傳胡氏宏仲仁五峯皇王大紀張氏栻夫敬南軒廣漢文集語孟解吕氏祖謙伯恭東萊金華書説楊氏萬里廷秀誠齋廬陵易傳王氏炎叔晦雙溪新安全解李氏舜臣子思隆山四川小傳蔡氏元定季通西山建安洪範解