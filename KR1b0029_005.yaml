body:
  text: 書傳輯録纂注卷三元董鼎撰商書契始封商湯因以為有天下之號書凡十七篇纂注史記湯黃帝後帝嚳生契為唐虞司徒封於商賜姓子氏十三世生湯名天乙都亳今濟陰亳縣鄭氏曰商在太華之陽湯在位十三年崩壽百嵗國號商盤庚遷殷以後號殷湯誓湯號也或曰諡湯名履姓子氏夏桀暴虐湯往征之亳衆憚於征役故湯諭以弔伐之意蓋師興之時而誓于亳都者也今文古文皆有輯録湯武固是反之但細觀其書湯反之之功恐是精密如湯誓與牧誓數桀紂之罪辭氣亦不同史記但書湯放桀而死書武王則曰遂斬紂頭懸之白旗又曰湯有慙德如武王恐未必有此意儒用王曰格爾衆庶悉聼朕言非台小子敢行稱亂有夏多罪天命殛之王曰者史臣追述之稱之格至台我稱舉也以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也纂注張氏曰天命殛言之豈諄諄然命之乎曰天以天下之心為心古之論天者多以民心卜之以民心卜者多以賢者之心卜之今爾有衆汝曰我后不恤我衆舍我穡事而割正夏豫惟聞汝衆言夏氏有罪豫畏上帝不敢不正穡刈獲也割斷也亳邑之民安於湯之德政桀之虗焰所不及故不知夏氏之罪而憚伐桀之勞反謂湯不恤亳邑之衆舍我刈穫之事而斷正有夏湯言我亦聞汝衆論如此然夏桀暴虐天命殛之我畏上帝不敢不往正其罪也纂注吕氏曰曰舍我穡事然則湯之伐桀不因民願乎曰亳民之不願而夏民之願也新安陳氏曰湯之興順乎天而應乎人此一節可見商民以一己為心湯則以上天為心蓋是時夏之天命已絶湯所以順乎天也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪豫及汝皆亡夏德若兹今朕必往遏絶也割劓割夏邑之割時是也湯又舉商衆言桀雖暴虐其如我何湯又應之曰夏王率為重役以窮民嚴刑以殘民生厭夏亦率皆怠於奉上不和於國疾視其君指日而曰是日何時而亡乎若亡則吾寧與之俱亡蓋苦桀之虐而欲其亡之甚也桀之惡德如此今我之所以必往也桀嘗自言吾有天下如天之有日日亡吾乃亡耳故民因以日目之纂注吕氏曰夏罪其如台是夏民在塗炭而商民自在春風和氣中也張氏曰人情莫不惡死而好生今欲與桀偕亡疾之甚矣天新安陳氏曰此一節見商民以一國為心湯則以下為心蓋是時夏之人心已離湯所以應乎人也爾尚輔豫一人致天之罰豫其大賚汝爾無不信朕不食言爾不從誓言豫則孥戮汝罔有攸赦賚與也食言言已出而反吞之也禹之征苗止曰爾尚一乃心力其克有勳至啓則曰用命賞於祖不用命戮于社豫則孥戮汝此又益以朕不食言罔有攸赦亦可以觀世變矣纂注新安陳氏曰天生民而立之君使司牧之今桀虐其民民欲其速亡如此人心之所歸即天命之所在人心之所離即天命之所棄也天命湯伐之湯敢違天乎湯之誓師拳拳惟以天言曰天命殛之曰豫畏上帝曰致天之罰非湯伐之天伐之也湯曰豫畏上帝不敢不正武王曰豫弗順天厥罪惟鈞其心一也堯舜之授受禹啓之傳繼湯武之征伐事雖不同其順乎天適乎時合乎義一而已矣愚謂禹征苗有誓啓征扈有誓胤侯征羲和又有誓皆征所當征名正而言順若湯之伐夏而亦有誓何歟蓋誓者臨衆發命述其興師之意故禹也啓也胤侯也猶可無誓惟湯則不可無誓湯無則稱兵之意不明而稱亂之罪滋大苟可明目張膽言之而不怍則順天應人行之而無疑矣先正有言吾無過人者惟日所行事未嘗有不可對人言者耳亦是意也今觀一書之旨首以非豫小子敢行稱亂有夏多罪天命殛之夫莫大於天莫尊於君君承天而臣承君則為治君逆天而臣逆君則為亂湯初不敢逆君而為亂而桀則不能承天以為治彼既多罪天命殛之則我雖非敢稱亂而迫於天命有不獲已是則亂君臣之分自湯始湯誠有所不安而不能辭於天也湯何以知其然哉天之聰明自民天之明畏亦自民始於匹夫匹婦之復讎而終於西夷北狄之怨望吾非彼君也而曰徯我后我何以得此於民哉殆天啓之也天之所啓我固違之是逆天矣有如此意天下皆知惟亳之民不知故有議湯之稱亂者有咎湯之不恤我衆者有止湯以夏罪其如台者而湯則曰豫畏上帝不敢不正是非敢於稱亂也將以止天下之亂也非不恤我衆也將以恤天下之衆也雖以夏罪無如我何而不止者將以救彼之願與偕亡而不得者之苦也此湯之誓所以専為亳民而發也其示之以賞罰者誓師之體不得不勵士氣而一人心非之誘以利怵以禍而強其從我也吁湯之不幸乃天下大幸也仲虺之誥仲虺臣名奚仲之後為湯左相誥告也周禮士師以五戒先後刑罰一曰誓用之于軍旅二曰誥用之于會同以喻衆也此但告湯而亦謂之誥者唐孔氏謂仲虺亦必對衆而言蓋非特釋湯之慙而且以曉其臣民衆庶也古文有今文無輯録問仲虺之誥似未見其釋湯慙德處先生曰正是解他云若苗之有莠若粟之有秕他緣何道這幾句蓋謂湯若不除桀則桀必殺湯如説推亡固存處自是説伐桀至德日新以下乃是勉湯又如天乃錫王勇智他特地説他勇智兩字便可見尚書多不可曉固難理會然這般處古人如何説得恁地好如今人做時文相似夔孫成湯放桀于南巢惟有慙德曰豫恐來世以台為口實武功成故曰成湯南巢地名廬江六縣有居巢城桀奔于此因以放之也湯之伐桀雖順天應人然承堯舜禹授受之後於心終有所不安故愧其德之不古若而又恐天下後世藉以為口實也陳氏曰堯舜以天下讓後世好名之士猶有不知而慕之者湯武征伐而得天下後世嗜利之人安得不以為口實哉此湯之所以恐也歟纂注新安陳氏曰觀湯之慙湯本心始見矣以居萬世君臣之始變也仲虺釋其慙始則美之又慮其愧心既釋驕心或生故終復警之大臣之引君當道者如此鄭氏曰必往之師以救生人口實之慙以慮後世誥吕氏曰此心之慙此之釋皆不可少仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時又有夏昏德民墜塗炭天乃錫王勇智表正萬邦纘禹舊服兹率厥典奉若天命仲虺恐湯憂愧不已乃作誥以解釋其意歎息言民生有耳目口鼻愛惡之欲無主則爭且亂矣天生聰明所以為之主而治其爭亂者也墜陷也塗泥炭火也桀為民主而反行昏亂陷民於塗炭既失其所以為主矣然民不可以無主也故天錫湯以勇智之德勇足以有為智足以有謀非勇智則不能成天下之大業也表正者表正於此而影直於彼也天錫湯以勇智者所以使其表正萬邦而繼禹舊所服行也此但率循其典常以奉順乎天而已天者典常之理所自出而典常者禹之所服行者也湯革夏而纘舊服武革商而政由舊孔子所謂百世可知者正以是也林氏曰齊宣王問孟子曰湯放桀武王伐紂有諸孟子曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弒君也夫立之君者懼民之殘賊而無以主之為之主而自殘賊焉則君之實喪矣非一夫而何孟子之言則仲虺之意也纂注陳氏傅良曰仲虺作誥非但釋湯之慙亦進德戒滿之書也何新安陳氏曰凡湯之表正纘率乃所以奉若天命也慙之有此以天之生湯者釋之以見湯之順乎天也曰吕氏曰以湯勇智如此惟循常行之理而己真氏湯之伐桀自謂不幸而處變故有慙德以為不獨愧於人亦愧於天仲虺解之曰此特循其常道以順天命而已蓋變而不失其正即所謂常也夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥帥矯與矯制之矯同誣罔臧善式用爽明師衆也天以形體言帝以主宰言桀知民心不從矯詐誣罔託天以惑其衆天用不善其所有為用使有商受命用使昭明其衆庶也王氏曰夏昏德則衆從而昏商有明德則衆從而明有吳氏曰用爽厥師續下文簡賢附勢意不相貫疑脫誤簡賢附勢實繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧豫之德言足聽聞簡略繁多肇始也戰戰恐懼貌言簡賢附勢之人同惡相濟實多徒衆肇我邦於有夏為桀所惡欲見剪除如苗之有莠如粟之有秕鋤治簸揚有必不相容之勢商衆小大震恐無不懼陷于非罪况湯之德言則足人之聼聞尤桀所忌疾者乎以苖粟喻桀以莠秕喻湯特言其不容於桀而迹之危如此史記言桀囚湯於夏臺湯之危屢矣無道而惡有道勢之必至也輯録問矧豫之德言足聼聞據古注云道德善言某竊意言足聼聞自當作句言吾之德言之足使人聼聞彼安得不忌之未知是否先生曰是賀孫纂注林氏曰桀召湯而囚之夏臺以戰戰懼非辜之言觀之史不虛矣陳氏經曰德言令聞也惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟己改過不吝克寬克仁彰信兆民邇近殖聚也不近聲色不聚貨利若未足以盡湯之德然此本原之地非純乎天德而無一毫人欲之私者不能也本原澄徹然後用人處己而莫不各得其當懋茂也繁多之意與時乃功懋哉之義同言人之懋於德者則懋之以官人之懋於功者則懋之以賞用人惟己而人之有善者無不容改過不吝而已之不善者無不改不忌能於人不吝過於己合併為公私意不立非聖人其孰能之湯之用人處己者如此而於臨民之際是以能寬能仁謂之能者寬而不失於縱仁而不失於柔易曰寬以居之仁以行之君德也君德昭著而孚信於天下矣湯之德足人聼聞者如此纂注林氏曰稱湯之盛德首以不邇聲色不殖貨利者老子曰惟無以天下為者可以有天下湯之心清淨寡欲湛然不動舉天下之聲色貨利曽不足以動其心則其伐夏救民果有利之之心乎葛氏曰君子小人之進退繫於人君心術之正邪心術一正則君子進否則小人進矣君心惑於聲色則便辟之臣得志貪於貨利則聚斂之臣得志有功德者官賞何由及之不邇不殖乃懋德懋功之根本也孔氏曰勉於德者則勉之以官林氏曰用人惟己如自己出若所謂善與人同舍己從人樂取諸人以為善也新安陳氏曰六經言仁自克寬克仁一言始遂開萬世言仁之端仁者心之德愛之理以心德之體言則仁為體寬為用以愛之用言則寬以容人仁以愛人皆用也德莫大於仁湯所以克仁者實自不邇不殖之無私欲始歟愚案傳訓懋為茂又謂與時乃功懋哉同義而後實訓勉此當從之乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後豫攸徂之民室家相慶曰徯豫后后來其蘇民之戴商厥惟舊哉葛國名伯爵也餉饋也仇餉與餉者為仇也葛伯不祀湯使問之曰無以供粢盛湯使亳衆往耕老弱饋餉葛伯殺其童子湯遂征之湯征自葛始也奚何徯待也蘇復生也西夷北狄言逺者如此則近者可知也湯師之未加者則怨望其來曰何獨後豫其所往伐者則妻拏相慶曰待我后久矣后來我其復生乎他國之民皆以湯為我君而望其來者如此天下之愛戴歸往於商者非一日矣商業之興蓋不在於鳴條之役也吕氏曰夏商之際君臣易位天下之大變然觀其征伐之時唐虞都俞揖遜氣象依然若存蓋堯舜禹湯以道相傳世雖降而道不降也纂注新安陳氏曰民之戴商如此何慙之有此以民之歸湯者釋之以見湯之應乎人也佑賢輔德顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌前既釋湯之慙此下因以勸勉之也諸侯之賢德者佑之輔之忠良者顯之遂之所以善善也侮説文曰傷也諸侯之弱者兼之昧者攻之亂者取之亡者傷之所以惡惡也言善則由大以及小言惡則由小以及大推亡者兼攻取侮也固存者佑輔顯遂也推彼之所以亡固我之所以存邦國乃其昌矣纂注林氏曰天之生物必因其材而篤焉故栽者培之傾者覆之天理之自然也佑輔顯遂為善者必為人所助也兼攻取侮為不善者必為人所侵也聖人因其常理以應世有亡之道則推而亡之有存之道則輔而固之桀有亡道湯因其將亡而推之果何容心哉章復齋董氏曰推亡固存一句乃總結上意愚案此傳義與前題下説録不同林董得之德日新萬邦惟懷志自滿九族乃離王懋昭大德建中于民以義制事以禮制心垂裕後昆豫聞曰能自得師者王謂人莫己若者亡好問則裕自用則小德日新者日新其德而不自己也志自滿者反是湯之盤銘曰苟日新日日新又日新其廣日新之義歟德日新則萬邦雖廣而無不懷志自滿則九族雖親而亦離萬邦舉逺以見近也九族舉親以見疏也王其勉明大德立中道於天下中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正內外合德而中道立矣如此則非特有以建中於民而垂諸後世者亦綽乎有餘裕矣然是道也必學焉而後至故又舉古人之言以為隆師好問則德尊而業廣自賢自用者反是謂之自得師者真知己之不足人之有餘委心聽順而無拂逆之謂也孟子曰湯之於伊尹學焉而後臣之故不勞而王其湯之所以自得者歟仲虺言懷諸侯之道推而至於能自得師夫自天子至於庶人未有捨師而能成者雖生知之聖亦必有師焉後世之不如古非恃世道之降抑亦師道之不明也仲虺之論遡流而源要其極而歸諸自得師之一語其可為帝王之大法也歟輯録問禮義本諸人心惟中人以下為氣稟物欲所拘蔽所以反著求禮義自治若成湯尚何須以義制事以禮制心曰湯武反之也便也是有些子不那底了但他能恁地所以為湯若不恁地便是惟聖罔念作狂聖人雖則説是生知安行便只是常常恁地不已所以不可及若有一息不恁地便也是凡人了問若舜由仁義行便是不操而自存否曰這都難説舜只是不得似衆人恁地著心自是操賀孫以義制事以禮制心此自是內外交相養之法事在外義由內制心在內禮由外作銖問禮莫是攝心之規矩否先生曰只是箇心如顔子非禮勿視之類皆是也又曰今學者别無事只是要以心觀理理是心中所有常存此心以觀衆理只此兩事耳鍊纂注唐氏曰聖人德貴於日新故繼以懋昭大德以義以禮所以日新其德也太史范氏曰神宗在東宫王陶講志自滿九族乃離神宗言九族乃離微子之去是也王氏十朋曰聖人於事與心無所事於制所以然者使後人有可繼之道也於新安陳氏曰德與中皆當兼體用而言德即人所得天以具衆理而應萬事者也天德云者全體大用無非大也懋勉以昭明之則全體呈露妙用顯行矣由是而建中道之標凖使民之罔中者皆惟我之中則不偏不倚無過不及是中之體用亦無不備矣然禮義德也即昭德建中之要也動而以義制事即義以方外之謂能以義方外則此德應萬事之大用以行而此中無過不及之用在是矣靜而以禮制心即敬以直內之謂能敬以直內則此德具衆理之全體以立而此中不偏不倚之體在是矣所謂垂裕固禮義之餘用也亦即昭德建中之餘用也非昭德専以建中于民而禮義専以垂裕於後也陳氏大猷曰能自得師則天下之善皆歸於己故可以王謂人莫已若則驕矜侮慢善日消惡日長亡之道也好問則衆善集故優裕自用則能有限故狹小嗚呼慎厥終惟其始殖有禮覆昏暴欽崇天道永保天命上文既勸勉之於是歎息言謹其終之道惟於其始圖之始之不謹而能謹終者未之有也伊尹亦言謹終于始事雖不同而理則一也欽崇者敬畏尊服之意有禮者封殖之昏暴者覆亡之天之道也欽崇乎天道則永保其天命矣案仲虺之誥其大意有三先言天立君之意桀逆天命而天之命湯者不可辭次言湯德足以得民而民之歸湯者非一日末言為君艱難之道人心離合之機天道福善禍淫之可畏以明今之受夏非以利己乃有無窮之恤以深慰湯而釋其慙仲虺之忠愛可謂至矣然湯之所慙恐來世以為口實者仲虺終不敢謂無也君臣之分其可畏如此哉纂注王氏十朋曰殖禮覆暴即上文佑輔取侮之事新安胡氏曰有禮昏暴蓋欲湯之自警也湯豈昏暴者哉此亦虞廷以傲虐戒舜之意而愚謂君臣人倫之大經也帝王綱紀天下先謹乎此後人得安焉世故無盡人欲無涯不忠之臣何代無之所以畏縮而不敢肆者猶以古無是事前無是人無以藉口耳苟一為之則後有潛蓄不軌之心而囂然以逞者其不借以為辭乎故湯以自慙曰豫恐來世以台為口實然湯豈至是而後知哉蓋謂非台小子敢行稱亂則顔忸怩而心不寧已久矣天人交迫但知為民除害而非以為己利也及桀已放夏已亡而天下之不吾釋然後慙於逐君而代立聖人之本心於是愈不自安矣不有仲氏之誥以明其不得不為之意與不可妄為之理則何以暴白成湯之心事而陰折來者之姦謀自是而後昏德不如桀勇智不如湯皆未可以藉口也湯誥湯伐夏歸亳諸侯率職來朝湯作誥以與天下更始今文無古文有王歸自克夏至于亳誕告萬方誕大也亳湯所都在宋州穀熟縣王曰嗟爾萬方有衆明聼豫一人誥惟皇上帝降衷于下民若有恆性克綏厥猷惟后皇大衷中若順也天之降命而其仁義禮智信之理無所偏倚所謂衷也人之稟命而得仁義禮智信之理與心俱生所謂性也猷道也由其理之自然而有仁義禮智信之行所謂道也以降衷而言則無冇偏倚順其自然固有常性矣以稟受而言則不無清濁純雜之異故必待君師之職而後能使之安於其道也故曰克綏厥猷惟后夫天生民有欲以情言也上帝降衷于下民以性言也仲虺即情以言人之欲成湯原性以明人之善聖賢之論互相發明然其意則皆言君道之繫於天下者如此之重也輯録蔡行父問書所謂降衷曰古之聖賢才説出便是這般話成湯當枚桀之初便説惟皇上帝降衷于下民若有恆性克綏厥猷惟后武王伐紂時便説惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母傅説告髙宗便説明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟天聰明惟聖時憲見古聖賢朝夕只見那天在眼前賀孫惟皇上帝降衷下民孔安國以為降善便是無意思衷不是善只是中與民受天地之中一般泳問降衷于下民云云先生曰何故不説降善却説降衷看得衷字是箇無過不及恰好底道理天之生物箇箇有一精當恰好底道理此與程子所謂天然自有之中劉子所謂民受天地之中相似與詩所謂秉彜張子所謂萬物一原又自不同彛是常道有物有則則字却似衷字天之生物必有箇當然之則蓋君有君之則臣有臣之則耳有耳之則目有目之則止於仁君之則也止於敬臣之則也視曰明目之則也聽曰聰耳之則也故民執以為常道也若説降衷便是秉彝則不可若説便是萬物一原亦不可萬物一原自説萬物皆出此也若統論道理固是一般然其中名字位分又自不同若只一般聖賢何故説許多名字若曉得名字訓義之不同方見其所謂同衷只是中令人言折衷者蓋以是為凖則而取正也之詩書所説便是有箇人在上恁地分付如帝乃震怒類然這箇亦只是理如此天下莫尊於理故以帝名之降衷便是有主宰意淳天地自有箇無心之復卦一陽生於下這便是生物之心如惟皇上帝降衷于下民天道福善禍淫便自分明有箇人在裏主宰相似道夫陶安國問降衷與受中之中二字義同異先生曰左氏云始終衷皆舉之又云衷甲以見看此衷字義本是衷甲以見之義為其在衷而當中也終中字大槩因無過不及而立名如六藝折衷於夫子蓋是折兩頭而取其中之義後人以衷為善却説得未親切又曰此蓋指大本之中也此處中庸説得甚明他曰考之自見自天而言則謂之降衷自人受此中而言則謂之性猷即道也道者性之發用處能安其道者惟后也僩纂注孔氏曰順人有常之性能安立其道教則惟為君之道真氏曰成湯有天下之初即以此自任可謂知君即之職矣厥後秉彛受中之言相繼而發至于孔孟性善之理益明而開萬世性學之原則自成湯始新安陳氏曰諸家解若有恆性一句皆屬下句以為皆君之事蔡獨屬上文以為人性本然之天若宇輕説克字方重説天賦人受本有恆性君不必容力於其間也至於修道之教使人各安其道則方有賴於君焉蓋諸解以惟后對惟皇上帝作兩股説蔡以帝衷民性后綏作三股説觀此一假蔡傳非可易及朱子誠不輕付矣夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祇天道福善禍淫降災于夏以彰厥罪言桀無有仁愛但為殺戮天下被其凶害如荼之苦如毒之螫不可堪忍稱寃於天地鬼神以冀其拯已屈原曰人窮則反本故勞苦倦極未嘗不呼天也天之道善者福之淫者禍之桀既淫虐故天降災以明其罪意當時必有災異之事如周語所謂伊洛竭而夏亡之類輯録問天道福善禍淫此理定否曰如何不定自是道理當如此問或有不如此者何也曰福善禍淫其常理也不如此便是失其常理天莫之為而為天亦何嘗有意只是理自是如此且如冬寒夏熱此是常理當如此若冬熱夏寒便是失其常理近年徑山嘗六七月大雪肆台小子將天命明威不敢赦敢用玄牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命肆故也故我小子奉將天命明威不敢赦桀之罪也玄牡夏尚黑未變其禮也神后后土也聿遂也元聖伊尹也上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖孚允皆信也僭差也賁文之著也殖生也上天信佑下民故夏桀竄亡而屈服天命無所僭差燦然若草木之敷榮兆民信乎其生殖矣輯録賁若言草木之美允殖言兆民信安其生罪人既黜伏天命既弗差故草木華美百姓豐殖謂人物皆遂東齊集傳賁若草木兆民允殖諸家説多不同未知當如何看曰連上句天命不僭明白易見故人得遂其生也僩俾豫一人輯寧爾邦家兹朕未知獲戾于上下栗栗危懼若將隕于深淵輯和戾罪隕墜也天使我輯寧爾邦家其付豫之重恐不足以當之未知已得罪於天地與否驚恐憂畏若將墜於深淵蓋賁愈重則憂愈大也凡我造邦無從匪彛無即慆淫各守爾典以承天休夏命已黜湯命惟新侯邦雖舊悉與更始故曰造邦彜法即就慆慢也匪彛指法度言慆淫指逸樂言典常也各守其典常之道以承天之休命也爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在豫一人豫一人有罪無以爾萬方簡閲也人有善不敢以不逹己有罪不敢以自恕簡閲一聼於天然天以天下付之我則民之有罪實君所為君之有罪非民所致非特聖人厚於責己而薄於貴人是乃理之所在君道當然也輯録楊尹叔問簡在帝心注簡閲也如何曰善與罪天皆知之如天檢點數過相似爾之有善也在帝心我之有惡也在帝心寓纂注林氏曰所謂罪在朕躬非必己身有可指之罪然後為罪也蓋天降衷于民而以克綏厥猷者付之一人為君者必使天下之人皆不失其降衷之性以安厥猷方無負於天之所付若民有罪是為君者教之不至所以自棄於愚不肖之地而莫能返非民之罪乃君之罪也所以曰罪在朕躬也民有罪則君致之君有罪乃其自取夫以一人之身臨蒞四海而天下人之罪皆歸其身必使天下之人皆無罪然後為能盡君之職而無負於天之所任論至此則獲戾於上下亦豈難哉此所以危懼若將隕也湯誥一書多兢業之意新安陳氏曰此所以繳結篇首降衷有性綏猷之言深味之成湯可謂知君師之職矣嗚呼尚克時忱乃亦有終忱信也歎息言庶幾能於是而忱信焉乃亦有終也吳氏曰此兼人已而言纂注新安胡氏曰歎息言尚克相與於是盡其忱誠則乃亦有終焉否則未保其所終也曰尚曰亦皆不敢必之辭蓋兢兢不忽之意實兼人已而言不特湯自謂當如此亦欲萬方諸侯皆勉於此也新安陳氏曰此篇見成湯明命性之理知君師之道監夏之所以亡而凛凛於今之所以興且戒諸侯以相與盡守邦國終之道真帝王之格言聖學之淵源也論語摘其要語曰豫小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬但書詳而語略耳伊訓訓導也太甲嗣位伊尹作書訓導之史録為篇今文無古文有輯録商書幾篇最分曉可玩伊訓太甲等篇又好看似説命蓋髙宗資質髙傅説所説底細了難看若是伊尹與太甲説雖是粗却切於學者之身太甲也不是箇昏愚底人但欲敗度縱敗禮耳廣伊尹書及説命大扺分明易曉今人觀書且看他那分明底其難曉者且置之政使曉得亦不濟事廣惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總己以聽冡宰伊尹乃明言烈祖之成德以訓于王夏曰歲商曰祀周曰年一也元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也乙丑日也不繫以朔者非朔日也三代雖正朔不同然皆以寅月起數蓋朝覲會同班厯授時則以正朔行事至於紀月之數則皆以寅為首也伊姓尹字也伊尹名摯祠者告祭於廟也先王湯也冡長也禮有冡子冡婦之名周人亦謂之冡宰古者王宅憂祠祭則冡宰攝而告廟又攝而臨羣臣太甲服仲壬之喪伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也侯服甸服之羣后咸在百官總己之職以聼冢宰則攝而臨羣臣也烈功也商頌曰衎我烈祖太甲即位改元伊尹於祠告先王之際明言湯之成德以訓太甲此史官敘事之始辭也之或曰孔氏言湯崩踰月太甲即位則十二月者湯崩年建子之月也豈改正朔而不改月數乎曰此孔氏惑於書序之文也太甲繼仲壬之後服仲壬之喪而孔氏曰湯崩奠殯而告固已誤矣至於改正朔而不改月數則於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出遊十一月行至雲夢繼書七月丙寅始皇崩九月葬酈山先書十月十一月而繼書七月九月者知其以十月為正朔而寅月起數未嘗改也且秦史制書謂改年始朝賀皆自十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊例也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣且經曰元祀十有二月乙丑則以十二月為正朔而改元何疑乎惟其以正朔行事也故後乎此者復政厥辟亦以十二月朔奉嗣王歸于亳蓋祠告復政皆重事也故皆以正朔行之孔氏不得其説而意湯崩踰月太甲即位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不容在伊尹而有之不可以不辨又案孔氏以為湯崩吳氏曰殯有朝夕之奠何為而致祠主喪者不離於殯側何待於祗見蓋太甲之為嗣王嗣仲壬而王也大甲太丁之子仲壬其叔父也嗣叔父而王而為之服三年之喪為之後者為之子也太甲既即位於仲壬之柩前方居憂於仲壬之殯側伊尹乃至商之祖廟遍祠商之先王而以立太甲告之不言太甲祠而言伊尹喪三年不祭也奉太甲遍見商之先王而獨言祗見厥祖者雖遍見先王而尤致意於湯也亦猶周公金縢之册雖遍告三王而獨眷眷於文王也湯既已祔于廟則是此書初不廢外丙仲壬之事但此書本為伊尹稱湯以訓太甲故不及外丙仲壬之事爾餘見書序輯録春秋書元年春王正月這如何要窮曉得設使聖人復出也便未易理會在格言趙氏曰太丁湯之太子未立而死外丙立二年仲壬立四年皆太丁弟也程氏曰古人謂嵗為年湯崩時外丙方二嵗仲壬方四嵗惟太甲差長故立之也二説未知孰是孟注問外丙二年仲壬四年先生兩存趙氏程氏之説則康節之説亦未可據邪曰也怎生便信得他又問如此則堯即位於甲辰年亦未可據也曰此却據諸厯書如此説恐或有之然亦未可必曰若如此則二年四年亦可推矣曰却為中間年代不可紀自共和以後方可紀則湯時自無由可推此類且當闕之不可深究廣銖問書序言成湯既沒太甲元年玩其語意則是成湯沒而太甲立太甲既立不明伊尹放諸桐三年則是大甲服湯之喪既不明伊尹遂使居於湯之墓廬三年而克終允德也或者乃曰孟子曰湯崩太丁未立外丙二年仲壬四年湯沒六年而太甲立太甲服仲壬之喪夫服仲壬之喪而乃廬於乃祖之墓恐非人情伊川謂太丁未立而死外丙方二嵗仲壬方四嵗乃立太丁之子太甲而或者又謂商人以甲乙為兄弟之名則丙當為兄壬當為弟豈有兄二嵗而弟乃四嵗乎案皇極經世圖紀年之次則太甲實繼成湯而立無疑不知外丙二年仲壬四年之説當作如何訓釋乞賜垂誨先生曰書序恐只是經師所作然亦無證可考但決非夫子之言耳成湯太甲年次尤不可考不必妄為之説讀書求義理以為反身自修之具此等殊非所急也問伊尹祠于先王奉嗣王祇見厥祖是時湯方在殯宫太甲於朝夕奠常在如何伊尹因祠而見之曰此與顧命康王之誥所載冕服之事同意古人自有一件人君居喪之禮但今不存無以考據蓋天子諸侯既有天下國家事體恐難與常人一般行喪禮節伊尹祠于先王若有服不可入廟必有外丙二年仲壬四年節古書錯繆甚多如史記載伊訓有方明二字諸家遂解如反祀方明之類某後考之只是方字之誤當作乃即所謂乃明言烈祖之成德者也纂注新安胡氏曰序言太甲元年序周人所作故稱年書言惟元祀書商史所作故稱祀此元非即位之元年乃即位之次年先王崩崩年即位踰年改元以崩年之十二月為後王元年之首月蓋以正朔行事也胡氏安國春秋傳曰國君嗣世定於初喪必踰年然後改元書即位者緣始終之義一年不二君緣臣民之心曠年不可無君也陳氏大猷曰祠祭也先王商先祖如詩言玄王之類也喪三年不祭不以凶服入宗廟故太甲不親祠而尹攝祠侯甸舉五服之近者以見其餘胡氏春秋傳謂即位者告廟臨羣臣是也明言烈祖成德以訓猶五子述禹之戒周召陳文武之業以祖宗艱難起家之事告子孫則莫不信守之也吕氏曰當太甲居喪之始而訓之乘其初心之虛也後雖昏迷而終克終允德訓之之早故爾吳氏曰意太甲是時不明之迹己見端緒故伊尹稱湯以訓庶幾其速改而不能後卒有桐宫之遷曰嗚呼古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧暨鳥獸魚鱉咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳詩曰殷監不逺在夏后之世商之所宜監者莫近於夏故首以夏事告之也率循假借也有命有天命者謂湯也桀不率循先王之道故天降災借手于我成湯以誅之夏之先后方其懋德則天之眷命如此及其于孫弗率而覆亡之禍又如此太甲不知率循成湯之德則夏桀覆亡之禍亦可監矣哉始也鳴條夏所宅亳湯所宅也言造可攻之釁者由桀積惡於鳴條而湯德之修則始於居亳都時也纂注陳氏大猷曰方者方見其進而未見其止之意日新而未可量也人君為天地鬼神萬物之主而德者天地鬼神萬物之理所謂致中和天地位焉萬物育焉者也吕氏曰夏先后懋德如此宜可憑藉桀才弗率天即降災感應之速反覆手爾懋德而罔災感應之理存於懋德之中也弗率而降災災咎之理存於弗率之中也造釁雖鳴條一日之間而基本則兆於亳邑之素也孫氏曰造為攻伐自於鳴條國必自伐然後人伐之意惟我商王布昭聖武代虐以寬兆民允懷布昭敷著也聖武猶易所謂神武而不殺者湯之德威敷著于天下代桀之虐以吾之寬故天下之民信而懷之也今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海初即位之初言始不可以不謹也謹始之道孝悌而已孝悌者人心之所同非必人人教詔之立植也立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始于家逹于國終而措之天下矣孔子曰立愛自親始教民睦也立敬自長始教民順也纂注吕氏曰告以嗣德在初欲乘其天理正發之初而開導之也之新安胡氏曰此一節言湯以德得人心今王繼先王德當以孝悌之順德而通乎千萬人之心也嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦兹惟艱哉人紀三綱五常孝敬之實也上文欲太甲立其愛敬故此言成湯之肇修人紀者如下文所云也綱常之理未嘗泯沒桀廢棄而湯始修復之也咈逆也先民猶前輩舊德也從諫不逆先民是順非誠於樂善者不能也居上克明言能盡臨下之道為下克忠言能盡事上之心吕氏曰湯之克忠最為難看湯放桀以臣易君豈可為忠不知湯之心最忠者也天命未去人心未離事桀之心曷嘗斯須替哉與人之善不求其備檢身之誠有若不及其處上下人己之間又如此是以德日以盛業日以廣天命歸之人心戴之由七十里而至于有萬邦也積纍之勤兹亦難矣伊尹前既言夏失天下之易此又言湯得天下之難太甲可不思所以繼之哉輯録湯工夫全在敬字上看得來大假是一箇修飭底人故當時人説他做工夫處亦是説得大假地著如禹克勤于邦克儉于家之類却是大綱説到湯便説檢身若不及文蔚曰如云以義制事以禮制心不邇聲色不殖貨利等語可見日新之功曰固是某於或問中所以特地詳載者非説道人不知亦欲學者經心耳文蔚與人不求備檢身若不及大槩是湯急已緩人所以引為日新之實泳因論尚書須是有自得處到自得處説與人也不得如某舊讀伊尹曰先王肇修人紀止兹惟艱哉如此等處直為之廢卷慨想而不能已覺得朋友間看文字難得如此意思某二十歲前後已看得大意如此如今但較精密日月易得匆匆過了五十年格言纂注張氏曰父子兄弟君臣夫婦長幼朋友有禮義以相維謂之人紀傳曰禮義以為紀賈逵注國語云先民古賢人也敷求哲人俾輔于爾後嗣敷廣也廣求賢哲使輔爾後嗣也纂注孫氏曰敷求求之非一方也如立賢無方甚陳氏經曰湯得天下也甚難故其慮天下也逺冝求賢以遺後人也制官刑警于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士官刑官府之刑也巫風者常歌常舞若巫覡然也淫過也過而無度也比昵也倒置悖理曰亂好人之所惡惡人之所好也風風化也三風愆之綱也十愆風之目也卿士諸侯十有其一己喪其家亡其國矣墨墨刑也臣下而不能匡正其君則以墨刑加之具詳悉也童蒙始學之士則詳悉以是訓之欲其入官而知所以正諫也異時太甲欲敗度縱敗禮伊尹先見其微故拳拳及此劉侍講曰墨即叔向所謂夏書昏墨賊殺臯陶之刑貪以敗官為墨輯録臣下不匡之刑蓋施於邦君大夫之喪國亡家者君臣一體不得不然如漢廢昌邑王賀則誅其羣臣而本朝太祖下嶺南亦誅其亂臣龔澄樞李托之類是也澄樞等實亡劉氏乃飛亷惡來之比誅之自不為寃若昌邑羣臣與賀同惡者固不得不誅其餘止可當古者墨刑之坐耳乃不分等級例行誅殺是則霍光之私意也又如文定論楚子納孔儀處事雖不同意亦類此試參考之則知成湯之制官刑正是奉行天討毫髮不差處何疑之有哉答吳晦叔具訓于蒙士吳斗南謂古者墨刑人以蒙蒙其首恐不然廣纂注吕氏曰古成童習舞恆舞則為愆歌以永言酣歌則為愆前六愆因後四愆而生惑史氏仲午曰意當時太甲左右必有以歌舞貨色等其君者尹未指其人明言姑曰先王之制官刑如此而徐為之謀後遂營桐宫不使狎于弗順焉真氏曰殉如殉葬之殉蓋以其身陷于貨色之中死而不顧也臣下所以不匡以其貪官固位故也不諌之罪與貪墨同使人知不獨貪賄之有罪而貪官不諌亦有刑也必左傳昭十四年昏墨賊三者皆死刑薛氏曰善不小故一日克己天下歸仁惡不必多故有一于身家國必喪虞公以垂棘之璧亡其國吳太宰以越之女色覆其宗先王之戒豈誣也或曰臣下不匡而遽入墨之重辟無乃過乎曰置臣所以正主也視主入喪亡而不之救其可貸乎重其刑使之進而諌未必死退而不諫必受刑則雖中不欲諌亦不得不諌也新安陳氏曰湯警有位之官刑其條目詳防制密訓誨豫如此所以為後嗣慮至矣三風十愆以戒卿士邦君而伊尹舉以訓太甲者意謂卿士諸侯犯此已足喪家亡國况天子乎雖不指斥天子微意可見矣况臣下不匡國有常刑則警臣下者欲臣下以是警天子也嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗歎息言太甲當以三風十愆之訓敬之於身念而勿忘也謨謂其謀言謂其訓洋大孔甚也言其謀訓大明不可忽也不常者去就無定也為善則降之百祥為惡則降之百殃各以類應也勿以小善而不為萬邦之慶積於小勿以小惡而為之厥宗之墜不在大蓋善必積而後成惡雖小而可懼此總結上文而又以天命人事禍福申戒之也纂注陳氏大猷曰祗厥身乃指太甲下手用功處一篇之綱領也孫氏曰以其謨之於聖人故曰聖謨以其言之至美故曰嘉言即指三風十愆之戒也能張氏曰不敬其身必納此身於風愆矣能敬其身則如夏后之懋德繼先王以嗣德立愛立敬作善之祥惟德之慶皆自敬其身出敬立則百善從也陳氏經曰既戒以祖訓又戒以天君所當畏惟天惟祖宗也真王氏十朋曰善祥惡殃天之不常乃所以為常也氏曰愆雖有十苟能敬則十者俱泯一不敬則十者俱生故敬之一辭乃治三風砭十愆之藥石也篇將終又深歎聖言之彰明與天命之難保以警動太甲之心冀其必聽其所謂社稷之臣歟新安陳氏曰此篇尹訓太甲於即位之初始終以興亡寓勸戒夏以懋德興桀以弗率亡初意明矣繼言湯以聖武興而欲太甲以愛敬之良心嗣厥德勸之也繼言湯以艱難興而防太甲以欲縱之私心敗厥德戒之也末章作善之降祥爾德之惟慶勸之保其所以興作不善之降殃不德之墜宗戒之陷於所以亡而提綱挈領則在祗厥身之一言能祗敬其身則嗣祖德而興不祗敬其身則背祖德而亡言言忠愛蓋已豫為太甲憂矣但猶包涵未明言之未至如太甲三篇之痛切耳太甲上商史録伊尹告戒節次及太甲往復之辭故三篇相屬成文其間或附史臣之語以貫篇意若史家紀傳之所載也唐孔氏曰伊訓肆命徂后太甲咸有一德皆是告戒太甲不可皆名伊訓故隨事立稱也林氏曰此篇亦訓體今文無古文有輯録伊尹之言極痛切遂感發得太甲如此君陳後亦好然皆寬了多是代言如今代王言者做耳銖伊尹之心公天下以為心而無一毫之私者也孟注纂注新安陳氏曰前一篇作於未遷桐宫之先後二篇作於自桐宫歸亳之後惟嗣王不惠于阿衡惠順也阿倚衡平也阿衡商之官名言天下之所倚平也亦曰保衡或曰伊尹之號史氏録伊尹之書先此以發之纂注葉氏曰阿保通阿亦保之意伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祇肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒顧常目在之也諟古是字明命者上天顯然之理而命之我者在天為明命在人為明德伊尹言成湯常目在之天之明命以奉天地神祗社稷宗廟無不敬肅故天視其德用集大命以有天下撫安萬邦我又身能左右成湯以居民衆故嗣王得以大承其基葉也輯録古注云顧謂常目在之也此語最好非謂有一物常在目前可見也只是常有此心知得有這道理光明不昧方其靜坐未接物也此理固湛然清明及其遇事而應接也此理亦隨處發見只要人常提撕省察念念不忘存養久之則是理益明雖欲忘之而不可得矣僩餘見大學章句附録纂注真氏曰湯惟顧天之明命故天監湯之厥德曰顧曰監可見天人之交至近而非逺也新安陳氏曰此言太甲今日之有天下由於先王之明德以得天下與伊尹之出身以輔先王也有先王創業之祖與尹開國之大臣是以嗣王得以承此大業今日豈可忘先王而不念忽尹而不從哉惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖夏都安邑在亳之西故曰西邑夏周忠信也國語曰忠信為國施氏曰作偽心勞日拙則闕露而不周忠信則無偽故能周而無闕夏之先王以忠信有終故其輔相者亦能有終其後夏桀不能有終故其輔相者亦不能有終嗣王其以夏桀為戒哉當敬爾所以為君之道君而不君則忝辱成湯矣太甲之意必謂伊尹足以任天下之重我雖縱欲未必遽至危亡故伊尹以相亦罔終之言深折其私而破其所恃也輯録問古注及諸家皆以周訓忠信竊謂以忠信自周則可以忠信訓周恐未安未知如何先生曰自周二字本不可曉答潘子善纂注蘇氏曰自由也由忠信之道則有終言君臣一體禍福同也闕吕氏曰自周如周于德之周謂君道周備無一毫虧也自周之中自有有終之理者新安陳氏曰既以桀之無終戒之又以不敬而不君戒之無終則纍於相臣不君則辱於乃祖仍是以先王與尹躬警之也王惟庸罔念聞庸常也太甲惟若尋常於伊尹之言無所念聽此史氏之言輯録問諸家皆於庸字絶句竊謂只作一句讀以庸訓用如説命中王庸作書以告之庸未知是否先生曰六字一句答潘子善纂注真氏曰辟不辟之言殆甚於漢人之所謂帝不諦也然漢君怒而誅之太甲雖以為常無所念聽然不聞其怒也此所以卒至於思庸歟伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人無越厥命以自覆昧晦爽明也昧爽云者欲明未明之時也丕大也顯亦明也先王於昧爽之時洗濯澡雪大明其德坐以待旦而行之也旁求者求之非一方也彥美士也言湯孜孜為善不遑寧處如此而又旁求俊彥之士以開導子孫太甲母顛越且命以自取覆亡也慎乃儉德惟懷永圖太甲欲敗度縱敗禮蓋奢侈失之而無長逺之慮者伊尹言當謹其儉約之德惟懷永久之謀以約失之者鮮矣此太甲受病之處故伊尹特言之輯録儉節制也語注纂注新安胡氏曰永圖即前所謂有終也真氏曰此太甲不惠于阿衡之時也故伊尹訓之者如此夫儉則心小而為慮者逺侈則心大而為謀者踈方是時太甲方以欲敗度縱敗禮心為二者所蔽若浮雲之翳日月未知斯言之為忠也一旦處仁遷義而本心復明然後知受病之源端在於此克終之美光昭簡册伊尹訓戒之功夫豈小哉若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭虞虞人也機弩牙也括矢括也度法度射者之所準望者也釋發也言若虞人之射弩機既張必往察其括之合於法度然後發之則發無不中矣欽者肅恭收斂止見虞書率循也欽厥止者所以立本率乃祖者所以致用所以省括于度則釋也王能如是則動無過舉近可以慰恱尹心逺可以有譽於後世矣安汝止者聖君之事生而知者也欽厥止者賢君之事學而知者也輯録諸家多訓虞為度竊謂只作虞人説如何先生曰作虞人説為是賀孫纂注唐孔氏曰括矢末也莫陳氏大猷曰言欲永終當謹始發也萬事不有度君所以為度在敬汝所當止如君止於仁子止於孝之類則王氏曰語靜之道則曰慎乃儉德欽厥止語動之道曰若虞機張率乃祖攸行有陳氏大猷曰萬世有辭所謂永圖也林氏曰萬世辭所謂相亦惟終也新安陳氏曰罔不祇肅言湯之敬也欽厥止率乃祖攸行勉太甲盡敬以法先王也曰有終曰永圖曰萬世有辭勸之也曰罔克有終曰自覆戒之也此章仍是以先王始之以尹躬結之王能欽敬而有終先王之望尹之幸也王不能欽敬而自覆非先王之望尹之不能盡其責也尹本自任以天下之重又受先王託孤之重任故告戒之辭節節提起先王而以與尹躬相關繫收結之王未克變不能變其舊習也此亦史氏之言伊尹曰兹乃不義習與性成豫弗狎于弗順營于桐宫密邇先王其訓無俾世迷狎習也弗順者不順義理之人也桐成湯墓陵之地伊尹指太甲所為乃不義之事習惡而性成者也我不可使其狎習不順義理之人於是營宫於桐使親近成湯之墓朝夕哀思興起其善以是訓之無使終身迷惑而不悟也纂注陳氏經曰習為不義若與性俱成賈誼曰少成若天性習慣如自然王徂桐宫居憂克終允德徂往允信也有諸已之謂信實有其德於身也凡人之不善必有從臾以導其為非者太甲桐宫之居伊尹既使其密邇先王陵墓以興發其善心又絶其比昵之黨而革其汚染此其所以克終允德也次篇伊尹言嗣王克終厥德又曰允德協于下故史氏言克終允德結此篇以發次篇之義纂注新安陳氏曰伊尹此舉蓋處君臣之變者知太甲之性不過中人平日誘以為惡之近習必多而輔以善之大臣惟一伊尹而已孤忠不能勝引誘之衆徒言不能開迷惑之久遂營桐宫以居之此不言之教逹變之權惟自任以天下之重如伊尹之開國元老大忠大公者能之而非泛焉之大臣所敢為也又案千古性學開端於若有恆性之一言其次則伊尹習與性成之一言也恆性以天地之性言與性成以氣質之性言天地之性氣質之性雖至近世橫渠張氏而剖判言之已肇端於湯尹言性之初矣頑愚謂太甲嗣位伊尹已述侮聖言逆忠直逺耆德比童之戒太甲乃不惠阿衡庸罔念聞而狎于不順非亂風之猶存乎苟非伊尹超然深識通權逹變為遷桐之舉有以動心忍性增益其所不能其不危乎太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳太甲終喪明年之正朔也冕冠也唐孔氏曰周禮天子六冕備物盡文惟衮冕耳此蓋衮冕之服義或然也奉迎也喪既除以衮冕吉服奉迎以歸也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥德實萬世無疆之休民非君則不能相正以生君非民則誰與為君者言民固不可無君而君尤不可失民也太甲改過之初伊尹首發此義其喜懼之意深矣夫太甲不義有若性成一一翻然改悟是豈人力所至蓋天命眷商隂誘其𠂻故嗣王能終其德也何也湯緒幾墜今其自是有永豈不為萬世無疆之休乎纂注林氏曰太甲終厥德伊尹力也而歸之天者君子能致人于悔過遷善之地不能必其人有悔過遷善之心尹嘗五就桀矣事雖不可見即其感悟太甲者觀之於桀必盡其忠誠矣而桀終不改則太甲悔過庸非天乎湯宜有餘慶故太甲為之孫始皇宜有餘殃故扶蘇為之子天也陳氏經曰若人事不盡而一切諉於天太甲之書不作桐宫之居不營而謂太甲不明天實為之則非聖賢以人合天以義合命之道矣吕氏曰使太甲不改事將若何今既克終喜慰何如哉玩味實字可見新安陳氏曰克終厥德即前篇所望其有終者也此所謂萬世無疆之休即前篇所望其萬世有辭者也前願之而未得今得遂其所願向也湯緒幾覆今也自是可久先王之望遂矣伊尹之責塞矣其欣幸為何如而得不因其遷善之一初而許與期望之於悠久也哉王拜手稽首曰豫小子不明于德自砥不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終拜手首至手也稽首首至地也太甲致敬於師保其禮如此不類猶不肖也多欲則興作而亂法度縱肆則放蕩而墮禮儀度就事言之也禮就身言之也速召之急也戾罪孽災逭逃也既往已往也已往既不信伊尹之言不能謹之于始庶幾正救之力以圖惟其終也當太甲不惠阿衡之時伊尹之言惟恐太甲不聽及太甲改過之後太甲之心惟恐伊尹不言夫太甲固困而知之者然昔之迷今之復昔之晦今之明如日月昏蝕一復其舊而光采炫耀萬景俱新湯武不可及已豈居成王之下乎輯録古者天子尊師重傅太甲拜手稽首成王拜手稽首疏言稽首稽留七意是首至地之久也晉元帝拜王導至其家亦拜其妻格言纂注新安胡氏曰伊尹雖謂太甲克終厥德太甲不敢自保方賴伊尹正救以圖惟厥終伊尹拜手稽首曰修厥身允德協于下惟明后伊尹致敬以復太甲也修身則無敗度敗禮之事允德則有誠身誠意之實德誠於上協和于下惟明后然也纂注新安陳氏曰惟明后與不明于德相應太甲自謂不明于德尹遂以修身協下而為明后者許與期望之豈苟然者修身本諸身者允德協下徴諸庶民也誠實之德孚契人心其身修之驗歟先王子惠困窮民服厥命罔有不恱並其有邦厥鄰乃曰徯我后后來無罰此言湯德所以協下者困窮之民若己子而惠愛之惠之若子則心之愛者誠矣未有誠而不動者也故民服其命無有不得其歡心當時諸侯並湯而有國者其鄰國之民乃以湯為我君曰待我君我君來其無罰乎言除其邪虐湯之得民心也如此即仲虺后來其蘇之事輯録並其有邦止后來無罰言湯與彼皆有土諸侯而鄰國之人乃曰云云此可見得民心處賀孫王懋乃德視乃厥祖無時豫怠湯之盤銘曰苟日新日日新又日新湯之所以懋其德者如此太甲亦當勉於其德視烈祖之所為不可頃刻而逸豫怠惰也奉先思孝接下思恭視遠惟明聽德惟聰朕承王之休無斁思孝則不敢違其祖思恭則不敢忽其臣惟亦思也思明則所視者逺而不蔽於淺近思聰則所聽者德而不惑於憸邪此懋德之所從事者太甲能是則我承王之美而無所厭斁也輯録能視逺謂之明所視不逺不謂之明能聽德謂之聰所聽非德不謂之聰視聽是物聰明是則燾視不為惡色所蔽為明聽不為孫姦人所欺為聰賀纂注陳氏大猷曰人君修德須就受病處藥之太甲前日覆湯典刑不惠阿衡由不思孝思恭也既立不明背棄師訓由視溺于近聽惑于邪也今既盡此四者則病根去而德成矣尹恥君不及堯舜太甲德成尹責始盡是承王之美於無窮也張氏曰人志必有所準的然後能有所立舜不以堯為的則不能重華孔子不以周公為的則不能大成顔孟不以孔子為的則不能傳道統視乃厥祖欲太甲以成湯為的也然新安陳氏曰伊尹提起先王子惠而勉以視乃厥祖後以朕承王休結之仍是以先王尹躬對言以警動期望之也之愚謂太甲之心前日隂霾昏蝕一旦天日開明迪哲資誠不可及矣孝恭明聰四者修身之要允德之目也太甲下纂注陳氏大猷曰伊訓作于太甲未有過之先尹欲預防其縱故其辭嚴太甲上篇作于太甲有過之時尹不欲激之而微轉其機故其辭婉中篇作于悔過之初尹深自喜慰故其辭溫下篇作于改過之後尹慮其或不克終故其辭深以厲大臣格言淺深有序蓋如此伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉申誥重誥也天之所親民之所懷鬼神之所享皆不常也惟克敬有仁克誠而後天親之民懷之鬼神享之也曰敬曰仁曰誠者各因所主而言天謂之敬者天者理之所在動靜語默不可有一毫之慢民謂之仁者民非元后何戴鰥寡孤獨皆人君所當恤鬼神謂之誠者不誠無物誠立于此而後神格于彼三者所當盡如此人君居天之位其可易而為之哉分而言之則三合而言之一德而已太甲遷善未幾而伊尹以是告之其才固有大過人者歟纂注真氏曰敬誠仁並言始于此三者堯舜禹湯之正傳也德惟治否德亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后德者合敬仁誠之稱也有是德則治無是德則亂治固古人有行之者矣亂亦古人有行之者也與古之治者同道則無不興與古之亂者同事則無不亡治而謂之道者蓋治因時制宜或損或益事未必同而道則同也亂而謂之事者亡國喪家不過貨色遊畋作威殺戮等事事同道無不同也治亂之分顧所與如何耳始而與治固可以興終而與亂則亡亦至矣謹其所與終始如一惟明明之君為然也上篇言惟明后此篇言惟明明后蓋明其所已明而進乎前者矣纂注真氏曰與治同道罔不興道指全體而言如堯舜之仁湯武之義是也與亂同事罔不亡事指一事而言如太康畋遊桀紂暴虐之類是也必同道乃興宋襄公以不禽二毛自比文王不知一事之同而他事之不副其能有興乎苟同事必亡三風十愆或有其一無不亡者蓋興之難而亡之易如此斯天位之所以難歟終新安陳氏曰此因尚賴匡救圖惟厥終之説而進圖之道也圖終之道常不變其始而已終始慎其所與則不特初心之明而為明后且悠久常保此初心之明而為明明后矣尹蓋慮太甲悔艾於初而轉移於終也故言及此先王惟時懋敬厥德克配上帝今王嗣有令緒尚監兹哉敬即克敬惟親之敬舉其一以包其二也成湯勉敬其德德與天合故克配上帝今王嗣有令緒庶幾其監視此也纂注新安胡氏曰些欲太甲與湯之治同道也若升高必自下若陟遐必自邇此告以進德之序也中庸論君子之道亦謂譬如行逺必自邇譬如登高必自卑進德修業之喻未有如此之切者吕氏曰自此乃伊尹畫一以告太甲也纂注新安陳氏曰觀法先王豈一蹴能至自下自邇欲其希賢進德之有序也無輕民事惟難無安厥位惟危無毋通毋輕民事而思其難毋安君位而思其危慎終于始人情孰不欲善終者特安於縱欲以為今日姑若是而他日固改之也然始而不善而能善其終者寡矣桐宫之事往已今其即政臨民亦事之一初也有言逆于汝心必求諸道有言遜于汝志必求諸非道鯁直之言人所難受巽順之言人所易從於其所難受者必求諸道不可遽以逆于心而拒之於其所易從者必求諸非道不可遽以遜于志而聽之以上五事蓋欲太甲矯乎情之偏已輯録治道别無説若使人主恭儉好善有言逆于汝心止必求諸非道如何會不治這别無説從古來都有見成棣子直是如此格言纂注陳氏大猷曰忘其言之逆順而揆諸道之當否合道則逆者乃所以為遜非道則遜者乃所以為逆前日欲縱之時尹之言固嘗逆心而臣下之言固嘗有遜志者矣故復以為戒嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何也弗慮何得欲其謹思之也弗為何成欲其篤行之也元大良善貞正也一人者萬邦之儀表一人元良則萬邦以正矣君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休弗思弗為安於縱弛先王之法廢矣能思能為作其聰明先王之法亂矣亂之為害甚於廢也成功非寵利之所可居者至是太甲德已進伊尹有退休之志矣此咸有一德之所以繼作也君臣各盡其道邦國永信其休美也背吳氏曰上篇稱嗣王不惠于阿衡必其言有與伊尹違者辨言亂政或太甲所失在此罔以寵利居成功已之所自處者已素定矣下語既非泛論則上語必有為而發也纂注林氏曰自古受託孤之寄者於進退之際可謂至難為幼主者類多血氣未定趨捨未堅苟未能離師輔而不反則吾退而小人乘間以進必將以辨言亂舊政而胎國家之禍矣所以伊尹明告以堅其心而遂示以引身求退之意焉陳氏曰伊尹為桐宫不得已之舉必輕寵利然後可絶天下之疑而杜讒賊之口使功成居之有一毫利之之心則好議論者安知不以前日之事為疑乎所以作書未終而歸志已露也新安陳氏曰老氏曰功成而不居蔡澤曰四時之序功成者去伊尹聖之任者也耕萃之初天下何與於我自幡然從湯以後則以身任責不容釋矣不幸湯崩主少不明幾覆商祚身任此責愈不容釋矣不得已置君於桐以身攝政蓋既以身任重不容不犯臣子之大不得已而非可諉其責於他人也觀其告戒拳拳言言忠愛必以先王尹躬對言幸而太甲悔過修德遂亟復政於君欲奉身以退尹至是上無負於先王次無負於太甲下無負於天下以身任重可以釋矣由其任重恐恐不勝之心而復還耕莘囂囂自得之身其欣幸當何如哉此而不退則寧無貪戀寵利之疑置君於桐大不獲己至忠至公之本心誰白之者伊尹可謂自任之重自處之審矣使湯有太甲為之孫而無伊尹為之佐其不一再傳而斬者幾希尚何六百年之敢望哉愚謂伊訓作於太甲嗣位之初重在謹始故曰今王嗣厥德罔不在初太甲上篇作於不惠阿衡之時重在謹習故曰習與性成豫弗狎于弗順中篇作於克終允德之後重在懋德故曰王懋乃德無時豫怠下篇申言懋德之意重在謹終故曰終始慎厥與又曰慎終于始蓋方其未悟也惟恐無以善始及其既悟也又惟恐無以善終伊尹之於太甲先憂而喜後喜而憂拳拳忠愛言有盡而意無窮蓋如此咸有一德伊尹致仕而去恐太甲德不純一及任用非人故作此篇亦訓體也史氏取其篇中咸有一德四字以為篇目今文無古文有伊尹既復政厥辟將告歸乃陳戒于德伊尹已還政太甲將告老而歸私邑以一德陳戒其君此史氏本序曰嗚呼天難諶命靡常常厥德保厥位厥德靡常九有以亡諶信也天之難信以其命之不常也然天命雖不常而常於有德者君德有常則天命亦常而保厥位矣君德不常則天命亦不常而九有以亡矣九有九州也纂注蔡氏元度曰常厥德所謂德惟一不常厥德所謂德二三惟一為能常新安陳氏曰一者無雜無息一可以包常常則一之無間斷者也惟純而不雜所以久而不息夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正上文言天命無常惟有德則可常於是引桀之所以失天命湯之所以得天命者證之一德純一之德不雜不息之義即上文所謂常德也神主百神之主享當也湯之君臣皆有一德故能上當天心受天明命而有天下於是改夏建寅之正而為建丑正也輯録銖問咸有一德竊謂一者是純一而不雜德至於純一而不雜所謂至德也所謂純一而不雜者蓋歸於至當無二之地無纎毫私意人欲間雜之猶易之恆中庸之誠也説者多以咸有一德為君臣同德咸有一德固有同德意而一非同也言君臣皆有此一德而已先生曰此篇先言常德庸德後言一德則一者常一之謂爰革夏正只是正朔之正賀孫非天私我有商惟天佑于一德非商求于下民惟民歸于一德上言一德故得天得民此言天佑民歸皆以一德之故蓋反復言之德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德二三則雜矣德之純則無往而不吉德而雜則無往而不凶僣差也惟吉凶不差在人者惟天之降災祥在德故也纂注張氏曰一者純乎天理二三者雜於人欲天理無往而不吉人欲無往而不凶以其體即凶也災林氏曰降於天者為祥受於人者為吉凶今嗣王新服厥命惟新厥德終始惟一時乃日新太甲新服天子之命德亦當新然新德之要在於有常而已終始有常而無間斷是乃所以日新也輯録終始惟一時乃日新這箇道理須是常接續不已方是日新才有間斷便不可德明纂注張氏曰此告太甲以繼湯之一德也太甲即位已久此自復位時言既新服受天命其德亦當俱新陳陳氏大猷曰終始惟一此言修德之當一也新安氏曰太甲復位之初自怨自艾始能自新矣然終或間斷則非日新也湯之盤銘曰苟日新日日新又日新其自警如此仲虺之誥曰德日新萬邦惟懷仲虺告湯亦如此是日新乃太甲乃祖之家學也尹以湯之日新望太甲必以湯之一德勉太甲故時乃日新必先之以終始惟一焉視湯之銘發明精密任官惟賢材左右惟其人臣為上為德為下為民其難其慎惟和惟一賢者有德之稱材者能也左右者輔弼大臣非賢材之稱可盡故曰惟其人夫人臣之職為上為德左右厥辟也為下為民所以宅師也不曰君而曰德者兼君道而言也臣職所係其重如此是必其難其慎難者難於任用慎者慎於聽察所以防小人也惟和惟一和者可否相濟一者終始如一所以任君子也輯録問左右何所指曰只是指親近之臣任官是指任事底人也當臣為上為德為下為民諸家説不同不知此四為字作如何音先生曰為字並去聲為上者輔其德而不阿其意之所欲為下者利於民而不徇己之所安時舉賀孫因説如逢君之惡也是為上而非是為德為宫室妻妾之奉也是為下而非是為民曰然伊尹告太甲却是與尋常人説話便恁地分明恁地切身至今看時通上下皆使得至傅説告髙宗語意却深緣髙宗賢明可以説這般話故傳説輔之説得較精微伊尹告太甲前一篇許多説話却從天理窟中抉出許多話分明説與他今看來句句是天理又云非讀此如何看得道理透見得聖人許多説話都是天理又云伊尹説得極懇切許多説話重重疊疊説了又説臣論其難其慎曰君上下相與甚難節纂注林氏曰任官大臣至百執事也左右侍御僕從之類或以左右為大臣非也自古賢材在位天子左右苟非其人則勢不兩立小人必勝君子必危欲賢材之任官非左右惟其人不可也民張氏曰尹欲堯舜其君則為上為德可知欲堯舜其則為下為民可知陳氏大猷曰人君莫不欲日新其德然或不克終者由小人蠱之則不間斷於己亦必間斷於人也故又告以用人之道所以貴於用有德有能而必得其人者蓋臣職在於致君澤民為上則欲輔成君德為下則欲澤潤生民所繫之重如此任用之際其難之而不易謹之而不忽待之協和而無乖信之専一而無二此言用人之當一也德無常師主善為師善無常主協于克一上文言用人因推取人為善之要無常者不可執一之謂師法協合也德者善之總稱善者德之實行一者其本原統會者也德兼衆善不主於善則無以得一本萬殊之理善原於一不協於一則無以達萬殊一本之妙謂之克一者能一之謂也博而求之於不一之善約而會之於至一之理此聖學始終條理之序與夫子所謂一貫者幾矣太甲至是而得與聞焉亦異乎常人之改過者歟張氏曰虞書精一數語之外惟此為精密輯録問德無常師四句或言主善人而為師若仲尼無常師之意如何答曰非也橫渠説德主天下之善善原天下之一最好四句二段一段緊似一段德且是大體説有吉德有凶德然必主於善始為吉爾善亦且是大段説或在此為善或在彼為不善或在彼為善或在此為不善或在前日則不善而今日則為善惟須協于克一是乃為善謂以此心揆度彼善耳故橫渠言原則若善之原於一耳蓋善因一而後定也德以事言善以理言一以心言大扺此篇只是幾箇一字上有精神須與細看此心才一便終始不變而有常也協字雖訓合字却是如此合彼之合非己相合之合與禮記協於分藝書協時月正日之協同義蓋若揆度參驗之意耳張敬夫謂虞書精一四句與此為尚書語之最精密者而虞書為尤精大雅此言於天下之德無一定之師惟善是從則凡有善皆可師也於天下之善無一定之主惟一其心則其所取者無不善矣協猶齊也如所謂協時月德無常師四句上兩句是教人以其所師下兩句是教人以其所擇善而為之師協道夫問協于克一莫是能主一則自然契於善否曰字難説只是箇比對裁斷之意蓋如何知得這善不善須是自身主宰得定始得蓋有主宰則是非善惡瞭然於心目間合於此者便是不合者便不是橫渠云德主天下之善善原天下之一這見得他説得極好處蓋從一中流出者無有不善所以伊尹從前面説來便有此意曰常厥德曰庸德曰一德常庸一只是一箇蜚卿謂一恐是専一之一曰如此則絶説不來道夫曰上文自謂德惟一動罔不吉德二三動罔不凶才尺度不定今日長些子明日短些子便二三道夫曰到底説得來只是箇定則明明則事理見不定則擾擾擾擾則事理昏雜而不識矣曰只是如此曰看得道理多便於這般所在都寬平開豁都無礙塞如蜚卿恁地理會數日却是恁地這便是看得不多多少被他這箇十六字礙又曰今若理會不得且只看自家每日一與不一時便見要之今却正要人恁地理會不得又思量但只當如橫渠所謂濯去舊見以來新意且放下著許多説話只將這四句來平看便自見又曰這四句極好看南軒云自人心惟危道心惟微數語外惟此四句好但舜大聖人言語渾淪伊尹之言較露鋒鋩得些這説得也好頃之又曰舜之言如春生伊尹之言如秋殺道夫問橫渠之言如何曰一故善一者善之原也善無常主如言前日之受非也協于克一如言皆是也蓋均是善但易地有不同者故無常主必是合于一乃為至善一者純於理而無二三之謂一則無私欲而純乎義理矣問善字不知主何而言曰這只是主良心道夫纂注陳氏大猷曰有專一之一終始惟一是也有統一之一協于克一是也無一善之或遺無一息之或問然後盡一德之全體尹既言惟一之旨復明協一之義德之所在初無常師几至於善皆所當師謂博而取之也善有萬端亦無常主必貴協合統會于克一之地謂一以貫之也新安陳氏曰理之一本萬殊處擇之貴乎精理之萬殊一本處融之貴乎一德無常師主善為師精以擇之也即所謂惟精也善無常主協于克一一以貫之也即所謂惟一也南軒張子謂精一數語外惟此最為精密深味之伊尹之言即自惟精惟一充廣之也伊尹樂堯舜之道淵源甚逺學識甚精今復摘舜禹授受之微旨以告太甲其欲使是君為堯舜之君之心至老不變也如此夫俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永砥蒸民之生人君惟其心之一故其發諸言也大萬姓見其言之大故能知其心之一感應之理自然而然以見人心之不可欺而誠之不可掩也祿者先王所守之天祿也蒸衆也天祿安民生厚一德之效驗也纂注陳氏大猷曰咸曰見頌之無間又曰見頌之無己嗚呼七世之廟可以觀德萬夫之長可以觀政天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德天子居萬民之上必政教有以深服乎人而後萬民悅服故曰萬夫之長可以觀政伊尹歎息言德政修否見於後世服乎當時有不可掩者如此后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功罔使罔事即上篇民非后罔克胥匡以生后非民罔以辟四方之意申言君民之相須者如此欲太甲不敢忽也無毋同伊尹又言君民之使事雖有貴賤不同至于取人為善則初無貴賤之間蓋天以一理賦之於人散為萬善人君合天下之萬善而後理之一者可全也苟自大而狹人匹夫匹婦有一不得自盡於上則一善不備而民主亦無與成厥功矣伊尹於篇終致其警戒之意而言外之旨則又推廣其所謂一者如此蓋道體之純全聖功之極致也嘗因是言之以為精粹無雜者一也終始無間者一也該括萬善者一也一者通古今達上下萬化之原萬事之幹語其理則無二語其運則無息語其體則并包而無所遺也咸有一德之書而三者之義悉備前乎伏羲堯舜禹湯後乎文武周公孔子同一揆也纂注新安陳氏曰觀德觀政欲太甲致謹於修德行政之際也德則一德政則一德之見於行事者又謂一德雖全尤不可以自足矜心一生而匹夫匹婦有懷不得以自盡則一善之或遺即一德之有虧何以大有成於天下哉此節言后非民民非后及不可使匹夫匹婦不獲自盡其與舜命禹以精一而末及於衆非后何戴后非衆罔與守邦四海困窮天祿永終者亦有合焉伊尹之學其樂堯舜之道而有得豈不信哉盤庚上盤庚陽甲之弟自祖隱都耿圮於河水盤庚欲遷於殷而大家世族安土重遷胥動浮言小人雖蕩析離居亦惑於利害不適有居盤庚喻以遷都之利不遷之害上中二篇未遷時言下篇既遷後言王氏曰上篇告羣臣中篇告庶民下篇告百官族姓左傳謂盤庚之誥實誥體也三篇今文古文皆有但今文三篇合為一輯録盤庚更沒理會從古相傳來如經傳所引用皆此書之文但不知何故説得都無頭且如今要誥諭民間一二事做得幾句如此他曉得曉不得只為説道要遷更不説道自家如何要遷如何不可以不遷萬民是因甚不要遷要得人遷也須説出利言今更不説賀孫顯道曰商書又却較分明曰商書亦只有數篇如此盤庚依舊難曉曰盤庚却好曰不知怎生地盤庚抵死要恁地遷那都若曰有水患也不曽見大故為害曰他不復更説那事頭只是常時小民被害而大姓之屬安於土而不肯遷故説得如此多元德問盤庚如何曰不可曉如古我先王將于前功至嘉績于朕邦全無意義又當時遷都更不明説遷之為利不遷之為害如中篇又説神説鬼若使如今誥令如此好一場大鶻突尋常讀尚書讀了太甲伊訓咸有一德便著鞔過盤庚却看説命然髙宗肜日亦難看要之讀尚書可通則通不可通姑置之人傑纂注史記盤庚祖乙之曾孫也歷祖乙子祖辛祖辛子開甲開甲弟祖丁開甲子南庚祖丁子陽甲及盤庚凡七王都耿矣亳殷亳之殷地殷者亳之别名在河南耿在河北吳氏曰此書説者多言某篇為告臣某篇為告民某篇為兼告臣民以余觀之臣民並集之時固不當呼臣與言而使民不與聞又呼民與言而使臣不與聞特以遷都之利反覆開論事之繫乎臣者主臣言之事之繫乎民者主民言之君心初無適莫臣民皆欲其盡曉也常林氏曰遷都利害甚明而臣民傲上從康誠情所不堪盤庚諄復懇到曉以利害禍福之理不啻如慈母之於子非優遊不斷不能奮其剛決也蓋從容開諭使其曉然中心悅從以共享安利而無絲毫之牽強所以為王者之政也又曰耿地障塞沃饒易以致富富家巨室久居殖貨閭閻細民則苦蕩析離居今遷亳乃小民之利而巨室所不欲故為浮言以搖民情此三篇所由作也盤庚遷于殷民不適有居率籲衆戚出矢言殷在河南偃師適往籲呼矢誓也史臣言盤庚欲遷于殷民不肯往適有居盤庚率呼衆憂之人出誓言以喻之如下文所云也周氏曰商人稱殷以盤庚始自此以前惟稱商自盤庚遷都之後於是殷商兼稱或只稱殷也曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台曰盤庚之言也劉殺也盤庚言我先王祖乙來都於耿固重我民之生非欲盡致之死也民適不幸蕩析離居不能相救以生稽之於卜亦曰此地無若我何言耿不可居決當遷也纂注新安陳氏曰既爰宅于兹以下疑有闕文兹指耿邑當有説水患之語然後繼以重我民無盡劉今所以欲遷者蓋重我民生無盡殺之此地之理此地蕩析於水既君民不得相正以生矣所以卜以稽之而必遷也孔氏曰其如台其如我所行爰林氏曰古者將遷國必考之卜如綿詩曰爰始爰謀契我龜曰止曰時築室于茲衛文楚邱之遷亦曰降觀于桑卜云其吉是也先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈服事也先王有事恪謹天命不敢違越先王猶不敢常安不常其邑于今五遷厥邦矣今不承先王而遷且不知上天之斷絶我命况謂其能從先王之大烈乎詳此言則先王遷徙亦必有稽卜之事仲丁河亶甲篇逸不可考矣五邦漢孔氏謂湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚遷殷為五邦然以下文今不承于古文勢考之則盤庚之前當自有五遷史記言祖乙遷邢或祖乙兩遷也纂注薛氏曰不遷故罔知天之斷命則遷乃天欲永我命也不遷故不克從先王之烈則遷乃欲紹復先王之業也人陳氏經曰命在天而曰恪謹天命天其永命何也古以當然之理為命而不以或然之數為命敕天之命祈天永命皆自已而言之使盤庚不遷都而苟安于耿民不聊生國將滅亡而歸之命可乎林氏曰一亳不應湯都盤庚遷而謂之二邦太史公謂祖乙自耿遷邢汲冢紀年謂祖乙遷奄此不可據意者更有遷而史失之歷世久逺不可臆決也若顛木之有由蘖天其永我命于兹新邑紹復先王之大業砥綏四方顛仆也由古文作㽕木生條也顛木譬耿由蘖譬殷也言今自耿遷殷若已仆之木而復生也天其將永我國家之命于殷以繼復先王之大業而致安四方乎纂注魏氏曰書言由蘖由字左氏傳注木再萌芽謂之由故云楚其復由又昭八年今在析木之津猶將復由曰韻書蘖本作􅤁今作枿書由蘖孟萌蘖皆作蘖李巡枿稿木之餘也郭璞云晉衛之間曰枿馬云顛木而肄生曰枿諸徐氏曰謂己倒之木更生孫枝也吕氏曰京師為夏本國都定則四方安矣盤陳氏大猷曰承天命復祖業綏四方三者庚圖遷之本意故史總述于篇首盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針王命衆悉至于庭斆教服事針規也耿地㵼鹵墊隘而有沃饒之利故小民苦於蕩析離居而巨室則總于貨寶惟不利於小民而利於巨室故巨室不悅而胥動浮言小民眩於利害亦相與咨怨間有能審利害之實而欲遷者則又往往為在位者之所排擊阻難不能自達於上盤庚知其然故其教民必自在位始而其所以教在位者亦非作為一切之法以整齊之惟舉先王舊常遷都之事以正其法度而已然所以正法度者亦非有他馬惟曰使在位之臣無或敢伏小人之所針規焉耳蓋小民患㵼鹵墊隘有欲遷而以言針規其上者汝母得遏絶而使不得自達也衆者臣民咸在也史氏將述下文盤庚之訓語故先發此纂注陳氏大猷曰法度如朝市室廬之營建道路頓宿之部分去舊即新之區畫之類又曰遵故事則人情不駭達微辭則人情不壅此遷都之大綱史特先舉之王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康若曰者非盡常時之言大意若此也汝猷黜乃心者謀去汝之私心也無與毋同毋得傲上之命從已之安蓋傲上則不肯遷從康則不能遷二者所當黜之私心也此雖盤庚對衆之辭實為羣臣而發以斆民由在位故也纂注王氏曰凡言若曰或史述上旨而代作非其自言而陳氏經曰當謀去其傲上從康之心傲上者違王命不肯從從康者懷久安而不為後日慮當時羣臣所以不遷其病根在此二者故直指其病而戒之乃陳氏梅叟曰盤庚戒諭羣臣惟汲汲於治其心耳黜心再見於首篇永肩一心申嚴於中篇不宣乃心恐迂乃心不暨豫同心有戕在乃心各設中于乃心又條見于中篇至于歷告朕志心腹腎腸皆敷焉無非開心諭之也古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚豫弗知乃所訟逸過也盤庚言先王亦惟謀任舊人共政王播告之修則奉承于內而能不隱匿其指意故王用大敬之宣化于外又無過言以惑衆聽故民用大變今爾在內則伏小人之攸針在外則不和吉言于百姓譊譊多言凡起信於民者皆險陂膚淺之説我不曉汝所言果何謂也詳此所謂舊人者世臣舊家之人非謂老成人也蓋沮遷都者皆世臣舊家之人下文人惟求舊一章可見纂注王氏炎曰訟爭辨也王新安陳氏曰民用丕變以前謂先時世家舊人能使上敬下化如此下文責今世家不能然也非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸荒廢也逸過失也盤庚言非我輕易遷徙自荒廢此德惟汝不宣布德意不畏懼於我我視汝情明若觀火我亦拙謀不能制命而成汝過失也纂注新安陳氏曰含德掩晦遮蔽意與不匿厥指正相反不惕一人即傲上也成乃安逸即從康也若網在綱有條而不紊若農服田力穡乃亦有秋紊亂也綱舉則目張喻下從上小從大申前無傲之戒勤於田畝則有秋成之望喻今雖遷徙勞苦而有永建乃家之利申前從康之戒汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德蘇氏曰商之世家大族造言以害遷者欲以苟悅小民為德也故告之曰是何德之有汝曷不去汝私心施實德于民與汝婚姻僚友乎勞而有功此實德也汝能勞而有功則汝乃敢大言曰我有積德曰積德云者亦指世家大族而言申前汝猷黜乃心之戒纂注蕭氏曰言不欲遷者徒為順民之虛名遷則為安民之實德患李氏杞曰言不遷似姑息若可以得虛譽然民被水而不救豈實德乎無實德及民乃敢大言欺衆謂自汝祖世有積德及民可乎林氏曰黜私心而施實德欲其愛人以德而不以不遷之姑息為愛也世夏氏曰先王時汝祖父率民以遷今汝又率民遷是有積德及人也陳氏大猷曰不遷則徇人情而患在後雖若愛民實害民也遷則若拂人情而利在後雖若勞民實福民也在位以使民不遷為有德於民故戒之如此此章總告以利下二章分告以害新安陳氏曰前言猷黜乃心此言克黜乃心是前言所謀為之者今真能為之矣所以贊其決也乃不畏戎毒于逺邇惰農自安不昏作勞不服田畝越其罔有黍稷戎大昏強也汝不畏沉溺大害於逺近而憚勞不遷如怠惰之農不強力為勞苦之事不事田畝安有黍稷之可望乎此章再以農喻申言從康之害纂注唐孔氏曰惰農對上服田力穡而反言之成林氏曰此篇文勢大扺反覆辨論皆相顧文既曰若農服田力穡乃亦有秋又曰惰農自安不昏作勞不服田畝越其罔有黍稷既曰豫若觀火又曰若火之燎于原文雖渙散而意則相屬以是知盤庚之言雖佶屈聱牙不可遽曉然反覆求之於人情甚近也汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非豫有咎吉好也先惡為惡之先也奉承恫痛相視也憸民小民也逸口過言也逸口尚可畏况我制爾生殺之命可不畏乎恐謂恐動之以禍患沉謂沈陷之於罪惡不可嚮邇其猶可撲滅者言其勢熖雖盛而殄滅之不難也靖安咎過也則惟爾衆自為不安非我有過也此章反覆辨論申言傲上之害纂注林氏曰不導民以遷而先不樂遷民亦從之是謂先惡利陳氏大猷曰恫痛不急去之乃奉而養之猶安其危其災之意既先惡於始又護病於今後雖悔之身無及矣汝張氏曰毒曰自生禍敗姦宄曰自災言非自外來皆自取之罪也遲任有言曰人惟求舊器非求舊惟新遲任古之賢人蘇氏曰人舊則習器舊則敝當常使舊人用新器也今案盤庚所引其意在人惟求舊一句而所謂求舊者非謂老人但謂求人於世臣舊家云爾詳下文意可見若以舊人為老人又何侮老成人之有纂注唐孔氏曰鄭云遲任古之賢史文張氏曰器惟新者但以證人求舊爾故下繼以乃祖父非以器喻新邑也古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之作福作災豫亦不敢動用非德胥相也敢不敢也非罰非所當罰也世非一世也勞勞于王家也掩蔽也言先王及乃祖乃父相與同其勞逸我豈敢動用非罰以加汝乎世簡爾勞不蔽爾善兹我大享于先王爾祖亦以功而配食於廟先王與爾祖父臨之在上質之在旁作福作災皆簡在先王與爾祖父之心我亦豈敢動用非德以加汝乎纂注孔氏曰古功臣配食于廟方新安陳氏曰配對也大勳勞之人得配食非遍及有功者此言與享如周禮司勳凡有功者祭於大蒸耳盤庚總告羣臣豈盡皆配享乎孫氏曰前言胥及逸勤則曰乃祖乃父此與享止曰乃祖蓋逸勤不止一人配享則非有功之祖不與也陳氏大猷曰此以羣臣世有勳勞與國同休戚者感動之乃申言前圖任舊人之意謂汝從我遷我固不敢用非罰加汝執迷不遷亦不敢用非德福汝又承上文撲滅之言以起意而以威恐之以賞勸之也豫告汝于難若射之有志汝無侮老成人無弱孤有幼各長于厥居勉出乃力聽豫一人之作猷難言謀遷徒之難也蓋遷都固非易事而又當時臣民傲上從康不肯遷徒然我志決遷若射者之必於中有不容但已者弱少之也意當時老成孤幼皆有言當遷者故戒其老成老不可侮孤幼者不可少之也爾臣各謀長逺其居勉出汝力以聽我一人遷徙之謀也纂注王氏炎曰我告汝以遷非易也如射之有志定而後發發而期於必中豈嘗試其有成哉孔氏曰不用老成人之言而遷是侮之不遷則孤幼他日受害是弱之無有逺邇用罪伐厥死用德彰厥善邦之臧惟汝衆邦之不臧惟豫一人有佚罰用罪猶言為惡用德猶言為善也伐猶誅也言無有逺近親踈凡伐死彰善惟視汝為惡為善如何爾邦之善惟汝衆用德之故邦之不善惟我一人失罰其所當罰也纂注曽氏曰用罪猶曰用罰用德猶曰用賞死陳氏大猷曰死者刑之重舉重故言張氏曰不從遷者罪也從遷者善也凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔致告者使各相告戒也自今以往各敬汝事整齊汝位法度汝言不然罰及汝身不可悔也纂注吕氏曰其惟致告當時所諭惟造在王庭者故欲其轉相告語也孫氏曰恭爾事則無傲上齊乃位則無從康度乃口則無浮言三者盤庚所深戒也吕氏曰三書反覆折難須於包容處看其度量於委曲訓誥處看其恩意於規畫纎悉處看其措置言林氏曰使盤庚驅以刑罰而使之遷誰敢違之今其乃若有所甚畏者蓋得天下有道得其民也得其民者得其心也得其心不過所欲與之聚爾今之遷惟欲聚民所欲而已苟以勢力與臣民較以失人心雖能強之使遷而民心已離矣故寧為優遊不忍之辭間諭其心使知吾之本意既不失民之心亦不害吾之遷此盤庚所以為仁也陳氏大猷曰世主之懦者惟知徇人事所當為慮拂人情而輒沮其果者惟知徇己事苟當為遽拂人情而不恤二者皆非也盤庚內不失己外不失人所以為兩全歟盤庚中盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿褻在王庭盤庚乃登進厥民作起而將遷之辭殷在河南故涉河誕大亶誠也咸造皆至也勿褻戒其毋得褻慢也此史氏之言蘇氏曰民之弗率不以政令齊之而以話言曉之盤庚之仁也纂注吕氏曰已離舊邦未至新邑則王庭蓋道路行宫如周禮掌次是也班次臣在前民在後故升進其民於前而告之曰明聽朕言無荒失朕命荒廢也嗚呼古我前后罔不惟民之承保后胥戚鮮以不浮于天時承敬也蘇氏曰古者謂過為浮浮之言勝也后既無不惟民之敬故民亦保后相與憂其憂雖有天時之災鮮不以人力勝之也林氏曰憂民之憂者民亦憂其憂罔不惟民之承憂民之憂也保后胥戚民亦憂其憂也纂注新安陳氏曰承奉順之意蘇氏訓為敬傳從之恐非殷降大虐先王不懷厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰先王以天降大虐不敢安居其所興作視民利當遷而已爾民何不念我以所聞先王之事凡我所以敬汝使汝者惟喜與汝同安爾非為汝有罪比于罰而謫遷汝也豫若籲懷兹新邑亦惟汝故以丕從厥志我所以招呼懷來于此新邑者亦惟以爾民蕩析離居之故欲承汝俾汝康共以大從爾志也或曰盤庚遷都民咨胥怨而此以為丕從厥志何也蘇氏曰古之所謂從衆者非從其口之所不樂而從其心之所不言而同然者夫趨利而避害捨危而就安民心同然也殷亳之遷實斯民所利特其一時為浮言搖動怨咨不樂使其即安危利害之實而反求其心則固其所大欲者矣今豫將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動豫一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳上文言先王惟民之承而民亦保后胥戚今我亦惟汝故安定厥邦而汝乃不憂我心之所困乃皆不宣布腹心欽念以誠感動於我爾徒為此紛紛自取窮苦譬乘舟不以時濟必敗壞其所資今汝從上之誠間斷不屬安能有濟惟相與以及沈溺而已詩曰其何能淑載胥及溺正此意也利害若此爾民而罔或稽察焉是雖怨疾忿怒何損於困苦乎汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上汝不為長久之謀以思其不遷之災是汝大以憂而自勸也孟子曰安其危而利其災樂其所以亡勸憂之謂也有今猶言有今日也罔後猶言無後日也上天也今其有今罔後是天斷棄汝命汝有何生理於天乎下文言迓續乃命于天蓋相首尾之辭今豫命汝一無起穢以自臭恐人倚乃身迂乃心爾民當一心以聼上無起穢惡以自臭敗恐浮言之人倚汝之身迂汝之心使汝邪僻而無中正之見也豫迓續乃命于天豫豈汝威用奉畜汝衆我之所以遷都者正以匝續汝命于天豫豈以威脅汝哉用以奉養汝衆而已豫念我先神后之勞爾先豫丕克羞爾用懷爾然神后先王也羞養也即上文畜養之意言我思念我先神后之勞爾先人我大克羞養爾者用懷念爾故也失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民陳久崇大也耿圮而不遷以病我民是失政而久于此也髙后湯也湯必大降罪疾于我曰何為而虐害我民蓋人君不能為民圖安是亦虐之也汝萬民乃不生生暨豫一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽德自上其罰汝汝罔能迪樂生興事則其生也厚是謂生生先后泛言商之先王也幼孫盤庚自稱之辭比同事也爽失也言汝民不能樂生興事與我同心以遷我先后大降罪疾於汝曰汝何不與朕幼小之孫同遷乎故汝有失德自上其罰汝汝無道以自免也古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死既勞乃祖乃父者申言勞爾先也汝共作我畜民者汝皆為我所畜之民也戕害也綏懷來之意謂汝有戕害在汝之心我先后固已知之懷來汝祖汝父汝祖汝父亦斷棄汝不救汝死也兹豫有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥亂治也具多取而兼有之謂言若我治政之臣所與共天位者不以民生為念而務富貝玉者其祖父亦告我成湯作丕刑于其子孫啓成湯丕乃崇降弗祥而不赦也此章先儒皆以為責臣之辭然詳其文勢曰兹豫有亂政同位則亦對民庶責臣之辭非直為羣臣言也案上四章言君有罪民有罪臣有罪我髙后與爾民臣祖父一以義斷之無所赦也王氏曰先王設教因俗之善而導之反俗之惡而禁之方盤庚時商俗衰士大夫棄義即利故盤庚以具貝玉為戒此反其俗之惡而禁之者也自成周以上莫不事死如事生事亡如事存故其俗皆嚴鬼神以經考之商俗為甚故盤庚特稱先后與臣民之祖父崇降罪疾為告此因其俗之善而導之者也輯録銖問盤庚言其先王與其羣臣之祖父若真有物在其上降災降罰與之周旋從事於日用之間者銖竊謂此亦大槩言理之所在質諸鬼神而無疑爾而殷俗尚鬼故以其深信者導之夫豈亦真有一物邪乞賜垂誨先生曰鬼神之理聖人蓋難言之謂真有一物固不可謂非真有一物亦不可若未能曉然見得且闕之可也纂注新安陳氏曰神后言神靈在天髙后言功德崇髙與先后皆指先王之遷都者言之大意言我不率民以遷先王必罪我汝不從上以遷不特先王罪汝汝之祖父亦禍汝矣嗚呼今豫告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心告汝不易即上篇告汝于難之意大恤大憂也今我告汝以遷都之難汝當永敬我之所大憂念者君民一心然後可以有濟苟相絶逺而誠不屬則殆矣分猷者分君之所圖而共圖之分念者分君之所念而共念之相從相與也中者極至之理各以極至之理存于心則知遷徙之議為不可易而不為浮言橫議之所動搖也纂注新安陳氏曰告汝不易一説告汝于難之意一説告汝者一定不易矣中者人心同然之理何待於設正緣羣臣徇於私情之一偏則中之理亡矣汝不當偏為私己計當分汝所謀所念以從上各設中理于心則明見利害自有不偏之準在於胸中不至於偏私矣不設中于心則人必倚汝身迂汝心也乃有不吉不迪顚越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑乃有不善不道之人顚隕踰越不恭上命者及暫時所遇為姦為宄劫掠行道者我小則加以劓大則殄滅之無有遺育毋使移其種于此新邑也遷徙道路艱關恐姦人乘隙生變故嚴明號令以告敕之往哉生住今豫將試以汝遷永建乃家往哉往新邑也言遷徙之時人懷舊土之念而未見新居之樂故再以生生勉之振起其怠惰而作其趨事也試用也今我將用汝遷永立乃家為子孫無窮之業也纂注新安陳氏曰生生生養不窮之道也末二句應前今豫將試以汝遷安定厥邦前以邦言此以家言互文見意民惟邦本本固邦寧必民家永建而後邦國安定也盤庚下盤庚既遷奠厥攸居乃正厥位綏爰有衆盤庚既遷新邑定其所居正君臣上下之位慰勞臣民遷徙之勞以安有衆之情也此史氏之言曰無戲怠懋建大命曰盤庚之言也大命非常之命也遷國之初臣民上下正當勤勞盡瘁趨事赴功以為國家無窮之計故盤庚以無戲怠戒之以建大命勉之纂注陳氏大猷曰當時傲上從康戲怠乃其故習末遷則憚以為難既遷則苟以為足未必不謂不必更勉而自可以永命矣命雖在天建立之在我必懋勉而後能立大命必無戲怠而後能懋勉故首以無戲怠矯其舊習而新其精神也今豫其敷心腹腎腸歷告爾百姓于朕志罔罪爾衆爾無共怒協比讒言豫一人歷盡也百姓畿內民庶百官族姓亦在其中纂注新安陳氏曰朕志下文所言是也意前日浮言之徒必有唱為事定後有罪責之説者故以此言釋衆疑而絶謗讒也古我先王將多于前功適于山用降我凶德嘉績于朕邦古我先王湯也適于山往于亳也契始居亳其後屢遷成湯欲多于前人之功故復往居亳案立政三亳鄭氏曰東成臯南轘轅西降谷以亳依山故曰適于山也降下也依山地髙水下而無河圯之患故曰用下我凶德嘉績美功也纂注王氏炎曰自此至用宏兹賁言所以遷之意以諭臣民也自邦伯師長至篇終既遷之後言欲為之意以望羣臣也此所謂朕志也甫愚案立政三亳又本皇謐説今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷今耿為河水圯壞沈溺墊隘民用蕩析離居無有定止將陷于凶德而莫之救爾謂我何故震動萬民以遷也肆上帝將復我髙祖之德亂越我家朕及篤敬恭承民命用永地于新邑乃上天將復我成湯之德而治及我國家我與一二篤敬之臣敬承民命用長居于此新邑也肆豫沖人非廢厥謀弔由靈各非敢違卜用宏兹賁沖童弔至由用靈善也宏賁皆大也言我非廢爾衆謀乃至用爾衆謀之善者指當時臣民有審利害之實以為當遷者言也爾衆亦非敢固違我卜亦惟欲宏大此大業爾言爾衆亦非有他意也蓋盤庚於既遷之後申彼此之情釋疑懼之意明吾前日之用謀略彼既往之傲惰委曲忠厚之意藹然於言辭之表大事以定大業以興成湯之澤於是而益永盤庚其賢矣哉纂注張氏曰盤庚非特不廢人謀卜者鬼謀亦不敢違之是人謀鬼謀皆以為當遷蘇氏曰賁飾也宏大此郊廟朝市之飾與陳氏傅良曰各非敢違卜君民匹敵之言也蓋曰吾汝皆非私意各惟卜是用以求其宏大藩飾之事爾弔新安陳氏曰此篇如多于前功以下朱子本疑之如由靈宏兹賁等語實難曉姑依前注觀之可也嗚呼邦伯師長百執事之人尚皆隱哉隱痛也盤庚復歎息言爾諸侯公卿百執事之人庶幾皆有所隱痛於心哉豫其懋簡相爾念敬我衆相爾雅曰導也我懋勉簡擇導汝以念敬我之民衆也朕不肩好貨敢恭生生鞠人謀人之保居敘欽肩任敢勇也鞠人謀人未詳或曰鞠養也我不任好賄之人惟勇於敬民以其生生為念使鞠人謀人之保居者吾則敘而用之欽而禮之也今我既羞告爾于朕志若否罔有弗欽羞進也若者如我之意即敢恭生生之謂否者非我之意即不肩好貨之謂二者爾當深念無有不敬我所言也無總于貨寶生生自庸無毋同總聚也庸民功也此則直戒其所不可為勉其所當為也式敷民德永肩一心式敬也敬布為民之德永任一心欲其久而不替也盤庚篇終戒勉之意一節嚴於一節而終以無窮期之盤庚其賢矣哉蘇氏曰民不恱而猶為之先王未之有也祖乙圮于耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚德之衰也其所以信於民者未至故紛紛如此然民怨誹逆命而盤庚終不怒引咎自責益開衆言反復告諭以口舌代斧鉞忠厚之至此殷之所以不亡而復興也後之君子厲民以自用者皆以盤庚藉口豫不可以不論纂注新安陳氏曰此篇始曰歷告爾百姓于朕志終曰今我既羞告爾于朕志若否始以朕志告百姓終以朕志告羣臣明示一人之心以通臣民千萬人之心告民以朕志者以釋其疑懼之情告臣以朕志者欲其審好惡之辨前日羣臣唱浮言以惑民者傲上從康其病證也具乃貝玉其病根也今雖已遷而病證猶未退病根猶未除故始曰無戲怠以革傲上從康之病證終曰不肩好貨無總貨實使除具乃貝玉之病根然後上能敬君命下能仁民生而可以永建國家無窮之基矣説命上説命記髙宗命傅説之言命之曰以下是也猶蔡仲之命微子之命後世命官制詞其原蓋出於此上篇記得説命相之辭中篇記説為相進戒之辭下篇記説論學之辭總謂之命者髙宗命説實三篇之綱領故總稱之今文無古文有輯録聞傅説版築亦讀書否曰不曽讀書如何有説命三篇之文德明纂注史記髙宗盤庚弟小乙之子也名武丁以夢得説於傅險中遂以傅險姓之號曰傅説王宅憂亮隂三祀既免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令亮一作諒隂古作暗案喪服四制髙宗諒隂三年鄭氏注云諒古作梁楣謂之梁暗讀如鶉䳺之䳺暗謂廬也即倚廬之廬儀禮剪屛柱楣鄭氏謂柱楣所謂梁暗是也宅憂亮隂言宅憂於梁暗也先儒以亮隂為信默不言則於諒隂三年不言為語復而不可解矣君薨百官總已聽於冢宰居憂亮隂不言禮之常也髙宗喪父小乙惟既免喪而猶弗言羣臣以其過於禮也故咸諫之歎息言有先知之德者謂之明哲明哲實為法於天下今天子君臨萬邦百官皆奉承法令王言則為命不言則臣下無所稟令矣輯録諒隂天子居喪之名未詳其義語注郭叔雲問諒隂以他經考之皆以諒隂為信默惟鄭氏獨以為凶廬天子居凶廬豈合禮制先生答曰所引剪屛柱楣是兩事柱音知主反似是從手不從木也蓋始者户北向用草為屛不剪其餘至是改而西向乃剪其餘草始者無拄與楣簷著於地至是乃施短柱及楣以拄其楣架起其簷令稍髙而下可作户也來諭乃於柱楣之下便云既虞乃剪而除之似謂剪其屛而并及柱楣則誤矣諒隂梁暗未詳古制定如何不敢輒為之説但假使不如鄭説亦未見天子不可居廬之法來喻所云不知何據恐欠子細也滕文公五月居廬之驗恐天子亦須如此書説王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭默思道夢帝賚豫良弼其代豫言庸用也髙宗用作書告諭羣臣以不言之意言以我表正四方任大責重恐德不類于前人故不敢輕易發言而恭敬淵默以思治道夢帝與我賢輔其將代我言矣蓋髙宗恭默思道之心純一不二與天無間故夢寐之間帝賚良弼其念慮所孚精神所格非偶然而得者也輯録髙宗夢傅説分明有箇傅説在那裡髙宗却不知所以夢見亦是朕兆先見者如此祖道髙宗夢傅説據此則是真有箇天帝與髙宗對曰吾賚汝以良弼今人但以主宰説帝謂無形象恐也不得若世間所謂玉皇大帝恐亦不可畢竟此理如何學者皆莫能答僩纂注劉禹錫曰商俗以訛引天而歐自此説後多有謂髙宗假天以神之者伊川曰髙宗至誠思得賢相寤寐不忘故兆朕先見於夢如常人夢寐間事有先得者多矣亦何足怪又問髙宗往求説邪説來入夢邪曰譬懸鏡於此有物必照亦非鏡往照物亦非物來入鏡大扺人心虛靈善不善必先知之太史范氏曰中庸曰誠則形形則著楊雄曰人心其神矣乎髙宗之夢誠之形而心之神也生張氏文蔚曰誠心求賢寤寐不忘此心足以合上天賢之心矣髙宗之心有以合上天生賢之心上天之心得下應髙宗求賢之心陳氏經曰至誠之道可以前知嵩前有董五經隱者也伊川聞其名特往造焉至中道遇之曰君非程先生乎先生欲來信息甚大尹子問於伊川伊川曰靜則自明觀此則髙宗夢説之事不誣矣然此不可以常情拘常事論也有髙宗冇傅説則可君非髙宗臣非傅説而效其所為必有以私意用人不合於公論者若漢文以夢得鄧通光武以讖得王梁豈足憑哉乃審厥象俾以形旁求于天下説築傅巖之野惟肖審詳也詳所夢之人繪其形象旁求于天下旁求者求之非一方也築居也今言所居猶謂之卜築傅巖在虞虢之間有似也與所夢之形相似纂注孔氏曰刻其形象殷皇甫謐曰寫其形象史記本紀是時説為胥靡於傅險道孔氏曰傅氏之巖在虞虢之界通道所經有澗水懷常使胥靡刑人築護此道説賢而隱代胥靡築之以供食新漢書音義胥相也靡隨也古者相隨坐輕刑之名安陳氏曰傳訓築為居以今人卜居曰卜築證之蓋恥説之為賤役也孟子曰傅説舉於版築之間賈誼曰傅説胥靡乃相武丁古聖賢如是者多矣不必文飾其辭爰立作相王置諸其左右於是立以為相案史記髙宗得説與之語果聖人乃舉以為相書不言省文也未接語而遽命相亦無此理置諸左右蓋以冢宰兼師保也荀卿曰學莫便乎近其人置諸左右者近其人以學也史臣將記髙宗命説之辭先敘事始如此輯録問髙宗夢説如伊川言是有箇傅説便能感得髙宗之夢琮謂髙宗舊學甘盤既乃遁于荒野入宅于河自河徂亳其在民間久矣當時天下有箇傅説豈不知名當恭默思道之時往往形於夢寐於是審象而求之不然賢否初不相聞但據一時夢寐便取來做宰相或者於理未安曰遁于荒野入宅于河自河徂亳是説髙宗是説甘盤衆未應據來暨厥終罔顯只是尋甘盤不見然髙宗舊勞于外爰暨小人亦是嘗在民間來纂注新安陳氏曰王置左右蓋不徒相之而必親近之也蔡氏謂以冢宰兼師保亦不必如此説得非據君奭小序召公為保周公為師相成王為左右之語乎此何足據命之曰朝夕納誨以輔台德此下命説之辭朝夕納誨者無時不進善言也孟子曰人不足與適也政不足間也惟大人為能格君心之非髙宗既相説處之以師傅之職而又命之朝夕納誨以輔台德可謂知所本矣吕氏曰髙宗見道明故知頃刻不可無賢人之言纂注新安胡氏曰相業莫大於輔君德髙宗命相未及他事而以責之納誨輔德為第一義真知本之論矣蓋其思道精見道明又素學於甘盤而有得故其言如此若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨三日雨為霖髙宗託物以喻望説納誨之切三語雖若一意然一節深一節也啓乃心沃朕心啓開也沃灌溉也啓乃心者開其心而無隱沃朕心者既我心而厭飫也纂注陳氏大猷曰相業莫要於輔德輔德莫切於格心格心之道非可外求惟以心格心啓開而發之也沃灌而入之也如渴之沃漿神受心領而入之深也沃新安陳氏曰髙宗命説之初已有渴教之意今欲遂其渴教之心説果開誠心以進言髙宗心心相孚必有如土受水之沃如所謂江海之浸膏澤之潤渙然冰釋怡然理順者矣若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷方言曰飲藥而毒海岱之間謂之瞑眩瘳愈也弗瞑眩喻臣之言不苦口也弗視地喻我之行無所見也纂注王氏炎曰己之有失非説之苦口不能藥己之不明非説之開導不能行足吕氏曰久恐説視己為成德無以扶持之故譬如跣之人不視地則為物所傷此髙宗倚説為兩耳日一時不可無説也惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民匡正率循也先王商先哲王也説既作相總百官則卿士而下皆其僚屬髙宗欲傅説暨其僚屬同心正救使循先王之道蹈成湯之迹以安天下之民也嗚呼欽豫時命其惟有終敬我是命其思有終也是命上文所命者纂注新安胡氏曰即相亦惟終之意説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命答欽豫時命之語木從繩喻后從諫明諫之決不可不受也然髙宗當求受言於己不必責進言於臣君果從諫臣雖不命猶且承之况命之如此誰敢不敬順其美命乎説命中惟説命總百官説受命總百官冢宰之職也乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民后王天子也君公諸侯也治亂曰亂明王奉順天道建邦設都立天子諸侯承以大夫師長制為君臣上下之禮以尊臨卑以下奉上非為一人逸豫之計而已也惟欲以治民焉耳纂注孫氏曰后王君公皆有君道故曰樹大夫師長皆臣道故曰承后王君公皆有大夫師長以承之大夫以下官各有長故曰師長千武夷熊氏曰明王奉若天道止惟以亂民至哉斯言萬世為人君者之龜鑑也桀惟不知此而湯有鳴條之師紂惟不知此而武有孟津之會師曠言於晉侯曰天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性為人君者聞斯言可以悚然懼矣新安陳氏曰説初見髙宗上篇所言只及大略至是乃詳及為君立政之道始望君從諫自此以下至事神則難乃其進諫之綱領條目也惟天聰明惟聖時憲惟臣欽若惟民從乂天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣纂注吕氏曰髙宗已造明哲之地若火然泉逹故説欲擴充髙宗之明哲必憲天之聰明而後已也陳氏大猷曰始告以從諫則聖欲其取人為善也此告以惟聖憲天欲其與天合德也取人為善固可成性必與天合德始可以言聖可謂善責難於君矣天新安陳氏曰憲天聰明則君與天一臣民之心均此理自有不容違者此四句因上文而申言之惟聖憲天即明王奉若天道也惟臣欽若即承以大夫師長也惟民從乂即惟以亂民也但視上文加精密而已惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休言語所以文身也輕出則起羞之患甲胄所以衛身也輕動則有起戎之憂二者所以為己當慮其患於人也衣裳所以命有德必謹於在笥者戒其有所輕豫于戈所以討有罪必嚴於省躬者戒其有所輕動二者所以加人當審其用於己也王惟戒此四者信此而能明焉則政治無不休美矣輯録惟天聰明至干戈省厥躬八句各一義不可牽連天自是聰明君自是用時憲臣自是用欽順民自是用從乂口則能起羞甲胄所以禦戎也然亦能興戎如秦築長城以禦胡而致勝廣之亂衣裳賞也在笥猶云在箱篋中甚言其取之易如云爵者上之所擅出於口而無窮惟其豫之之易故必審其人果賢邪果有功邪則賞不妄矣干戈刑人之具然須省察自家真箇是否恐或因怒而妄刑人或慮施之不審而無辜者被害則刑之施當矣蓋衣裳之豫在我而必審其人之賢否干戈施之於人而必審自己之是非也僩口非欲起羞而出言不當則反足以起羞甲胄本所以禦戎而出謀不當則反足以起戎衣裳在笥易以與人則不可不謹干戈討有罪則因以省躬四句皆是審惟甲胄起戎蓋不可有關防砥意方子惟口起羞如歸與石郎謀反是也節纂注吕氏曰此憲天聰明之條目也上二事人加於我者不可不防下二事我加於人者不可不省四者皆聰明之發用也知羞戎於未起之前知衣裳干戈於在笥省躬之日非聰明之大者乎相王氏炎曰此所戒皆恐其聰明蔽於私欲而不與天似也克明則庶幾於天之聰明矣王氏曰衣裳所以彰有德無德而賜之則不如其已故宜在笥陳氏經曰當在察於篋笥之時王之用明當在乎此乃陳氏大猷曰信於此能明其所當用無不休美而無起羞起戎等患矣惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢庶官治亂之原也庶官得其人則治不得其人則亂王制曰論定而後官之任官而後爵之六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命德故曰賢惟賢惟能所以治也私昵惡德所以亂也案古者公侯伯子男爵之於侯國公卿大夫士爵之於朝廷此言庶官則爵為公卿大夫士也吳氏曰惡德猶凶德也人君當用吉士凶德之人雖有過人之才爵亦不可及纂注吕氏曰官爵及私惡是蔽於私意非憲天聰明矣愚謂至聰明者莫如天能法天聰明者莫如聖聖則聰明與天一而臣民莫敢不敬順矣然世之聰明者多明於人而暗於己故必先自治然後可以治人自惟口起羞至乃罔不休聰明之見於修己者也自惟治亂至惟其賢聰明之見於用人者也慮善以動動惟厥時善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也聖人酬酢斯世亦其時而已纂注王氏曰事固有善而非時所宜者善如裘葛之良時如寒暑之時時非葛裘雖善何施惟未動審於慮善將動審於時宜然後事順理而當其可矣不顧可否于時而動非聰明也有其善喪厥善矜其能喪厥功自有其善則已不加勉而德虧矣自矜其能則人不效力而功隳矣惟事事乃其有備有備無患惟事其事乃其有備有備故無患也張氏曰修車馬備器械事乎兵事則兵有其備故外侮不能為之憂簡稼器修稼政事乎農事則農有其備故水旱不能為之害所謂事事有備無患者如此無啓寵納侮無恥過作非毋開寵幸而納人之侮毋恥過誤而遂己之非過誤出於偶然作非出於冇意纂注新安陳氏曰啓寵納侮即女子小人近之不遜之意過而改之則無過矣恥過而作非則遂非而為惡矣本只無心之過反成有心之惡惟厥攸居政事惟醇居止而安之義安於義理之所止也義理出於勉強則猶二也義理安於自然則一矣一故政事醇而不雜也輯録伊尹傳説之言雖為告君而發然人人皆可玩味無不切於己者西山乙記黷于祭祀時謂弗欽禮煩則亂事神則難祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交鬼神之道也商俗尚鬼髙宗或未能脫於流俗事神之禮必有過馬祖己戒其祀無豐昵傳説蓋因其失而正之也纂注陳氏曰黷祀將以為欽不知反所以為不欽聰新安陳氏曰蔽於矜伐非聰明也不能思患預防非明也啓寵吝過非聰明也事神則難以上皆憲天聰明之事事事物物皆有天然至當之理惟聰明者能盡之苟加一毫損益即是私意非天之聰明矣王曰旨哉説乃言惟服乃不良于言豫罔聞于行旨美也古人於飲食之美者必以旨言之蓋有味其言也服行也髙宗贊美説之所言謂可服行使汝不善於言則我無所聞而行之也蘇氏曰説之言譬如藥石雖散而不一然一言一藥皆足以治天下之公患所謂古之立言者説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟説不言有厥咎髙宗方味説之所言而説以為得於耳者非難行於身者為難王忱信之亦不為難信可合成湯之成德説於是而猶有所不言則有其罪矣上篇言后克聖臣不命其承所以廣其從諫之量而將告以為治之要也此篇言允協先王成德惟説不言有厥咎所以責其躬行之實將進其為學之説也皆引而不發之義輯録南軒云非知之艱行之惟艱此特傅説告髙宗耳蓋髙宗舊學甘盤於義理知之亦多故知得這説若常人則須以致知為先也此等議論儘好道夫南軒答朱元晦曰孔子觀上世之化曰大哉知乎雖堯舜之民比屋可封亦能使之由之而已知者聖凡之分也豈可云易乎哉傅説之告髙宗髙宗蓋知之者恭默思道夢帝賚豫良弼非知之明哲者有此乎故君奭篇言在武丁時則有若甘盤而未及乎傅説蓋發髙宗之知者甘盤也説故告之以雖己知之此非艱也貴於身親實履之耳此為己知者言也若髙宗未克知之而告之曰知之非艱則説為失言矣纂注真氏曰忱誠也使髙宗以誠為主何患於行乎安李氏曰髙宗望説以有言而説勸髙宗以力行新陳氏曰説之意以為王能行而説不言則咎在説説己言而王不行則咎在王不在説也上篇復君以從諫此則責君以行言必實見於行而後始不為徒從也又案知對行言古所未發自傅説始發之而後致知力行為萬世學者為學之法程蔡氏於此等處殊為忽略不過以得於耳解知字以信之解忱字愚以為末也觀南軒復文公説知字如此其重而文公稱賞其説如此則可見矣説命下王曰來汝説台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯甘盤臣名君奭言在武丁時則有若甘盤遁退也髙宗言我小子舊學于甘盤己而退于荒野後又入居於河自河往亳遷徙不常歷敘其廢學之因而歎其學終無所顯明也無逸言髙宗舊勞于外爰暨小人與此相應國語亦謂武丁入于河自河徂亳唐孔氏曰髙宗為王子時其父小乙欲其知民之艱苦故使居民間也蘇氏謂甘盤遁于荒野以台小子語脈推之非是輯録豫小子舊學于甘盤既乃遁于荒野云云東坡解作甘盤遁于荒野據某看只是髙宗自言觀上文曰豫小子可見但不知當初髙宗因甚遁于荒野不知甘盤是甚樣人是學箇甚麼今亦不敢斷但據文義疑是如此兼無逸云髙宗舊勞于外亦與此相應想見髙宗三年不言恭默思道未知所發又見世間未有箇人強得甘盤所以思得大賢如傅説髙宗若非傅説想不能致當日之治傅説若非髙宗亦不能有所為故曰惟后非賢不乂惟賢非后不食言必相須也僩纂注蘇氏曰武丁為太子則學于甘盤武丁即位而甘盤遁去使人求之迹其所往則居于河濵自河往亳不知其所終武丁無所卒業乃相説也古注謂武丁遁于荒野使為太子而遁則為吳太伯豈復立哉學者徒見書云髙宗時舊勞于外乃小乙使知劬勞以知艱難耳決非荒野之遁也氏新安陳氏曰遁于荒野或以為武丁或以為甘盤真大學衍義乃祖蘇氏兼君奭云在武丁時則有若甘盤是武丁即位初佐之者猶甘盤也林氏曰想自免喪而遁去况下文爾交修豫罔豫棄蓋髙宗恐説亦效甘盤棄之而去也以此見蘇説亦宜兩存之爾惟訓于朕志若作酒醴爾惟麴糵若作和羹爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓心之所之謂之志邁行也范氏曰酒非麴糵不成羹非鹽梅不和人君雖有美質必得賢人輔導乃能成德作酒者麴多則太苦糵多則太甘麴糵得中然後成酒作羹者鹽過則鹹梅過則酸鹽梅得中然後成羹臣之於君當以柔濟剛可濟否左右規正以成其德故曰爾交修豫爾無我棄我能行爾之言也孔氏曰交者非一之義纂注陳氏大猷曰訓志猶云格心行陳氏經曰中篇説謂患髙宗之不能不患臣之不能言此篇髙宗謂患説之不能言不患我之不能行説曰王人求多聞時乃建事學于古訓乃有獲事不師古以克永世匪説攸聞求多聞者資之人學古訓者反之已古訓者古先聖王之訓載修身治天下之道二典三謨之類是也説稱王而告之曰人求多聞者是惟立事然必學古訓深識義理然後有得不師古訓而能長治久安者非説所聞甚言無此理也舜林氏以傅説稱王而告之與禹稱曰帝光天之下文勢正同輯録而今人只管説治心修身若不見這箇理心是如何地治身是如何地修若如此説資質好便養成箇無能砥人資質不好便都執縛不住了傅説曰學于古訓止匪説攸聞古訓何消得讀地做甚底蓋聖賢説出道理在裏必學乎此後可以有得賜經籍古人言學字方自説命始有纂注息齋余氏曰王人只從古注謂王者君奭義同王氏肅曰王人猶君人立吕氏曰學問之博者存實用非徒為觀美也大而建大經經綸大業彌綸大化至於贊天地化育皆所謂建事也此所謂有用之學否則所聞雖多亦奚以為葉氏曰前篇記惟以政事對此篇髙宗訪以道學故説以道學對下真氏曰大學之道自格物致知推而至於治國平天蓋致知所以明理理明則見諸行事者舉而指之耳此求多聞建事之意也古者學與事為一故精義所以致用利用所以崇德本末非二致也後世學與事為二故求道者以政事為粗迹任事者以講學為空言不知天下未嘗有無理之事無事之理老莊言理而不及事是有無事之理也管商言事而不及理是有無理之事也深味傅説之言則古先聖王之正傳可以識矣無王氏曰求多聞而不為古訓是式則是非所考正而所聞愈惑矣惟學遜志務時敏厥修乃來允懷于兹道積于厥躬遜謙抑也務専力也時敏者無時而不敏也遜其志如有所不能敏於學如有所不及虛以受人勤以勵已則其所修如泉始達源源乎其來矣兹此也篤信而深念乎此則道積于身不可以一二計矣夫修之來來之積其學之得於己者如此輯録惟學遜志止厥德修罔覺遜志者遜順其志撩下這志入那事中子細低心下意與他理會若髙氣不伏以為無緊要不能入細理會得則其修亦不來矣既遜其志又須時敏若似做不做或作或輟亦不濟事須是遜志務時敏則厥修乃來為學之道只此二端而已久戒以允懷于兹二者則道乃積于厥躬積者來得件數多也僩易曰君子以虛受人書曰惟學遜志舊有人來問事他略不虛心一味氣盈色滿當面與他説全不聽得賀孫纂注李氏曰為學之道常以卑遜自下為心以能問不能以多問寡有若無實若虛遜志之謂也怠新安陳氏曰驕與怠最害於學驕則志盈善不可入則志惰功不可進遜則不驕敏則不怠厥修所以來也若吕氏曰為學之初先要虛心下氣方能受天下之善氣髙則便與為學工夫相背陳氏經曰信道不篤則所修雖來亦不堅凝惟允懷于此篤信不忘則來者積聚不散來如日知其所無積如月無忘其所能也惟斆學半念終始典于學厥德修罔覺斆教也言敬人居學之半蓋道積厥躬者體之立斆學於人者用之行兼體用合內外而後聖學可全也始之自學學也終之教人亦學也一念終始常在於學無少間斷則德之所修有不知其然而然者矣或曰受教亦曰斆斆於為學之道半之半須自得此説極為新巧但古人論學語皆平正的實此章句數非一不應中間一語獨爾險巧此蓋後世釋教機權而誤以論聖賢之學也輯録惟斆學半蓋已學既成居於人上則須教人自學者學也而教人者亦學也蓋初學得者是半既學而推以教人與之講説已亦因此溫得此段文義是斆之功亦半也念終始典於學始之所以學者學也終之所以教人者亦學也自學教人無非是學自始至終日日如此忽不自知其德之修也又曰傅説此段説為學功夫極精密伊尹告太甲者極痛切僩因説斆學半或舉葛氏解云傅説與王説我教你者只是一半事那一半要你自去行取故謂之終始先生曰近見喻子才跋某人説命解後亦引此説吕伯恭亦如此説某舊為同安簿時學中一士子作書義如此説見他説得新巧大喜之先説王人求多聞時惟建事此是人君且學且斆一面理會教人又一面窮理義後面説得監于先王成憲其永無愆數語是平正實語不應中間翻空一句如此深險如斆得一半不成那一半掉放冷處教他自得此語全似禪語五通仙人問佛六通如何是那一通那一通便是妙處且如學記引此亦只依古注賜參用僩録惟學遜志止罔覺自古未有人説學字自傅説説起他這數句水潑不入便是説得密若終始與于學其德之進不知覺而自進也賜纂注吕氏曰師只教得一半此一半又在學者自理會如師舉一隅學者以三隅反師告諸往學者當以來者自悟聖人教人引而不發上一半固賴提指之功下一半必自用工可也説言及此蓋恐髙宗全倚之耳聖賢著書垂訓只説得上一半工夫若下一半在學者當自體會真氏曰斆之與學各居其半我之所教僅能半之髙宗於此尤當自力必一念終始常在於學無少間斷然後德之修有不自知者曰終始不曰始終學無止法也上言道之積下言德之修以理之共由言之謂之道以理之自得言之謂之德非有二也吕氏之説未見其為竒險且與念終始典于學相屬始並存之以俟商訂云任氏曰修乃來者可見修罔覺者不可見惟其有可見之功此厥修之進于乃來惟其無可見之迹此德修之妙於罔覺監于先王成憲其永無愆憲法愆過也言德雖造于罔覺而法必監于先王先王成法者子孫之所當守者也孟子言遵先王之法而過者未之有也亦此意纂注張氏曰監先王成憲欲髙宗以湯為法也陳氏大猷曰德修罔覺則德盛矣必監先王成憲始能無愆何邪蓋先王之道德法度皆成憲之所在歷萬世而無弊者也佛老之學其凝神坐忘亦幾於德修罔覺者矣惟不知監先王成憲故學其所學而非先王之學德其所德而非先王之德是以流弊不可勝救而吕氏曰無愆德之至難也舜德盛矣臯陶唯曰罔愆已陳氏經曰自遜志至典學乃學之次序監先王成憲乃學之準的惟説式克欽承旁招俊乂列于庶位式用也言髙宗之德苟至於無愆則説用能敬承其意廣求俊乂列於衆職蓋進賢雖大臣之責然髙宗之德未至則雖欲進賢有不可得者纂注彭氏曰大臣以已事君不若以天下之賢事君一相得其人則天下之賢兼收並蓄庶位皆得其人陳氏大猷曰君莫大於務學以進德相莫大於為君以求賢立武夷熊氏曰嘗讀孟子至三王四事章所謂湯執中賢無方者亦何取其義至於窮夜旦所思而汲汲若是乎蓋嘗考之虞夏用人不過一二世族而已八元八凱則髙辛髙陽之才子史記禹稷契世系同所自出孔安國傳書以益為臯陶子臯陶即髙辛才子庭堅也周以親親為重武王兄弟九人皆列為顯諸侯召畢亦以周同姓為上公一時大臣之子若孫大抵各以其世雖凡民之後秀論於王朝不過州閭族黨之官出長入治之職如三公吕望六卿蘇公諸侯三恪之外異姓亦鮮矣逮至春秋孔門髙弟仕者不過止於家臣一有所進則謂之逺間新新間舊矣周公諒亦知其未廣也故日夜之所思惟以湯之立賢無方為中道今觀商書一則曰敷求哲人二則曰旁招俊乂伊尹萊朱巫賢傅説諸大臣非以其親以其賢也主於賢則有德是視故不間親主於親則未必皆賢且妨天下之賢路矣信矣立賢無方為不易之中道而周公往往言之亦未得盡行其志也因表而出之以為世法云王曰嗚呼説四海之內咸仰朕德時乃風風教也天下皆仰我德是汝之教也股肱惟人良臣惟聖手足備而成人良臣輔而君聖髙宗初以舟楫霖雨為喻繼以麴糵鹽梅為喻至此又以股肱惟人為喻其所造益深所望益切矣纂注新安陳氏曰髙宗潛默之久一旦舉説而相之風聲所動四海仰德然非輔君作聖則無以慰人心之仰説始告君以從諫則聖惟聖時憲是臣以聖期待其君今髙宗語説以良臣為聖是君亦以聖自期待矣昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格于皇天爾尚明保豫罔俾阿衡專美有商先正先世長官之臣保安也保衡猶阿衡作興起也撻于市恥之甚也不獲不得其所也髙宗舉伊尹之言謂其自任如此故能輔我成湯功格于皇天爾庶幾明以輔我無使伊尹專美於我商家也傅説以成湯望髙宗故曰協于先王成德監于先王成憲髙宗以伊尹望傅説故曰罔俾阿衡專美有商纂注陳氏大猷曰尹在畎畝則欲使君為堯舜之君民為堯舜之民其自任之重如此説起版築為相迹與尹同則其自任不可不與尹同周子曰伊尹恥其君之不及堯舜一夫不獲則曰時豫之辜學者當志伊尹之所志真氏曰學者口不可一日不誦此言心不可一日不存此念惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對掦天子之休命君非賢臣不與共治賢非其君不與共食言君臣相遇之難如此克者責望必能之辭敢者自信無慊之辭對者對以己掦者掦于衆休命上文髙宗所命也至是髙宗以成湯自期傅説以伊尹自任君臣相勉勵如此異時髙宗為商令王傅説為商賢佐果無愧於成湯伊尹也宜哉輯録惟后非賢不乂言人君必任賢而後可以致治也惟賢非后不食言人君當任養賢之責也髙宗本意如此問者疑其成病固察之不詳而答者亦無一人説破此意何邪答或人伊尹告太甲便與傅説告髙宗不同伊尹之言諄切懇到蓋太甲資質低不得不然若髙宗則無許多病痛所謂黷于祭祀時謂弗欽之類不過此等小事爾髙宗肜日髙宗肜祭有雊雉之異祖己訓王史氏以為篇亦訓體也不言訓者已既有髙宗之訓故只以篇首四字為題今文古文皆有纂注髙堂隆曰太戊有桑穀生朝武丁有雊雉升鼎皆因災恐懼側身修行故號曰中宗髙宗興也勃焉髙宗肜日越有雊雉肜祭明日又祭之名殷曰肜周曰繹雊鳴也於肜日有雊雉之異蓋祭禰廟也序言湯廟者非是纂注陳氏曰祭之明日以禮享尸行事之有司及助祭之賓客皆與焉然謂之又祭而不謂之享者以尸猶有鬼神之道也祖己曰惟先格王正厥事格正也猶格其非心之格詳下文髙宗祀豐于昵昵者禰廟也豐于昵失禮之正故有雊雉之異祖己自言當先格王之非心然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言也纂注蘇氏曰武丁不修人事數祭媚神又豐于親廟儉于逺者敬其父薄其祖此失德之大者故傅説祖己皆先格而正之孔光曰上天聰明苟無其事變不虗生書曰惟先格王正厥事言變異之來起事有不正也王氏曰祖考罔非天嗣祀有典不可豐殺訓之使改所謂正厥事事新安陳氏曰案此諸説不過當先格正王而改正其似不必分為兩截工夫乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命典主也義者理之當然行而宜之之謂言天監視下民其禍福豫奪惟主義如何爾降年有永有不永者義則永不義則不永非天夭折其民民自以非義而中絶其命也意髙宗之祀必有祈年請命之事如漢武帝五畤祀之類祖己言永年之道不在禱祠在於所行義與不義而已禱祠非永年之道也言民而不言君者不敢斥也民有不若德不聽罪天既孚命正厥德乃曰其如台不若德不順於德不聽罪不服其罪謂不改過也孚命者以妖孽為符信而譴告之也言民不順德不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正德民乃曰孽祥其如我何則天必誅絶之矣祖己意謂髙宗當因雊雉以自省不可謂適然而自恕夫數祭豐昵僥福於神不若德也瀆於祭祀傅説嘗以進戒意或吝改不聽罪也雊雉之異是天既孚命正厥德矣其可謂妖孽其如我何邪嗚呼王司敬民罔非天胤典祀無豐于昵司主胤嗣也王之職主於敬民而已徼福於神非王之事也況祖宗莫非天之嗣主祀其可獨豐於昵廟乎纂注孔氏曰昵近也豐于近廟而馬氏曰昵考也謂禰廟陳氏絰曰為雊雉訓王書不及雉本以訓王而辭屢及民末始指王而言辭不迫而意獨至矣遲吕氏曰災異有二失道之君與天隔絶災異之應常賢君與天貫通災異之應常速髙宗恭默夢帝精神素與天通又聰明憲天修德又與天合故於祀事略過豐飛雉隨即應之此雖過於厚亦過也精誠積久天既賚之過失微形天遽警之固見天之警君無私亦見天之愛君甚速也黷於祭祀禮煩則亂説已知髙宗之偏在此旨哉惟艱領略警省深矣而此心終難除氣質偏厚者尚難變乃知行之果為艱也此篇為雊雉作而進戒之言不及災異獨指大公之道示之非祖己諷諫不敢直言蓋髙宗聰明從諫不待深言也西伯戡黎西伯文王也名昌姓姬氏戡勝也黎國名在上黨壺關之地案史記文王脫羑里之囚獻洛西之地紂賜弓矢鈇鉞使得專征伐為西伯文王既受命黎為不道於是舉兵伐而勝之祖伊知周德日盛既已戡黎紂惡不悛勢必及殷故恐懼奔告于王庶幾王之改之也史録其言以為此篇誥體也今文古文皆有或曰西伯武王也史記嘗載紂使膠鬲觀兵膠鬲問之曰西伯曷為而來則武王亦繼文王為西伯矣西伯既戡黎祖伊恐奔告于王下文無及勘黎之事史氏特標此篇首以見祖伊告王之因也祖姓伊名祖己後也奔告自其邑奔走來告紂也曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絶祖伊將言天訖殷命故特呼天子以感動之訖絶也格人猶言至人也格人元龜皆能先知吉凶者言天既已絶我殷命格人元龜皆無敢知其吉者甚言凶禍之必至也非先王在天之靈不佑我後人我後人淫戲用自絶於天耳輯録西伯戡黎便是這箇事難判斷觀戡黎大故逼近紂都了豈有諸侯臣子而敢稱兵於天子之都乎看來文王只是不伐紂耳其他事亦都做了如伐崇戡黎之類韓退之云臣罪當誅兮天王聖明伊川以為此説出文王心來嘗疑這箇説得來太過據當日事勢觀之恐不如此若説文王終守臣節何故伐崇侯虎只是後人因孔子以服事殷一句遂委曲回護箇文王説教好看殊不知孔子只是説文王不伐紂耳嘗見雜説云紂殺九侯鄂侯爭之強辨之疾併醢鄂侯西伯聞之竊歎崇侯虎譖之曰西伯欲叛紂怒因之羑里西伯歎曰父有不慈子不可以不孝君有不明臣不可以不忠豈有君而可叛者乎於是諸侯聞之以西伯能敬上而恤下也遂相率而歸之看來只這般説得平僩銖問西伯戡黎舊説西伯多指文王惟陳少南吕伯恭薛季隆以為武王吳才老亦曰乘黎恐是伐紂時事武王未稱王亦只稱西伯而已銖案書序言殷始咎周周人乘黎則殷自此以前未嘗惡周也殷始有惡周之心而周又乘襲戡勝近畿之黎國迫於王都且見征伐黎在漢上黨郡壺關紂都朝歌主黨在朝歌之西此祖伊所以恐而奔告於受曰天既訖我殷命曰恐曰奔告曰訖我殷命則其事勢亦且迫矣恐非文王時事也文王率商之叛國以事紂而孔子亦稱其三分天下有其二以服事殷為至德所謂有事君之小心者正文王之事孔子所以謂之至德也當時征伐雖或有之未必迫近於畿甸然史記又謂文王伐犬戎伐密須敗耆國耆即黎也音相近文王得專征伐故伐之二説未知孰是乞賜垂誨先生答曰此等無證據可且闕之殷始咎周周人乘黎祖伊恐奔告於受這事勢便自是住不得若曰奔告于受則商之忠臣義士何嘗一日忘周自是昏迷耳道夫問孔氏傳謂書序是後人傅會不足信曰亦不必序只經文謂祖伊恐奔告于王曰天子天既訖我殷命則是已交手爭兢了紂固無道然亦是武王事勢不相安住不得了仲虺告成湯曰肇我邦于有夏止非辜則仲虺分明言事勢不容住我不誅彼則彼將圖我矣後人多曲為之説以諱之要之自是避不得故天棄我不有康食不虞天性不迪率典康安虞度也典常法也紂自絶於天故天棄殷不有康食飢饉荐臻也不虞天性民失常心也不迪率典廢壞常法也纂注新安陳氏曰詩曰自天降康豐年穰穰以豐穰為降康則不有康食為天降飢饉明矣書之言性此第三見蓋謂人所受於天之性為私欲所蔽而不能省察也惟不自省察其天性是以不導迪率循乎典常凡此皆謂紂耳今我民罔弗欲喪曰天曷不降威大命不摰今王其如台大命非常之命摰至也史記云大命胡不至民苦紂虐無不欲殷之亡曰天何不降威於殷而受大命者何不至乎今王其無如我何言紂不復能君長我也上章言天棄殷此章言民棄殷祖伊之言可謂痛切明著矣王曰嗚呼我生不有命在天紂歎息謂民雖欲亡我我之生獨不有命在天乎祖伊反曰嗚呼乃罪多參在上乃能責命于天紂既無改過之意祖伊退而言曰爾罪衆多參列在上乃能責其命於天邪吕氏曰責命於天惟與天同德者方可纂注吕氏曰責命于天如孔子謂天生德於豫天未喪斯文桓魋匡人其如子何是也殷之即喪指乃功不無戮于爾邦功事也言殷即喪立矣指汝所為之事其能免戮於商邦乎蘇氏曰祖伊之諫盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主有不如紂者多矣愚讀是篇而知周德之至也祖伊以西伯戡黎不利於殷故奔告於紂意必及西伯戡黎不利於殷之語而入以告后出以語人未嘗有一毫及周者是知周家初無利天下之心其戡黎也義之所當伐也使紂遷善改過則周將終守臣節矣祖伊殷之賢臣也知周之興必不利於殷又知殷之亡初無與於周故因戡黎告紂反覆乎天命民情之可畏而略無及周者文武公天下之心於是可見纂注張氏曰喪亡不俟終日將在即日也林氏曰即喪言不旋踵而亡也葉氏曰几事積而成者皆曰功功惡有惡之功蓋其惡之成也陳氏經曰善有善之王氏十朋曰指乃功與惟府辜功之功同辜功猶言罪狀戮蘇氏曰功事也指視也視汝所行之事雖邦人猶當汝況於天乎吕氏曰伊反歸于家亦無咎周之辭大凡作事黨友親姻以為是未必是至仇敵亦以為是則是可知矣於此知周之盛德也下新安陳氏曰指乃功當屬上文傳連文解之文勢未順微子微國名子爵也微子名啓帝乙長子紂之庶母兄也微子痛殷之將亡謀於箕子比干史録其問答之語亦誥體也以篇首有微子二字因以名篇今文古文皆有纂注孔氏曰微圻內國名不唐孔氏曰鄭玄以為微與箕俱在圻內孔雖言箕亦當在圻內也比干不言封爵或本無爵或有而不言也致吕氏曰天下有道君子相與公議於朝各盡君之道天下無道君子相與私議於家各盡致身之道微子與二師宗室大臣與社稷為存亡當紂之時無所致力不得已謀各行其志以不失其義欲知三仁之心此篇可見陳氏經曰賢人君子忠孝之心不見於安平無事之際每見於悲傷惻怛之時微子若曰父師少師殷其弗或亂正四方我祖砥遂陳于上我用沈酗于酒用亂敗厥德于下父師大師三公箕子也少師孤卿比干也弗或者不能或如此也亂治也言紂無道無望其能治正天下也砥致陳列也我祖成湯致功陳列於上而子孫沈酗于酒敗亂其德于下沈酗言我而不言紂者過則歸己猶不忍斥言之也纂注唐孔氏曰司馬彪注莊子云箕子名胥餘不知出何書氏王氏肅曰箕子紂諸父家語曰比干紂諸父吕曰其者未定之辭或者非斷然之辭商亡形決矣猶曰商其不或能治正四方乎微子猶冀紂一旦悔悟不謂其果不能也以孔氏曰言湯致遂其功陳列于上世我紂也釋文酒為凶曰酗吕氏曰沈酗紂自為微子歸之我者蓋以君為體視同己過以商家體統言之故總而言我亦不忍斥言紂也如五子之歌曰萬姓仇豫如新安陳氏曰敗于下對陳于上而言祖宗在上彼而子孫在下如此忝厥祖甚矣深歎傷之殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恆獲小民方興相為敵讐今殷其淪喪若涉大水其無津涯殷遂喪越至于今殷之人民無小無大皆好草竊姦宄上而卿士亦皆相師非法上下容隱凡有冒法之人無有得其罪者小民無所畏懼強陵弱衆暴寡方起讐怨爭鬬侵奪綱紀蕩然淪喪之形茫無畔岸若涉大水無有津涯殷之喪亡乃至于今日乎微子上陳祖烈下述喪亂哀怨痛切言有盡而意無窮數千載之下猶使人傷感悲憤後世人主觀此亦可深監矣纂注孔氏曰草野竊盜曰父師少師我其發出狂吾家耄遜于荒今爾無指告于顛隮若之何其曰者微子更端之辭也何其語辭言紂發出顛狂暴虐無道我家老成之人皆逃遁于荒野危亡之勢如此今爾無所指示告我以顛隕隮墮之事將若之何哉蓋微子憂危之甚持更端以問救亂之䇿言我而不言紂者亦上章我用沈酗之義纂注孔氏曰我念商亡發疾生狂在家耄亂欲遁出於荒野言愁悶汝無指意告我商邦顛隕隮墮如之何其救之吕氏曰欲遁荒野使耳目不聞見紂所為張氏曰此微子有去之之意狂蘇氏曰我其奔走去國若狂人然陳氏經曰發出疾言憂之甚老成皆遁留者父師少師耳與陳氏曰其語助辭齊魯之間聲讀如姬記曰何居義此同新安陳氏曰今爾止何其傳作一串説下來文意未順父師若曰王子天毒降災荒殷邦方興沈酗于酒此下箕子之答也王子微子也自紂言之則紂無道故天降災自天下言之則紂之無道亦天之數箕子歸之天者以見其忠厚敬君之意與小旻詩言旻天疾威敷于下土意同方興者言其方興而未艾也此答微子沈酗于酒之語而有甚之之意下同纂注王氏炎曰自此以下箕子以其意剖析微子之言而答之惡孔氏曰比干不見明心同省文咎新安陳氏曰紂之皆原於酒若天所使乃無所歸之辭惟紂之沈酗方興而未艾下氏化之無怪其為敵讐亦方興而未艾也乃罔畏畏咈其耇長舊有位人乃罔畏畏者不畏其所當畏也孔子曰君子有三畏畏天命畏大人畏聖人之言咈逆也耇長老成之人也紂惟不畏其所當畏故老成舊有位者紂皆咈逆而棄逐之即武王所謂播棄黎老者此答微子發狂耄遜之語以上文持發問端故此先容之纂注陳氏大猷曰沈酗昏迷故當畏者皆無所畏無所畏則無所不至矣以下諸惡皆無畏所致今殷民乃攘竊神祗之犧牷牲用以容將食無災色純曰犧體完曰牷牛羊豕曰牲犧牷牲祭祀天地之物禮之最重者猶為商民攘竊而去有司用相容隱將而食之且無災禍豈特革竊姦宄而已哉此答微子革竊姦宄之語纂注孔氏曰器實曰用謂唐孔氏曰犧牷牲皆為俎實則用當為簠簋之實黍稷稻粱息齋余氏曰周禮宗伯掌五禮之禁令與其用等注云用等牲器尊卑之差是牲與器皆可謂之用也春秋僖十九年邾人執鄫子用之謂之牲也然則所謂犧牷牲用乃一物而異名耳蔡氏以用字屬下句使兩句皆不成文何邪降監殷民用乂讐斂召敵讐不怠罪合于一多瘠罔詔讐斂若仇敵掊斂之也不怠力行而不息也詔告也下視殷民凡上所用以治之者無非讐斂之事夫上以讐而斂下則下必為敵以讐上下之敵讐實上之讐斂以召之而紂方且召敵讐不怠君臣上下同惡相濟合而為一故民多飢殍而無所告也此答微子小民相為敵讐之語商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮商今其有災我出當其禍敗商若淪喪我斷無臣僕他人之理詔告也告微子以去為道蓋商祀不可無人微子去則可以存商祀也刻害也箕子舊以微子長且賢勸帝乙立之帝乙不從卒立紂紂必忌之是我前日所言適以害子子若不去則禍必不免我商家宗祀始隕墜而無所託矣箕子自言其義決不可去而微子之義決不可不去也此答微子淪喪顛隮之語纂注吕氏曰箕子之意尚欲彌縫諫紂謂我言所以不行有舊云立子之疑也今王子若逃亡于外則紂疑忌之心去而吾言庶幾可入萬一聽從亦一機也若王子不出我雖言必不見聽我亦受害喪亡無日矣王氏炎曰微子不去殺身之禍恐不獨在比干尚何宗祀之可續乎故曰我乃顛隮強陳氏經曰忠臣之於國明知天命之將絶未嘗不勉扶持之以求萬一之幸未有安坐而視其亡者去新安陳氏曰發狂耄遜以為微子若狂若耄遜遁而亦通蓋微子本有欲去之意故箕子於此深贊其去之之謀前後文尤相照應自靖人自獻于先王我不顧行遁上文既答微子所言至此則告以彼此去就之義靖安也各安其義之所當盡以自達其志於先王使無愧於神明而已於我則不復顧行遁案此篇微子謀於箕子比干箕子答如上文而比干獨無所言者得非比干安於義之當死而無復言歟孔子曰殷有三仁焉三仁之行雖不同而皆出乎天理之正各得其心之所安故孔子皆許之以仁而所謂自靖者即此也又案左傳楚克許許公面縛銜璧衰絰輿櫬以見楚子楚子問緒逢伯逢伯曰昔武王克商微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之然則微子適周乃在克商之後而此所謂去者特去其位而逃遁於外耳論微子之去者當詳於是輯録銖問微子篇曰詔王子出迪我舊云刻子一假銖於三仁之去就死生未知其所以當留當去當死之切當不可易處嘗讀微子書見其所以深憂宗國之將亡至於成疾為狂瞶耄無所致身其心切矣然終不言於紂以庶幾萬一感悟而遽為之去是必有深意者東坡則曰箕子在帝乙時以微子長且賢欲立之而帝乙不可卒立紂紂忌此兩人故箕子曰子之去固其道也我舊所云者害子子若不出則我與子皆危矣微子之告箕子若欲與之俱去然微子曰吾三人者各行其志自用其心之所安者而已人各自以其意貢于先王微子去之以續先王之國箕子為之奴以全先王之祀比干以諫而死為不負先王也而林少穎亦從其説以為三人處危疑之地身居嫌隙不可強諫徒死又無益故微子雖欲謀於箕子以救紂之顛隮然箕子以為我興受其敗猶言我起而諫則受其禍不可以復諫又不可居位故微子遁逃以避禍而箕子隱晦以自存惟比干不處嫌疑故強諫而死三人所處之勢不同故各行其志以自逹於先王而已審如是説則微子箕子皆未嘗諫無乃屑屑然避嫌逺禍以苟存乎唐孔氏曰我興受其敗者我適起而受其禍敗不可逃免然殷滅之後我不事異姓不能與人為臣僕示必欲以死諫紂但箕子之諫適值紂怒未甚故得不死耳微子告二人而獨箕子答者比干與箕子意同經省文也竊意孔氏去古未逺唐孔氏蓋推本安國之意其言必有所據蓋嘗因是妄謂微子以宗國將亡不勝其憂愁無聊之心而謀出處於箕子比干故箕子為言我興受其敗不可逃免當與宗國俱為存亡故雖商祀或至淪亡我亦誓不臣屬他人蓋將諫紂紂不聽亦不敢苟全逃死而比干無一言者孔氏所謂心同不復重言是也其後比干果以諫死而箕子乃不死者比干初心豈欲徒死以沽名哉所以諫者庶幾吾言得行而紂改焉耳紂既不改而言益切故紂遂殺之則比干亦不得而逃死耳箕子初心亦豈欲隱晦自存以苟全其生哉亦猶比干之諫冀吾言得行而紂改焉耳紂既不改而囚之偶不死耳紂囚之而不置之死則箕子豈固欲自經於溝瀆而為匹夫之諒哉故因遂佯狂而為奴蓋亦未欲即死庶幾彌縫其失而冀其萬有一之開悟耳蓋諫行而紂改過者二子之本心也諫不行而或死或囚者二子所遇之不同耳使紂而囚比干意比干亦未敢即死也使紂而殺箕子箕子敢求全哉二子易地則皆然矣至於箕子為微子之計則其意豈不以謂吾三人者皆宗國之臣利害休戚事體一同皆當與社稷俱為存亡不可復顧明哲保身之義然而微子國之元子也往者紂未立吾嘗言於帝乙而立子帝乙不從而立紂是以紂卒疑我兩人故吾舊所云者足以害子子若起諫紂則紂益生疑非惟不從害必先及子而併我危矣死分也不足惜而未有毫髮益於紂而遽死可惜也東萊所謂人先有疑心則雖盡忠與言而未必聽蓋疑心先入而為之主是也故微子不可留但當遁逃而出乃合於道又況我與比干既留諫以事紂則存亡未可知萬一不死固罔為人臣僕此心已堅定則亦不可使成湯以來廟不血食況汝為元子又居危疑之地義當逃去萬有一全宗祀可也此三子者其制行不同各出於至誠惻怛之心無所為而為之故孔子並稱三仁或以此歟先生答曰此説得之史記亦説箕子諫而見囚也此延平先生説三仁事云當理而無私心則仁矣今以語推之三仁之心只欲紂改過而圖存比干之殺身蓋非得已箕子亦偶未見殺耳非有意於為奴也事勢既爾微子自是亦只得全身以存先王之祀皆理不得不然者使其先有殺身強諫之心則亦不得為仁人矣答李時可箕子比干都是一樣心箕子偶然不衝著紂之怒不殺他然見比干恁地死若更死諫無益於國徒使人君有殺諫臣之名他處此最難微子去却易比干一向諫死又却索性箕子在半上落下最是難處彼他監繫在那裏不免佯狂所以易中特説箕子之明夷可見其難處故曰利艱貞晦其明也內難而能正其志箕子以之他外雖狂心則定也宇中間所解三仁之事左傳史記所載互有不同但論語只言微子去之初無面縳銜璧之説今乃捨孔子而從左氏史遷已自難信又不得已而曲為之説以為微子之去乃去紂而適其封國則尤為無所據矣此乃人道之大變聖賢所處事雖不同而心則未嘗不同故孔子厯舉而並稱之且皆許其仁焉更須玩索未可輊論也答嚴時亨問比干之中方始謂之仁焉亦只是一事之仁曰詳味孔子之言恐不只是一事之仁答李堯卿纂注張氏庭堅曰君子之去就死生其志在於天下國家而不在於一身故其死者非沽名生者非懼禍引身以去者非忘君也故微子得奉先之孝比干盡事君之節箕子全愛君之仁微子自獻以其孝箕子比干自獻以其忠然書載箕子微子之言而比干不與焉蓋人臣之義莫易明於死節莫難明於去國而屈辱用晦者尤所難辨也比干以死自誓無足為疑而箕子不免云云者重去就之義也張氏曰三仁之志各有所在微子自謀存宗祀以獻于先王比干自謀死諫以獻于先王箕子自謀佯狂俟紂悔過以獻于先王後世以死生為重古人以義理為重後世志慮淺狹故見死為髙節古人智慮廣大故以死為常事或去或死或生初無髙下義之所在三人各安之矣之李太白比干廟碑曰昔殷王毒痛公獨死之非捐生難處死之難故不可死而死是輕其生非孝也可死而不死是重其死非忠也周武以三分之業有諸侯之師實其十亂之謀總其一心之衆當公之存也乃戢彼西土及公之喪也乃觀于孟津公存而殷存公喪而殷喪興亡兩繫豈不重歟孔子稱殷有三仁豈無微旨敢頌之曰存其身存其宗亦仁矣存其名存其祀亦仁矣亡其身圖其國亦仁矣若進死者退生者狂捐之士將奔走之藵生者貶死者晏安之人將置力焉故同歸諸仁各順其志柳子厚箕子碑曰當其周時未至殷祀未殄比干已死微子己去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為比其有志於斯乎五峰胡氏曰堯舜與賢三王與嫡所以一民心重天下也然大君人命所繫興亡之本聖人有權焉未嘗執一也是以武玉雖弟上承文王之命而終不釋為君帝乙亦賢君也泥於立嫡而不知紂之足以亡天下也亦不知變之過矣使帝乙而知是道商之卜世猶未可知也三武夷熊氏曰天下治亂繫風俗風俗之美惡繫人心代固皆有道之長也而商一代之風俗為最美每讀商書至終篇紂之亡三仁寧死寧遁寧佯狂為奴所以自靖自獻者不敢有一毫負先王之心伯夷扣馬一諫凜凜乎萬世君臣之大義雖聖人後起不可易也微子歸周以全宗祀自是商亡以後事比干之死固已安之箕子之佯狂意栁宗元之論亦深有以察乎其心後來武王下車訪道授聖大法而終不為之臣朝鮮長往用廣宗祀此其志何如哉不但是也當時為商之臣若民者大率有不肯臣周之心大誥諸篇班班可睹陳同父所謂厯三紀而後世變風移蓋當康王之世歸周且四十年壯者已老老者已死其逋播遺黎真是至死不二要亦可見商家一代之人心風俗矣夏未之前聞也周平王以後奄奄如一尫羸病廢之人略無能出一匕強劑以起其生者則所謂養成一代之人心風俗有王者作誠不可以己也書傳輯録纂注卷三
