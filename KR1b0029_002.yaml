body:
  text: 書傳輯録纂注卷首下元董鼎撰漢劉歆曰孔子修易序書班固曰孔子纂書凡百篇而為之序言其作意今考序文於見存之篇雖頗依文立義而識見淺陋無所發明其間至有與經相戾者於己亡之篇則依阿簡略尤無所補其非孔子所作明甚顧世代久逺不可復知然孔安國雖云得之壁中而亦未嘗以為孔子所作但謂書序序所以亦為作者之意與討論墳典等語隔越不屬意可見今姑依安國壁中之舊復合序為一篇以附卷末而疏其可疑者於下云昔在帝堯聰明文思光宅天下將遜于位讓于虞舜作堯典聰明文思欽明文思也光宅天下光被四表也將遜于位讓于虞舜以虞書也作者追言作書之意如也纂注藝閣吕氏曰宅謂居而有之光宅天下猶言光有天下碧梧馬氏曰此所謂書序也林少穎謂昔在者篇首起語之辭書序自為一篇故以昔在帝堯起於篇首如孔氏序云古者伏羲氏之王天下也今案堯典之後接舜典則曰虞舜側微云云接禹謨則曰臯陶矢厥謨禹成厥功云云益足證古序自為一篇而相續之辭如此蓋史氏舊文也又案維昔黃帝法天則地四聖遵序各成法度唐堯遜位虞舜不台厥美帝功萬世載之作五帝本紀第一此太史公五帝本紀序傳之文與今書序堯典之説一也是皆古䇿書史官之序語如此今史記序傳亦自為一篇虞舜側微堯聞之聰明將使嗣位歷試諸難作舜典側微微賤也歷試遍試之也諸難五典百揆四門大麓之事也今案舜典一篇備載一代政治之終始而序止謂歷試諸難作舜典豈足以盡一篇之義帝釐下土方設居方别生分類作汩作九共九篇稿飫漢孔氏曰言舜理四方諸侯各設其官居其方生姓也别其姓族分其類使相從篇也汨始作興也言治民之功興也稿勞飫賜也凡十一亡今案十一篇共只一序如此亦不可曉輯録方設居方逐方各設其居方之道九共九篇劉侍讀以共為丘言九邱也人傑道夫問張子以别生分類為明庶物察人倫恐未安曰書序本無證據今引來解説更無理會了纂注唐孔氏曰凡此皆不見其經暗射無以考中孔氏順其文為傳耳是非不可知也他皆倣此葉氏曰别生因生以賜姓也分類胙土以命氏也故禹平水土後亦曰錫土姓陳氏經曰隨方别居方之法如所謂量地制邑度地居民臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷矢陳申重也序書者徒知臯陶以謨名禹以功稱而篇中有來禹女亦昌言與時乃功懋哉之語遂以為舜申禹使有言申臯陶使有功其淺近如此而不知禹曷嘗無言臯陶曷嘗無功是豈足以知禹臯陶之精微者哉輯録大禹謨序帝舜申之序者之意見書中臯陶陳謨了帝曰來禹汝亦昌言故先説臯陶矢厥謨禹成厥功帝又使禹亦陳昌言耳今書序固不能得書意後來説書者又不曉序者之意只管穿鑿求巧妙耳廣帝舜申之之説亦嘗疑之既而考其文則此序乃三篇之序也臯陶矢厥謨即謂臯陶謨篇也禹成厥功即謂大禹謨篇也陳九功之事故曰成厥功也申重也帝舜因臯陶陳九德而禹俞之因復申命禹曰來禹汝亦昌言而禹遂陳益稷篇申之語此一句序益稷篇也以此讀之文意甚明不煩生意答任尚書小序不是孔子作只是周秦間低手人作然後人亦自理會他本義未得且如禹謨序申重也序者本意先説臯陶後説禹謂舜欲令禹重説故將申宇繫禹宇蓋伏生書以益稷合於臯陶謨而思曰贊贊襄哉與帝曰來禹汝亦昌言相連申之二字便見是舜令禹重言之意此是序者本意今人都不如此説説得雖多皆非其本意也禹别九州隨山濬川任土作貢別分也分九州疆界是也隨山者隨山之勢濬川者濬川之流任土者任土地所宜而制貢也纂注吕氏曰先别九州使疆界既定水乃可治隨山有兩説一謂水源皆出於山山脈與水脈通隨山即所以導水一謂隨山開道以觀水勢而治之隨山濬川見禹之智任土作貢見禹之仁陳氏大猷曰隨與任所謂行其所無事也隨其土之所有而不責其所無是謂任土啓與有扈戰于甘之野作甘誓經曰大戰于甘者甚有扈之辭也序書者宜若春秋筆然春秋桓王失政與鄭戰于繻葛夫子猶書王伐鄭不曰與不曰戰者以存天下之防也以啓之賢征有扈之無道正禮樂征伐自天子出也序書者曰與曰戰若敵國者何哉孰謂書序為夫子作乎太康失邦昆弟五人須于洛汭作五子之歌經文已明此但疣贅耳下文不注者倣此纂注碧梧馬氏曰五子作歌之由史臣元載詳矣書序本自為一篇孔安國引以各冠篇首豫謂如湯誓大誥等初未嘗言所作之意而引序以冠之此為得體否則安知是篇何自而作乎至五子歌旅􅋙之類復加以序之云云則為贅矣所冠之序是非蓋相半也愚謂五子作歌可也作五子之歌者又誰歟羲和湎淫廢時亂曰胤往征之作胤征以經考之羲和蓋黨羿惡仲康畏羿之強不敢正明此其罪而誅之止責其廢厥職荒厥邑爾序書者不意亦曰湎淫廢時亂日亦有所畏而不敢正其罪邪纂注新安陳氏曰廢時失分至之節亂日紊甲乙之序自契至于成湯八遷湯始居亳從先王居作帝告釐沃纂注新安陳氏曰契帝嚳子舜封之商賜姓子嚳元都亳帝告疑即帝嚳釐理治沃沃饒之土也湯征諸侯葛伯不祀湯始征之作湯征伊尹去亳適夏既醜有夏復歸于亳入自北門乃遇汝鳩汝方作汝鳩汝方漢孔氏曰先王帝嚳也醜惡也不期而會曰遇鳩方二臣名五篇亡伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓以伊尹為首稱者得之咸有一德亦曰惟尹躬暨湯咸有一德陑在河曲之陽鳴條在安邑之西升自陑義未詳漢孔氏遂以為出其不意亦序意有以啓其陋歟輯録問湯誓升自陑先儒以為出其不意如何先生曰此乃序説經無明文要之今不的見陑是何地何以辨其正道竒道湯武之興決不如後世之譎詐若陑是取道近亦何必迂路大抵讀書須求其要處如食肉畢竟肉中有滋味有人却要於骨頭上咀嚼縱得些肉亦能多少古人所謂味道之腴最有理可學因問凡書傳學中如此者皆可且置之先生固當然可纂注蘇氏曰升陑以戰記事之實猶泰誓師渡孟津而已林氏曰誓而後升陑戰鳴條非如甘誓牧誓臨陳誓戰地也序蓋以為戰時誓非矣湯既勝夏欲遷其社不可作夏社疑至臣扈程子曰聖人不容有妄舉湯始欲遷社衆議以為不可而不遷是湯有妄舉也蓋不可者湯不可之也唐孔氏以於時有議論其事者詳序文以為欲遷者湯欲之也恐未必如程子所言要之序非聖人之徒自不足以知聖人也三篇亡纂注唐孔氏曰疑至臣扈二臣名程子曰湯以為國既亡則社自當遷然遷之不若不遷之愈故但屋之春秋書亳社災是魯有亳社屋之故有火災也記喪國之社屋之張氏曰欲遷社者革變之義卒不遷者忠厚之仁新安陳氏曰孔注謂後世無及勾龍者故不可而止此易社神非遷社也書亡本無所考據以序意詳之初欲遷夏社作夏社篇繼以二臣之議而止故又作疑至臣扈篇自商初不遷復社垂為後法周遂亦不遷商社所以亳社春秋猶存焉忠厚之仁監戒之義蓋兩得之始以為可卒也不可縱以人言而不可主之者亦湯也伊川之説蔡氏正不必辨夏師敗績湯遂從之遂伐三朡俘厥寶玉誼伯仲伯作典寶三朡國名今定陶也俘取也俘厥寶玉恐亦非聖人所急篇亡纂注孔氏曰桀走保三朡典寶國之常寶也唐孔氏曰桀載寶而行棄於三朡葉氏曰非貪其寶也國之庸器也則非以珍異為寶可知矣陳氏傅良曰寶玉夏后氏之璜之類也張氏曰二臣之書意以傷桀而戒湯也湯歸自夏至于大坰仲虺作誥大坰地名纂注李氏舜臣曰湯未及國而負深慙疑若不可歸以見國人者仲虺憂其一慙之不忍將自沮而害新政故亟開釋之若曰是役也順天命應人心不邇不殖官賞與賢共之非貪一世之利為己私此心彰信久矣無以慙為也王姑置是念日新厥德云云否則何但止於一慙哉廣哉斯言湯盤銘曰苟日新日日新又日新非取仲虺之言而誰歟湯既黜夏命復歸于亳作湯誥咎單作明居一篇亡纂注新安陳氏曰諸侯來朝湯告之以與天下更始序意欠明馬曰咎單為湯司空孔曰明居民之法未知是否成湯既沒太甲元年伊尹作伊訓肆命徂后孟子曰湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑史記太子太丁未立而死立太丁之弟外丙二年崩又立外丙之弟仲壬四年崩伊尹乃立太丁之子太甲序書者以經文首言奉嗣王祗見厥祖遂云成湯既沒太甲元年後世儒者以序為孔子所作不敢非之反疑孟子所言與本紀所載是可歎也肆命徂后二篇亡吳氏曰太甲諒隂為服仲壬之喪以是時湯葬已久仲壬在殯太甲太丁之子視仲壬為叔父為之後者為之子也祗見厥祖謂至湯之廟蓋太甲既立伊尹訓於湯廟故稱祗見厥祖若止是殯前既不當稱奉亦不當稱祗見也纂注孔氏曰湯沒而太甲立稱元年肆命陳天命以戒也徂后陳往古明君以戒也新安胡氏曰案湯後有外丙仲壬二王蔡氏力主之邵子經世書也又合孔注朱子孟子集注亦云二説未知孰是闕之可太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇案孔氏云桐湯葬地也若未葬之辭蓋上文祗見厥祖言湯在殯故此不敢為己葬使湯果在殯則太甲固已密邇其殯側矣捨殯而欲密邇湯於將葬之地固無是理也孔氏之失起於伊訓序文之繆遺外丙仲壬二帝故書旨不通纂注新安胡氏曰思庸思用伊尹之言也薛氏曰太甲終不變則伊尹如之何曰太甲之變天所與也尹安得不與之歸若其不變天所棄也尹安得私而與之復視天之命而我無心焉此所以為伊尹放愚謂伊尹營桐宫為太甲居憂之所耳序則曰伊尹諸桐豈可以成湯放桀於南巢例之乎其君不賢則固可放亦此序啓之也伊尹作咸有一德沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁纂注皇甫謐曰沃丁八年伊尹卒年百有餘歲曰蘇氏曰咎單訓伊尹事猶曹參隨蕭何規也陳氏訓伊尹事以伊尹事訓沃丁也乏李氏舜臣曰自稷契以下盡臣道者代不人而伊尹周公之葬獨紀於書伊陟相太戊亳有祥桑榖共生于朝伊陟贊于巫咸作咸乂四篇太戊贊于伊陟作伊陟原命纂注汪氏曰兆乎物者禍福特未定皆謂之祥應以德則為福應以不德則為禍曰釋文榖楮也孔氏曰贊告也原臣名新安陳氏咸乂者以巫咸能人王家也意此臣下自相警戒之書案史記亳有桑榖之異太戊懼伊陟曰妖不勝德太戊遂修先王之政早朝晏罷問疾弔喪三日而祥桑枯死商道復興以此觀之此數篇之意略可想見矣仲丁遷于嚻作仲丁河亶甲居相作河亶甲纂注新安胡氏曰仲丁太戊子河亶甲仲丁弟祖乙圯于耿作祖乙沃丁太甲之子咎單臣名伊陟伊尹之子太戊沃丁弟之子桑榖二木合生於朝七日而拱妖也巫咸臣名囂相耿皆地名囂相在河北耿在河東耿鄉河水所毁曰圮凡十篇亡盤庚五遷將治亳殷民咨胥怨作盤庚三篇以篇中有不常厥邑於今五邦序遂曰盤庚五遷然今詳于今五邦之下繼以今不承于古罔知天之斷命則是盤庚之前已自有五遷而作序者考之不詳繆云爾也又五邦云者五國都也經言亳囂相耿惟四邦耳盤庚從湯居亳不可又謂之一邦也序與經文既已差繆史記遂謂盤庚自有五遷誤人甚矣髙宗夢得説使百工營求諸野得諸傅巖作説命三篇案經文乃審厥象俾以形旁求于天下是髙宗夢得良弼形狀乃審其狀貌而廣求於四方説築傅巖之野與形象肖似如序所云似若髙宗夢得傅説姓氏又因經文有羣臣百官等語遂謂使百官營求諸野得諸傅巖非惟無補經文而反支離晦昧豈聖人之筆哉髙宗祭成湯有飛雉升鼎耳而雊祖已訓諸王作髙宗肜日髙宗之訓經言肜日而序以為祭成湯經言有雊雉而序以為飛雉升鼎耳而雊載籍有所傳歟然經言典祀無豐于昵則為近廟未必成湯也宗廟都宫堂室深逺幽邃而飛雉升立鼎耳而鳴亦已異矣高宗之訓篇亡纂注孔氏曰耳不聰之異使胡氏旦曰孔謂耳不聰雉在鼎足為足不良乎劉謂鼎象三公小人將居公位則用傅説其小人歟殷始咎周周人乘黎祖伊恐奔告于受作西伯戡黎咎惡乘勝也詳祖伊所告無一言及西伯者蓋祖伊雖知周不利於商而又知周實無所利於商序言殷始咎周似亦未明祖伊奔告之意纂注袁氏曰周人乘其勢以戡之戡如左傳戡定禍亂曰武無愚謂祖伊奔告于受蓋謂民罔弗欲喪而大命者不至耳初怨於周而曰殷始咎周何也經明曰西伯而序曰周人何也殷既錯天命微子作誥父師少師纂注愚謂錯亂也如孟子所謂逆天惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇十一年者十三年之誤也序本依放經文無所發明偶三誤而為一漢孔氏遂以為十一年觀兵十三年伐紂武王觀兵是以臣脅君也張子曰此事間不容髮一日而命未絶則是君臣當日而命絶則為獨夫豈有觀兵二年而後始伐之哉蓋泰誓序文既有十一年之誤而篇中又有觀政于商之語偽泰誓得之傳聞故上篇言觀兵之事次篇言伐紂之事司馬遷作周本紀因亦謂十一年觀兵十三年伐紂訛謬相承展轉左驗後世儒者遂謂實然而不知武王蓋未始有十一年觀兵之事也且序言惟十有一年武王伐殷繼以一月戊午師渡孟津則記其年其月其日之事也夫一月戊午既為十三年之事則上文十一年之誤審矣孔氏乃離而二之於十有一年武王伐殷則釋為觀兵之時於一月戊午師渡孟津則釋為伐紂之時上文則年無所繫之月下文則月無所繫之年又序言十一年伐殷而孔氏乃謂十一年觀兵十三年伐殷是蓋繆中之繆遂使武王蒙數千百年脅君之惡一字之誤其流害一至於此哉纂注愚謂泰誓三篇非一時一所所作序謂作於一日豈理也哉武王戎車三百兩虎賁三百人與受戰于牧野作牧誓戎車馳車也古者馳車一乘則革車一乘馳車戰車革車輜車載器械財貨衣裝者也司馬法曰一車甲士三人步卒七十二人炊家子十人固守衣裝五人廄養五人樵汲五人馳車七十五人革車二十五人凡百人二車故謂之兩三百兩三萬人也虎賁若虎賁獸之勇士百人之長也纂注新安陳氏曰一車兩輪故一乘車為一兩戎車三百兩兵車三百乘也輜車自在兵車之外才言戎車則必有輜車蔡氏乃謂二車故謂之兩誤矣一虎賁必長百人一乘車總用百人以車數合虎賁數蓋三萬人也愚謂經無戎車而序乃自言之何也豈其附會記禮革車三百兩虎賁三千人而為此序歟孟子蓋亦本於此歟武王伐殷往伐歸獸識其政事作武成歸獸歸馬放牛也武成所識其事之大者亦多矣何獨先取於歸馬放牛哉纂注吳氏曰或以歸馬放牛為歸獸非也史記本紀武王克殷乃罷兵西歸行狩記政事作武成班固亦作歸狩當以狩為正武王勝殷殺受立武庚以箕子歸作洪範唐孔氏曰言殺受立武庚者序自相顧為文未見意也輯録江彜叟問武王勝殷殺紂不知有這事否先生曰據史記雖不是武王自殺然説斬其頙懸之亦有這事卓又曰史記載紂赴火死武王斬其首以懸於旌恐未必如此又問文王如何曰似文王也不肯恁地做了縱使文王做時也須做得較詳緩武王做得大故粗暴當時紂既投火了武王又却親去斫他頭來梟若文王恐不肯恁地這也難説武王做得也是有未盡處所以東坡們説他不是聖人雖説得太過然畢竟是有未盡處又問武王既殺了紂有微子賢何不立之而必自立先生不答義剛纂注孔子曰不放而殺紂自焚也武庚一名祿父紂子以為王者後炎程子曰武王不曽殺紂紂自殺遂言殺紂也述王氏曰紂死而武庚不立箕子必不從武王歸序其始末以明箕子歸周之意以吕氏曰殷之當勝紂之當殺武庚之當立箕子之當歸並行而無心循天命之正由至公之理也除天下之大害傳天下之大法事之重一也以箕子歸以字當深玩箕子自言殷其淪喪我罔為臣僕又言我不顧行遁其無臣服歸周之意久矣曰以箕子歸見箕子不欲歸以箕子歸者武王也自武王言之見其能尊德樂道屈致賢者自箕子言之見其道統在身欲遺範百王未嘗渝其不欲歸周之意而又不得不言也武王既勝殷邦諸侯班宗彞作分器宗彛宗廟彛尊也以為諸侯分器篇亡纂注左傳昭公十二年楚靈王曰昔我先王熊繹與吕伋王孫牟燮父禽父並事康王四國皆有分我獨無有又十五年傳曰諸侯之封皆受明器於王室杜注謂明德之分器也胡氏伸曰如分魯以夏后氏之璜分陳以肅慎氏矢之類皆分器也序單言宗彞惟以其孝也器以祭器為重故即宗彛以該其餘秬鬯二卣周公得之成洛之後秬鬯一卣文侯得之東遷之初乃知宗彛亦朝廷之重禮重器歟西旅獻獒太保作旅獒獻貢也巢伯來朝芮伯作旅巢命篇亡纂注孔氏曰巢伯殷諸侯南方遠國武王克商慕義來朝芮伯周同姓圻內之國為卿大夫陳威德以命巢伯旅陳也始李氏杞曰巢今無為軍巢縣即其地也其曰來朝書來朝也湯放桀南巢巢人納之商封為伯亦足見巢之忠矣商亡而周興於是始來朝夫子録其書蓋有所感也張氏曰商亡而巢朝周周之子孫苟蹈商之覆轍則其朝又未可保旅巢命中必有戒飭之意如孔氏之言武王自稱威德以命之耳如齊桓所以語楚屈完者適足致完之有辭武王必不如此陳王之教命以命巢伯而已武王有疾周公作金縢纂注新安陳氏曰周公納祝册于金縢之匱中耳周公東征而歸之後史作此書述禱疾事為始耳書非周公作也此序不特不能盡此書之事大意全非武王崩三監及淮夷叛周公相成王將黜殷作大誥三監管叔蔡叔霍叔也以其監殷故謂之三監纂注孔氏曰黜絶也以誅叛之義大誥天下吕氏曰序言三監而不及武庚武庚之叛生於三監之謀也成王既黜殷命殺武庚命微子啓代殷後作微子之命微子封於宋為湯後纂注陳氏經曰特曰成王見周公所行無非奉成王之命而非敢自專也黜殷命絶其爵也殺武庚誅其身也唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾周公既得命禾旅天子之命作嘉禾唐叔成王母弟畝壟也穎穗也禾各一壟合為一穗葛氏曰唐叔雖幼因禾必有獻替之言成王既悟風雷之變因命唐叔以禾歸周公于東旅陳也二篇亡纂注孔氏曰唐叔食邑內得異禾異畝同穎天下和同之象周公德之所致公東征未還故命唐叔以禾歸周公唐叔後封晉公又推美成王善則稱君天下和同政之善者故以嘉禾名篇唐孔氏曰歸禾年月史傳無文不知在金縢之先後也王啓金縢正當禾熟之月若前年得之於時王疑未解未必肯歸禾周公當是啓金縢之後也禾者和也天地之和氣所生也後世同穎之禾襲名嘉禾由此陳氏經曰此天地綏和借草木之靈以彰成王周公始疑終信之象乃君臣和同之德之所感召也唐叔獻諸天子必以此意歸美稱德成王不有歸美於周公知有公不知有已也周公不有歸美於成王知有王不知有已也二書雖亡君臣和氣藹然猶可想見當王之疑也禾為之偃金縢啓也禾為之起及君臣之和同也禾又為之異畝同穗周公之忠誠上通於天亦王之真誠上通於天也心與天通感應如響以見天人之果無二理也成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材案胡氏曰康叔成王叔父也經文不應曰朕其弟成王康叔猶子也經文不應曰乃寡兄其曰兄曰弟者武王命康叔之辭也序之謬誤蓋無可疑詳見篇題又案書序似因康誥篇首錯簡遂誤以為成王之書而孔安國又以為序篇亦出壁中豈孔鮒藏書之時已有錯簡邪不可考矣然書序之作雖不可必為何人而可必其非孔子作也成王在豐欲宅洛邑使召公先相宅作召詔纂注新安陳氏曰召公告王序全不言簡略之非詳見本篇召公既相宅周公往營成周使來告卜作洛誥纂注新安陳氏曰序只説得伻來以圖及獻卜以前後未能盡成周既成遷殷頑民周公以王命誥作多士遷殷頑民在作洛之前序書者考之不詳以為成周既成遷殷頑民謬矣詳見本篇題周公作無逸召公為保周公為師相成王為左右召公不恱周公作君奭蘇氏曰舊説或謂召公疑周公陋哉斯言也愚謂序文意義含糊舊説之陋有以啓之也纂注新安陳氏曰書中略不見召公不悅之意諸説揣摹皆序之陋啓之所合盡刪蔡叔既沒王命蔡仲踐諸侯位作蔡仲之命成王東伐淮夷遂踐奄作成王政踐滅也篇亡纂注孔氏曰成王即政淮夷奄國又叛王親伐之遂滅奄而徙之唐孔氏曰周公攝政之初奄與淮夷從管蔡作亂周公征而定之成王即政淮與奄又叛成王親往征之成王即政始封伯禽費誓之稱淮夷徐戎並興魯侯征之王伐淮夷魯伐徐戎是同時討伐知成王即政之年復叛也成王既踐奄將遷其君于蒲姑周公告召公作將蒲姑史記作薄姑篇亡纂注孔氏曰蒲姑齊地徙近中國教化之誥吕氏曰淮夷與奄成王時蓋皆再叛大東征淮夷叛矣此序復云多士言昔朕來自奄矣此序又云可見也將遷而告召公見周公於軍國大議未嘗敢專也遷李氏把曰青州千乘縣有薄姑城遷奄君臣於薄姑奄民於魯祝鮀所謂因商奄之民而命伯禽也成王歸自奄在宗周誥庶邦作多方周公作立政成王既黜殷命滅淮夷還歸在豐作周官成王黜殷久矣而於此復言何邪纂注新安陳氏曰序言王歸在豐書云歸于宗周乃歸鎬非豐也自惟周王撫萬邦至董正治官乃此書之本序辭甚明白小序贅矣成王既伐東夷肅慎來賀王俾榮伯作賄肅慎之命賄賂也義未詳篇亡纂注蘇氏曰東夷即淮夷也在周為東國孔氏曰肅慎氏東北遠夷榮名周同姓諸侯為王卿士周公在豐將沒欲葬成周公薨成王葬于畢告周公作亳姑此言周公在豐漢孔氏謂致政歸老之時而下文君陳之序乃曰周公既沒命君陳分正東郊成周方未命君陳時成周蓋周公治之以公沒故命君陳然則公蓋未嘗去洛矣而此又以為在豐將沒則其致政歸老果在何時邪篇亡纂注吳氏曰周公沒時適在豐西唐孔氏曰帝王世紀云武王葬於畢畢在杜南長安北序説葬周公之事其篇乃名亳姑篇與序不相允會其篇既亡不知所道蒲蘇氏曰畢有文武墓亳姑蒲姑也周公告召公作將姑至此并告以遷歟安吕氏曰公欲葬成周蓋宗臣垂死憂國之心以邦之危惟茲殷士致不忘之意意不在葬也成王領其意不從其葬使祔於文武也周公既沒命君陳分正東郊成周作君陳纂注葉氏曰分正東郊猶言分陜君新安陳曰氏曰治洛以化殷民為重故陳畢命尹茲東郊保釐東郊雖以東郊言實全付以治洛之任也君陳繼周公畢公繼君陳其任一也小序一分字辭意欠明或者遂謂分東郊之地成周之邑使君陳為之正長王城之事君陳不與焉此説蓋小序誤之也成王將崩命召公畢公率諸侯相康王作顧命康王既尸天子遂誥諸侯作康王之誥尸天子亦無義理太康尸位羲和尸官皆言居其位而廢棄其事之稱序書亦用其例謬矣康王命作册畢分居里成周郊作畢命分居里者表厥宅里殊厥井疆也纂注附見武成篇纂注新安陳氏曰案此序康王命作册畢一句文義難通必有闕誤孔傳似為得之而朱子非之何也穆王命君牙為周大司徒作君牙序無所發明曰周云者殊無意義或曰此春秋王正月例也曰春秋魯史故孔子繫之以王此豈其例乎下篇亦然穆王命伯冏為周大僕正作冏命呂命穆王訓夏贖刑作吕刑此序亦無所發明但增一夏字自古刑辟之制豈專為夷狄不為中夏邪或曰訓夏贖刑謂訓夏后氏之贖刑也曰夏承虞治不聞變法周禮亦無五刑之贖其非古制明甚穆王耄荒車轍馬迹無所不至吕侯竊舜典贖刑二字作為此刑以聚民財資其荒用夫子以其書猶有哀矜之意而録之至其篇首特以耄荒二字發之其意微矣詳見本篇纂注陳氏大猷曰吕命二字為句疑有闕文平王錫晉文侯秬鬯圭瓉作文侯之命經文止言秬鬯而此益以圭瓉有所傳歟抑賜秬鬯者必以圭瓉故經不言歟纂注孔氏曰以圭為杓柄謂之圭瓉以唐孔氏曰圭瓉酌秬鬯之杓杓下有槃瓉即槃之名圭玉為之賜以秬鬯以圭瓉副焉周新安陳氏曰成王以秬鬯錫周公於作洛之餘見西所以盛王以秬鬯錫文侯於遷洛之始見東周所以變蓋以我周東遷於晉焉依己位苟定不啻足矣能事畢矣錫賚之重可以成王待周公者待之矣然愚案或曰賜圭瓉然後為鬯賜弓矢然後征賜鈇鉞後殺未賜圭瓉則資鬯於天子今賜圭瓉則文侯自為鬯矣是天子之禮也賜弓矢則文侯專征伐矣是天子之權也禮與權既去豈復知有天子乎周室陵夷實自此始愚竊謂序所以為作者之意書但曰秬鬯一卣而序乃曰秬鬯圭瓉使誠出於天子則惟器與名不可假人肯自增圭瓉於秬鬯之下乎詩之彤弓亦曰天子賜有功諸侯前則商王受以賜西伯後則周襄王以賜重耳正以晉文能繼文侯之業也似不必議魯侯伯禽宅曲阜徐夷並興東郊不開作費誓徐徐戎也夷淮夷也纂注蘇氏曰二寇皆在魯東東郊門不開非謂寇已至東郊也如漢烽火通甘泉而棘門霸上皆屯兵吳楚七國反而閉函谷關耳蓋戒嚴也秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓以經文意考之穆公之悔蓋悔用杞子之諜不聽蹇叔之言序文亦不明此意纂注新安陳氏曰穆公名任好襄公名歡唐孔氏曰崤晉險地在宏農澠池秦鄭路經崤關而東禮征伐朝聘過人之國必遣使假道事詳見左傳僖三十二年禽歸軒鄒氏曰伯禽魯之先君當諱其名而乃斥言伯秦本伯爵故春秋書秦伯任好卒而乃稱秦穆公此決非孔子筆削之例書傳輯録纂注卷首下
